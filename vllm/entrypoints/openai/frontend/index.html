<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vLLM Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#212121;--surface:#171717;--sidebar:#111;--border:#2f2f2f;--text:#ececec;--text-muted:#8b8b8b;--accent:#7c3aed;--accent-hover:#8b5cf6;--accent-light:rgba(124,58,237,0.15);--user-bg:#2a2a2a;--danger:#ef4444;--radius:10px;--radius-sm:6px;--shadow:0 2px 8px rgba(0,0,0,0.3);--font:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;--transition:.2s ease}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-header button{background:var(--accent);border:none;color:#fff;width:36px;height:36px;border-radius:var(--radius-sm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background var(--transition)}
.sidebar-header button:hover{background:var(--accent-hover)}
.conversations{flex:1;overflow-y:auto;padding:8px}
.conversation{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;font-size:13px;color:var(--text-muted);transition:all var(--transition);display:flex;align-items:center;gap:8px;overflow:hidden}
.conversation:hover{background:var(--surface);color:var(--text)}
.conversation.active{background:var(--accent-light);color:var(--text)}
.conversation .title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.conversation .del{opacity:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;transition:all var(--transition)}
.conversation:hover .del{opacity:1}
.conversation .del:hover{color:var(--danger);background:rgba(239,68,68,0.15)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{display:none;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;gap:12px}
.main-header .menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}
.main-header h2{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat{flex:1;overflow-y:auto;padding:0}
.chat-inner{max-width:820px;margin:0 auto;padding:24px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:8px;text-align:center;padding:40px}
.empty-state .icon{font-size:56px;margin-bottom:8px}
.empty-state h2{font-size:22px;font-weight:600;color:var(--text)}
.empty-state p{font-size:14px;max-width:400px;line-height:1.5}
.msg{display:flex;gap:14px;padding:20px 0;border-bottom:1px solid var(--border);animation:fadeIn .3s ease}
.msg:last-child{border-bottom:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;margin-top:2px}
.msg.user .msg-avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msg-role{font-size:13px;font-weight:600}
.msg-time{font-size:11px;color:var(--text-muted)}
.msg-content{font-size:14.5px;line-height:1.7;color:var(--text)}
.msg-content p{margin-bottom:10px}
.msg-content p:last-child{margin-bottom:0}
.msg-content pre{background:#0d0d0d;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;overflow-x:auto;margin:10px 0;position:relative}
.msg-content pre code{font-family:var(--mono);font-size:13px;background:none;padding:0;color:var(--text)}
.msg-content code:not(pre code){background:rgba(124,58,237,0.15);color:#c4b5fd;padding:2px 6px;border-radius:4px;font-size:13px;font-family:var(--mono)}
.msg-content img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0}
.msg-content table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.msg-content th,.msg-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg-content th{background:var(--surface);font-weight:600}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--text-muted);margin:10px 0}
.msg-content ul,.msg-content ol{padding-left:22px;margin:8px 0}
.msg-content a{color:#a78bfa;text-decoration:none}
.msg-content a:hover{text-decoration:underline}
.msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4{margin:16px 0 8px;font-weight:600;line-height:1.3}
.msg-content h1{font-size:20px}
.msg-content h2{font-size:18px}
.msg-content h3{font-size:16px}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;transition:all var(--transition);opacity:0}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--bg);color:var(--text)}
.msg-tools{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity var(--transition)}
.msg:hover .msg-tools{opacity:1}
.msg-tools button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:4px;transition:all var(--transition);display:flex;align-items:center;gap:4px}
.msg-tools button:hover{background:var(--surface);color:var(--text)}
.streaming .msg-content p:last-child::after{content:'|';animation:blink .8s infinite;color:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.stream-error{color:var(--danger);font-size:13px;margin-top:4px}
/* Input */
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px 20px}
.input-inner{max-width:820px;margin:0 auto}
.input-box{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:4px;display:flex;align-items:flex-end;transition:border-color var(--transition)}
.input-box:focus-within{border-color:var(--accent)}
.input-box textarea{flex:1;background:transparent;border:none;color:var(--text);padding:10px 14px;font-size:14px;font-family:var(--font);resize:none;min-height:44px;max-height:160px;outline:none;line-height:1.5}
.input-box textarea::placeholder{color:var(--text-muted)}
.input-box button{background:var(--accent);border:none;color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all var(--transition);margin:4px;flex-shrink:0}
.input-box button:hover{background:var(--accent-hover)}
.input-box button:disabled{opacity:.4;cursor:not-allowed}
.input-bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:0 4px}
.input-bar .model-tag{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.input-bar .model-tag select{background:transparent;border:none;color:var(--text-muted);font-size:12px;outline:none;cursor:pointer;font-family:var(--font)}
.input-bar .model-tag select option{background:var(--surface);color:var(--text)}
.input-bar .params{display:flex;align-items:center;gap:12px}
.param-group{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted)}
.param-group input[type="range"]{width:60px;height:3px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.param-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface)}
.param-group .param-val{min-width:24px;text-align:right}
.shortcuts{font-size:11px;color:var(--text-muted);display:flex;gap:12px;margin-top:4px;padding:0 4px}
.shortcuts kbd{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--font)}
/* Mobile */
@media(max-width:768px){.sidebar{position:fixed;left:-280px;top:0;bottom:0;transition:left .3s ease;z-index:100;box-shadow:4px 0 20px rgba(0,0,0,0.4)}.sidebar.open{left:0}.main-header{display:flex}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}.sidebar.open+.sidebar-overlay{display:block}.params{display:none !important}.input-area{padding:12px 14px 16px}}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>vLLM</h1>
      <button onclick="newChat()" title="New chat">+</button>
    </div>
    <div class="conversations" id="conversations"></div>
  </aside>
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>
  <main class="main">
    <div class="main-header">
      <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h2 id="main-title">vLLM Chat</h2>
    </div>
    <div class="chat" id="chat">
      <div class="chat-inner" id="chat-inner">
        <div class="empty-state" id="empty-state">
          <div class="icon">&#9889;</div>
          <h2>vLLM Chat</h2>
          <p>Running on Windows + AMD ROCm. Send a message to start.</p>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-inner">
        <div class="input-box">
          <textarea id="input" rows="1" placeholder="Message vLLM..." enterkeyhint="send"></textarea>
          <button id="send-btn" title="Send">&#10148;</button>
        </div>
        <div class="input-bar">
          <div class="model-tag">
            &#9679; <select id="model-select"><option>loading...</option></select>
          </div>
          <div class="params">
            <div class="param-group">
              <label>Temp</label>
              <input type="range" id="temp" min="0" max="2" step="0.05" value="0.7">
              <span class="param-val" id="temp-val">0.70</span>
            </div>
            <div class="param-group">
              <label>Max</label>
              <input type="range" id="max-tokens" min="64" max="4096" step="64" value="2048">
              <span class="param-val" id="max-val">2k</span>
            </div>
          </div>
        </div>
        <div class="shortcuts">
          <span><kbd>Enter</kbd> send</span>
          <span><kbd>Shift+Enter</kbd> newline</span>
          <span><kbd>Esc</kbd> stop</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// === State ===
let conversations=JSON.parse(localStorage.getItem('vllm_conversations')||'[]');
let currentId=localStorage.getItem('vllm_current')||null;
let abortController=null;
let streaming=false;

// === DOM refs ===
const chat=document.getElementById('chat');
const inner=document.getElementById('chat-inner');
const emptyState=document.getElementById('empty-state');
const input=document.getElementById('input');
const sendBtn=document.getElementById('send-btn');
const convList=document.getElementById('conversations');
const modelSelect=document.getElementById('model-select');
const tempSlider=document.getElementById('temp');
const tempVal=document.getElementById('temp-val');
const maxSlider=document.getElementById('max-tokens');
const maxVal=document.getElementById('max-val');
const sidebar=document.getElementById('sidebar');

// === Init ===
loadModels();
tempSlider.addEventListener('input',()=>tempVal.textContent=parseFloat(tempSlider.value).toFixed(2));
maxSlider.addEventListener('input',()=>{
  const v=parseInt(maxSlider.value);
  maxVal.textContent=v>=1024?(v/1024).toFixed(v%1024?1:0)+'k':v.toString();
});
renderSidebar();
if(currentId)switchChat(currentId);
else newChat();

// === Storage ===
function save(){
  localStorage.setItem('vllm_conversations',JSON.stringify(conversations));
  if(currentId)localStorage.setItem('vllm_current',currentId);
}

// === Sidebar ===
function renderSidebar(){
  if(!convList)return;
  convList.innerHTML=conversations.map(c=>
    '<div class="conversation'+(c.id===currentId?' active':'')+'" onclick="switchChat(\''+c.id+'\')">'+
      '<span style="color:var(--accent)">&#9862;</span>'+
      '<span class="title">'+escapeHtml(c.title||'New chat')+'</span>'+
      '<button class="del" onclick="event.stopPropagation();deleteChat(\''+c.id+'\')">&#10005;</button>'+
    '</div>'
  ).join('');
}

function getConv(){return conversations.find(c=>c.id===currentId)}

function switchChat(id){
  currentId=id;
  save();
  renderSidebar();
  renderMessages();
  input.focus();
  closeSidebar();
}

function newChat(){
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  conversations.unshift({id,title:'New chat',messages:[],system:''});
  currentId=id;
  save();
  renderSidebar();
  renderMessages();
  input.focus();
  closeSidebar();
}

function deleteChat(id){
  conversations=conversations.filter(c=>c.id!==id);
  if(currentId===id){
    currentId=conversations.length>0?conversations[0].id:null;
    if(!currentId)newChat();
  }
  save();
  renderSidebar();
  if(currentId)renderMessages();
}

function updateTitle(id,title){
  const c=conversations.find(x=>x.id===id);
  if(c){c.title=title.slice(0,60);save();renderSidebar()}
}

function toggleSidebar(){sidebar.classList.toggle('open')}
function closeSidebar(){sidebar.classList.remove('open')}

// === Messages ===
function renderMessages(){
  const conv=getConv();
  inner.innerHTML='';
  if(!conv||conv.messages.length===0){
    inner.appendChild(emptyState);
    document.getElementById('main-title').textContent='vLLM Chat';
    return;
  }
  emptyState.remove();
  document.getElementById('main-title').textContent=conv.title||'vLLM Chat';
  conv.messages.forEach((m,i)=>inner.appendChild(createMsgEl(m.role,m.content,i)));
  scrollToBottom();
}

function createMsgEl(role,content,idx){
  const el=document.createElement('div');
  el.className='msg '+role;
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const rendered=marked.parse(content||'');
  el.innerHTML=
    '<div class="msg-avatar">'+(role==='user'?'U':'A')+'</div>'+
    '<div class="msg-body">'+
      '<div class="msg-header">'+
        '<span class="msg-role">'+(role==='user'?'You':'Assistant')+'</span>'+
        '<span class="msg-time">'+time+'</span>'+
      '</div>'+
      '<div class="msg-content">'+rendered+'</div>'+
      '<div class="msg-tools">'+
        (role==='assistant'?'<button onclick="copyMsg(this)">&#128203; Copy</button>':'')+
        '<button onclick="resend(this)">&#128260; Resend</button>'+
        '<button onclick="deleteMsg(this)">&#10005; Delete</button>'+
      '</div>'+
    '</div>';
  el.querySelectorAll('pre code').forEach(b=>{
    hljs.highlightElement(b);
    const pre=b.parentElement;
    const btn=document.createElement('button');
    btn.className='copy-btn';
    btn.textContent='Copy';
    btn.onclick=()=>{navigator.clipboard.writeText(b.textContent);btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)};
    pre.appendChild(btn);
  });
  return el;
}

function scrollToBottom(){chat.scrollTop=chat.scrollHeight}

// === Send ===
function buildPrompt(messages,system){
  let p='';
  if(system)p+='System: '+system+'\n\n';
  messages.forEach(m=>{p+=(m.role==='user'?'User':'Assistant')+': '+m.content+'\n'});
  p+='Assistant:';
  return p;
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text||sendBtn.disabled)return;
  const conv=getConv();
  if(!conv)return;

  conv.messages.push({role:'user',content:text});
  input.value='';input.style.height='auto';sendBtn.disabled=true;
  emptyState.remove();
  inner.appendChild(createMsgEl('user',text,conv.messages.length-1));
  scrollToBottom();

  const respIdx=conv.messages.length;
  conv.messages.push({role:'assistant',content:''});
  const msgEl=createMsgEl('assistant','',respIdx);
  msgEl.classList.add('streaming');
  inner.appendChild(msgEl);
  const contentDiv=msgEl.querySelector('.msg-content');
  scrollToBottom();

  abortController=new AbortController();
  streaming=true;
  let full='';

  try{
    const r=await fetch('/v1/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:modelSelect.value,
        prompt:buildPrompt(conv.messages.slice(0,-1),conv.system),
        stream:true,
        max_tokens:parseInt(maxSlider.value),
        temperature:parseFloat(tempSlider.value),
      }),
      signal:abortController.signal,
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({error:{message:r.statusText}}));
      throw new Error(err.error?.message||r.statusText);
    }
    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          const t=parsed.choices?.[0]?.text||'';
          full+=t;
          conv.messages[respIdx].content=full;
          contentDiv.innerHTML=marked.parse(full);
          contentDiv.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
          scrollToBottom();
        }catch(e){}
      }
    }
  }catch(e){
    if(e.name==='AbortError'){full+='\n\n*[stopped]*'}
    else{
      const errMsg=e.message;
      msgEl.querySelector('.msg-content').innerHTML+='<div class="stream-error">Error: '+escapeHtml(errMsg)+'</div>';
    }
  }finally{
    streaming=false;
    abortController=null;
    msgEl.classList.remove('streaming');
    conv.messages[respIdx].content=full||'*(empty response)*';
    contentDiv.innerHTML=marked.parse(conv.messages[respIdx].content);
    if(!conv.title||conv.title==='New chat'){
      updateTitle(conv.id,conv.messages[0]?.content?.slice(0,60)||'New chat');
    }
    save();
    renderSidebar();
    scrollToBottom();
    sendBtn.disabled=false;
    input.focus();
  }
}

// === Actions ===
function copyMsg(btn){
  const text=btn.closest('.msg-body').querySelector('.msg-content').textContent;
  navigator.clipboard.writeText(text);
  btn.innerHTML='&#10003; Copied!';
  setTimeout(()=>btn.innerHTML='&#128203; Copy',1500);
}

function deleteMsg(btn){
  const msgEl=btn.closest('.msg');
  const idx=[...inner.children].indexOf(msgEl);
  const conv=getConv();
  if(conv&&idx>=0){
    conv.messages.splice(idx,1);
    save();
    renderMessages();
  }
}

function resend(btn){
  const msgEl=btn.closest('.msg');
  const idx=[...inner.children].indexOf(msgEl);
  const conv=getConv();
  if(!conv||idx<0)return;
  // Remove from this message onward
  conv.messages.splice(idx);
  save();
  // Put last user message back in input
  if(conv.messages.length>0&&conv.messages[conv.messages.length-1].role==='user'){
    input.value=conv.messages.pop().content;
    input.style.height='auto';
  }
  renderMessages();
  input.focus();
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

// === Model loading ===
async function loadModels(){
  try{
    const r=await fetch('/v1/models');
    const d=await r.json();
    const models=d.data||[];
    if(models.length>0){
      modelSelect.innerHTML=models.map(m=>'<option value="'+m.id+'">'+m.id+'</option>').join('');
    }else{
      modelSelect.innerHTML='<option>no models</option>';
    }
  }catch(e){
    modelSelect.innerHTML='<option>unreachable</option>';
  }
}

// === Events ===
sendBtn.addEventListener('click',sendMessage);
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px'});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&abortController){abortController.abort();sendBtn.disabled=false;streaming=false}
  if(e.key==='n'&&(e.ctrlKey||e.metaKey)){e.preventDefault();newChat()}
});
</script>
</body>
</html>
