<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vLLM Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent-hover:#79c0ff;--user-bg:#1f6feb33;--assistant-bg:#161b22;--pre-bg:#0d1117;--code-bg:#1c2128;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;font-weight:600;color:var(--accent)}
header span{color:var(--text-muted);font-size:12px}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.message{max-width:800px;width:100%;margin:0 auto;padding:16px;border-radius:var(--radius);line-height:1.6;font-size:14px}
.message.user{background:var(--user-bg);border:1px solid #1f6feb44}
.message.assistant{background:var(--assistant-bg);border:1px solid var(--border)}
.message .role{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.message .content{word-wrap:break-word}
.message .content p{margin-bottom:8px}
.message .content p:last-child{margin-bottom:0}
.message .content pre{background:var(--pre-bg);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
.message .content code{background:var(--code-bg);padding:2px 5px;border-radius:4px;font-size:13px}
.message .content pre code{background:none;padding:0;border-radius:0}
.message .content img{max-width:100%;border-radius:6px}
.message .content table{border-collapse:collapse;margin:8px 0;width:100%}
.message .content th,.message .content td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.message .content th{background:var(--surface);font-weight:600}
.message .content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-muted);margin:8px 0}
.message .content ul,.message .content ol{padding-left:20px;margin:8px 0}
.message .content a{color:var(--accent);text-decoration:none}
.message .content a:hover{text-decoration:underline}
.typing .dots{display:inline-flex;gap:4px}
.typing .dots span{width:6px;height:6px;background:var(--text-muted);border-radius:50%;animation:bounce 1.4s infinite}
.typing .dots span:nth-child(2){animation-delay:.2s}
.typing .dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}
#input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
#input-form{max-width:800px;margin:0 auto;display:flex;gap:8px}
#input-form textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 14px;font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:160px;outline:none;transition:border-color .2s}
#input-form textarea:focus{border-color:var(--accent)}
#input-form button{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
#input-form button:hover{background:var(--accent-hover)}
#input-form button:disabled{opacity:.5;cursor:not-allowed}
#error{border:1px solid #f85149;background:#f8514911;color:#f85149;padding:10px 14px;border-radius:var(--radius);margin:0 auto 8px;max-width:800px;font-size:13px;display:none}
#model-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 12px;font-size:13px;outline:none;margin-right:auto}
.scroll-btn{position:fixed;bottom:100px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);transition:background .2s;z-index:10}
.scroll-btn:hover{background:var(--border)}
@media(max-width:600px){#chat{padding:12px}.message{padding:12px;font-size:13px}header{padding:10px 14px;flex-wrap:wrap}#input-area{padding:12px 14px}}
</style>
</head>
<body>
<header>
  <h1>vLLM</h1>
  <span id="model-name">loading...</span>
  <select id="model-select" style="display:none"></select>
</header>
<div id="chat">
  <div style="text-align:center;color:var(--text-muted);padding:40px 20px;font-size:14px" id="welcome">
    <div style="font-size:48px;margin-bottom:12px">&#x1f4ac;</div>
    <div>Send a message to start chatting.</div>
  </div>
</div>
<div id="error"></div>
<div id="input-area">
  <form id="input-form" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Type a message..." enterkeyhint="send"></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>
<button class="scroll-btn" id="scroll-btn" onclick="scrollToBottom()">&#8595;</button>

<script>
const chat=document.getElementById('chat');
const form=document.getElementById('input-form');
const input=document.getElementById('input');
const sendBtn=document.getElementById('send-btn');
const errorDiv=document.getElementById('error');
const modelSelect=document.getElementById('model-select');
const modelName=document.getElementById('model-name');
const scrollBtn=document.getElementById('scroll-btn');
let abortController=null;

chat.addEventListener('scroll',()=>{
  const d=chat.scrollHeight-chat.clientHeight-chat.scrollTop;
  scrollBtn.style.display=d>200?'flex':'none';
});

function scrollToBottom(){chat.scrollTop=chat.scrollHeight}

function autoResize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px'}

function showError(msg){errorDiv.textContent=msg;errorDiv.style.display='block'}
function hideError(){errorDiv.style.display='none'}

function addMessage(role,content,streaming=false){
  hideError();
  const el=document.createElement('div');
  el.className='message '+role;
  if(streaming)el.classList.add('typing');
  const roleLabel=role==='user'?'You':'Assistant';
  el.innerHTML='<div class="role">'+roleLabel+'</div><div class="content"></div>';
  if(!streaming)el.querySelector('.content').innerHTML=marked.parse(content||'');
  else el.querySelector('.content').innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  chat.appendChild(el);
  if(!streaming)scrollToBottom();
  return el;
}

async function loadModels(){
  try{
    const r=await fetch('/v1/models');
    const d=await r.json();
    const models=d.data||[];
    if(models.length>1||window.location.hostname!=='127.0.0.1'){
      modelSelect.style.display='';
      modelSelect.innerHTML=models.map(m=>'<option value="'+m.id+'">'+m.id+'</option>').join('');
      modelName.textContent='';
    }else if(models.length===1){
      modelName.textContent=models[0].id;
    }
  }catch(e){modelName.textContent='(unreachable)';showError('Could not reach vLLM API at /v1/models')}
}

loadModels();

function getModel(){return modelSelect.style.display!=='none'?modelSelect.value:(modelName.textContent||'')}

async function sendMessage(){
  const text=input.value.trim();
  if(!text||sendBtn.disabled)return;
  hideError();
  addMessage('user',text);
  input.value='';autoResize();sendBtn.disabled=true;
  abortController=new AbortController();

  const assistantMsg=addMessage('assistant','',true);
  const contentDiv=assistantMsg.querySelector('.content');
  let fullContent='';

  try{
    const r=await fetch('/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:getModel(),
        messages:[...document.querySelectorAll('.message:not(.typing)')].map(m=>({
          role:m.classList.contains('user')?'user':'assistant',
          content:m.querySelector('.content').textContent
        })),
        stream:true,
        max_tokens:2048,
        temperature:0.7,
      }),
      signal:abortController.signal,
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({error:{message:r.statusText}}));
      throw new Error(err.error?.message||r.statusText);
    }
    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]')continue;
        try{
          const parsed=JSON.parse(data);
          const delta=parsed.choices?.[0]?.delta?.content||'';
          fullContent+=delta;
          contentDiv.innerHTML=marked.parse(fullContent);
          scrollToBottom();
        }catch(e){/* skip partial JSON */}
      }
    }
  }catch(e){
    if(e.name==='AbortError'){fullContent+='\n\n_[stopped]_'}
    else{showError('Error: '+e.message);fullContent+='\n\n_[error: '+e.message+']_'}
  }finally{
    abortController=null;
    assistantMsg.classList.remove('typing');
    contentDiv.innerHTML=marked.parse(fullContent||'_(empty response)_');
    scrollToBottom();
    sendBtn.disabled=false;
    input.focus();
  }
}

form.addEventListener('submit',e=>{e.preventDefault();sendMessage()});
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});
input.addEventListener('input',autoResize);

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&abortController){abortController.abort();sendBtn.disabled=false}
});
</script>
</body>
</html>
