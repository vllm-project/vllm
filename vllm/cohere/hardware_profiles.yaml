# Applied in order, later profiles override earlier ones.
# Hardware profiles define runtime args/env for vLLM serving and benchmarks.
profiles:
  - name: vllm-default
    when: server.type == "vllm"
    args:
      gpu-memory-utilization: "0.95"
      enable-chunked-prefill: ""
      max-num-batched-tokens: "8192"
      max-num-seqs: "128"
      max-model-len: "256000"
      max-cudagraph-capture-size: "128"
      # Cohere thinking markers for ReasoningConfig / thinking-token-budget.
      reasoning-config: '{"reasoning_start_str":"<|START_THINKING|>","reasoning_end_str":"<|END_THINKING|>"}'
    env:
      VLLM_USE_V1: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn

  # We use a triton moe backend since we end up with a
  # illegal memory access error which originates from
  # moe fp8 kernel
  - name: vllm-h100
    when: server.type == "vllm" && matches(gpu.name, "h100")
    args:
      moe-backend: "triton"

  - name: vllm-b200
    # exclude GB200 explicitly since matches uses substring match
    when: server.type == "vllm" && matches(gpu.name, "b200") && !matches(gpu.name, "gb200")
    args:
      attention-backend: "FLASHINFER"
      mm-encoder-attn-backend: "TORCH_SDPA"
    env:
      VLLM_ZERO_NULL_KV_BLOCK_AFTER_CUDA_GRAPH_CAPTURE: "true"

  - name: vllm-gb200
    when: server.type == "vllm" && matches(gpu.name, "gb200")
    args:
      attention-backend: "FLASHINFER"
    env:
      VLLM_ZERO_NULL_KV_BLOCK_AFTER_CUDA_GRAPH_CAPTURE: "true"

  - name: vllm-mi300x
    when: server.type == "vllm" && matches(gpu.name, "mi300x")
    args:
      attention-backend: "TRITON_ATTN"
    env:
      VLLM_ROCM_USE_AITER: "1"
      VLLM_ROCM_USE_AITER_MHA: "1"
      VLLM_ROCM_USE_AITER_FUSION_SHARED_EXPERTS: "0"
      VLLM_ROCM_USE_AITER_UNIFIED_ATTENTION: "1"
