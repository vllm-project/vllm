services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      # Persist pip cache across container rebuilds
      - vllm-pip-cache:/root/.cache/pip
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      - ROCR_VISIBLE_DEVICES=0
      - PYTORCH_ROCM_ARCH=gfx1030
      - HIP_FORCE_DEV_KERNARG=1
      - SAFETENSORS_FAST_GPU=1
      - TOKENIZERS_PARALLELISM=false
    security_opt:
      # Required for ROCm GPU access on SELinux systems (Fedora)
      - label=disable
    # vLLM uses shared memory for multi-process tensor sharing
    shm_size: '16g'
    command: sleep infinity

volumes:
  vllm-pip-cache:
