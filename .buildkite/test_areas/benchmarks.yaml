group: Benchmarks
depends_on: 
  - image-build
steps:
- label: Benchmarks CLI Test
  key: benchmarks-cli-test
  timeout_in_minutes: 45
  device: h200_18gb
  source_file_dependencies:
  - vllm/
  - tests/benchmarks/
  commands:
  - pytest -v -s benchmarks/
  mirror:
    amd:
      dind: false
      device: mi300_1
      depends_on:
      - image-build-amd

- label: Attention Benchmarks Smoke Test (B200)
  key: attention-benchmarks-smoke-test-b200
  device: b200-k8s
  num_gpus: 2
  optional: true
  working_dir: "/vllm-workspace/"
  timeout_in_minutes: 20
  source_file_dependencies:
  - benchmarks/attention_benchmarks/
  - vllm/v1/attention/
  commands:
  - python3 benchmarks/attention_benchmarks/benchmark.py --backends flash flashinfer --batch-specs "8q1s1k"
