group: Quantization
depends_on:
  - image-build
steps:
- label: Quantization
  key: quantization
  timeout_in_minutes: 90
  source_file_dependencies:
  - csrc/
  - vllm/model_executor/layers/quantization
  - tests/quantization
  commands:
  # temporary install here since we need nightly, will move to requirements/test/cuda.in
  # after torchao 0.12 release, and pin a working version of torchao nightly here

  # since torchao nightly is only compatible with torch nightly currently
  # https://github.com/pytorch/ao/issues/2919, we'll have to skip new torchao tests for now
  # we can only upgrade after this is resolved
  # TODO(jerryzh168): resolve the above comment
  - uv pip install --system torchao==0.17.0 --index-url https://download.pytorch.org/whl/cu130
  - uv pip install --system conch-triton-kernels
  - VLLM_TEST_FORCE_LOAD_FORMAT=auto pytest -v -s quantization/ --ignore quantization/test_blackwell_moe.py

- label: Quantized MoE Test (B200)
  key: quantized-moe-test-b200
  timeout_in_minutes: 60
  working_dir: "/vllm-workspace/"
  device: b200-k8s
  source_file_dependencies:
  - tests/quantization/test_blackwell_moe.py
  - vllm/model_executor/models/deepseek_v2.py
  - vllm/model_executor/models/gpt_oss.py
  - vllm/model_executor/models/llama4.py
  - vllm/model_executor/layers/fused_moe
  - vllm/model_executor/layers/quantization/compressed_tensors
  - vllm/model_executor/layers/quantization/modelopt.py
  - vllm/model_executor/layers/quantization/mxfp4.py
  - vllm/v1/attention/backends/flashinfer.py
  commands:
    - pytest -s -v tests/quantization/test_blackwell_moe.py

- label: Quantized MoE Test (MI355)
  key: quantized-moe-test-mi355
  depends_on:
  - image-build-amd
  timeout_in_minutes: 180
  device : mi355_1
  soft_fail: true
  working_dir: "/vllm-workspace/tests"
  source_file_dependencies:
  - vllm/model_executor/layers/quantization/quark/
  - vllm/model_executor/models/deepseek_v2.py
  - vllm/model_executor/models/gpt_oss.py
  - vllm/model_executor/models/llama4.py
  - vllm/model_executor/layers/fused_moe
  - vllm/model_executor/layers/quantization/compressed_tensors
  - vllm/model_executor/layers/quantization/modelopt.py
  - vllm/model_executor/layers/quantization/mxfp4.py
  - vllm/v1/attention/backends/triton_attn.py
  - vllm/v1/attention/backends/rocm_attn.py
  - vllm/v1/attention/backends/rocm_aiter_fa.py
  - vllm/v1/attention/backends/mla/
  - vllm/v1/attention/selector.py
  - vllm/model_executor/layers/layernorm.py
  - vllm/_aiter_ops.py
  - vllm/platforms/rocm.py
  - vllm/model_executor/model_loader/
  - tests/quantization/test_gfx950_moe.py
  - tests/quantization/test_quark.py
  commands:
  - pytest -s -v quantization/test_gfx950_moe.py

- label: Quantization Quark Eval (2xMI355)
  key: quantized-quark-eval-2xmi355
  depends_on:
  - image-build-amd
  timeout_in_minutes: 180
  device: mi355_2
  optional: true
  soft_fail: true
  working_dir: "/vllm-workspace/tests"
  source_file_dependencies:
  - csrc/
  - vllm/model_executor/layers/quantization/
  - vllm/model_executor/layers/quantization/quark/
  - vllm/model_executor/layers/fused_moe/
  - vllm/model_executor/layers/layernorm.py
  - vllm/model_executor/models/
  - vllm/model_executor/models/qwen2_moe.py
  - vllm/model_executor/model_loader/
  - vllm/v1/attention/backends/
  - vllm/v1/attention/backends/mla/
  - vllm/v1/attention/selector.py
  - tests/quantization
  - tests/quantization/test_quark.py
  - vllm/_aiter_ops.py
  - vllm/platforms/rocm.py
  commands:
  - uv pip install --system torchao==0.17.0
  - uv pip install --system conch-triton-kernels
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - VLLM_TEST_FORCE_LOAD_FORMAT=auto pytest -v -s quantization/test_quark.py -k "ocp_mx_wikitext_correctness and tp2"

- label: Quantized Models Test
  key: quantized-models-test
  timeout_in_minutes: 60
  source_file_dependencies:
  - vllm/model_executor/layers/quantization
  - tests/models/quantization
  commands:
    - pytest -v -s models/quantization
