group: Torch ABI
depends_on:
  - image-build
steps:
- label: Torch Stable ABI Audit
  key: torch-stable-abi-audit
  timeout_in_minutes: 5
  source_file_dependencies:
  - .buildkite/check-torch-abi.py
  - .buildkite/scripts/check-torch-abi.sh
  - csrc/
  - cmake/
  - setup.py
  commands:
  - bash /vllm-workspace/.buildkite/scripts/check-torch-abi.sh
