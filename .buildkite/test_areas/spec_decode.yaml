group: Spec Decode
depends_on:
  - image-build
steps:
- label: Spec Decode Eagle
  key: spec-decode-eagle
  timeout_in_minutes: 25
  device: h200_18gb
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "eagle_correctness"
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 60
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/v1/spec_decode/
      - vllm/v1/worker/gpu/spec_decode/
      - vllm/model_executor/model_loader/
      - vllm/v1/sample/
      - vllm/model_executor/layers/
      - tests/v1/e2e/spec_decode/
      - vllm/platforms/rocm.py

- label: Spec Decode Eagle Nightly B200
  key: spec-decode-eagle-nightly-b200
  timeout_in_minutes: 25
  device: b200-k8s
  optional: true
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "eagle_correctness"

- label: Spec Decode Speculators + MTP
  key: spec-decode-speculators-mtp
  timeout_in_minutes: 20
  device: h200_18gb
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - vllm/v1/attention/backends/
    - vllm/transformers_utils/configs/speculators/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "speculators or mtp_correctness"
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 65
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/v1/spec_decode/
      - vllm/v1/worker/gpu/spec_decode/
      - vllm/model_executor/model_loader/
      - vllm/v1/sample/
      - vllm/model_executor/layers/
      - vllm/transformers_utils/configs/speculators/
      - tests/v1/e2e/spec_decode/
      - vllm/platforms/rocm.py

- label: Spec Decode Speculators + MTP Nightly B200
  key: spec-decode-speculators-mtp-nightly-b200
  timeout_in_minutes: 30
  device: b200-k8s
  optional: true
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - vllm/transformers_utils/configs/speculators/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "speculators or mtp_correctness"
  
- label: Spec Decode Ngram + Suffix
  key: spec-decode-ngram-suffix
  timeout_in_minutes: 20
  device: h200_18gb
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "ngram or suffix"
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 55
      # TODO(akaratza): Test after Torch >= 2.12 bump
      soft_fail: true
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/v1/spec_decode/
      - vllm/v1/worker/gpu/spec_decode/
      - vllm/model_executor/model_loader/
      - vllm/v1/sample/
      - vllm/model_executor/layers/
      - tests/v1/e2e/spec_decode/
      - vllm/platforms/rocm.py

- label: Spec Decode Draft Model
  key: spec-decode-draft-model
  timeout_in_minutes: 45
  device: h200_18gb
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "draft_model or no_sync or batch_inference"
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 55
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/v1/spec_decode/
      - vllm/v1/worker/gpu/spec_decode/
      - vllm/model_executor/model_loader/
      - vllm/v1/sample/
      - vllm/model_executor/layers/
      - tests/v1/e2e/spec_decode/
      - vllm/platforms/rocm.py

- label: Spec Decode Draft Model Nightly B200
  key: spec-decode-draft-model-nightly-b200
  timeout_in_minutes: 40
  device: b200-k8s
  optional: true
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "draft_model or no_sync or batch_inference"

- label: Speculators Correctness
  key: speculators-correctness
  timeout_in_minutes: 30
  device: h100
  optional: true
  num_devices: 1
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/model_executor/models/qwen3_dflash.py
    - tests/v1/spec_decode/test_speculators_correctness.py
  commands:
    - export VLLM_ALLOW_INSECURE_SERIALIZATION=1
    - pytest -v -s v1/spec_decode/test_speculators_correctness.py -m slow_test

- label: Spec Decode MTP hybrid (B200)
  timeout_in_minutes: 20
  device: b200-k8s
  optional: true
  source_file_dependencies:
    - vllm/v1/spec_decode/
    - vllm/v1/worker/gpu/spec_decode/
    - vllm/model_executor/models/qwen3_5.py
    - vllm/model_executor/models/qwen3_5_mtp.py
    - tests/v1/e2e/spec_decode/
  commands:
    - pytest -v -s v1/e2e/spec_decode -k "qwen3_5-hybrid"

- label: Spec Decode DeepSeek MTP Parallel Load (B200)
  key: spec-decode-deepseek-mtp-parallel-load-b200
  timeout_in_minutes: 30
  device: b200-k8s
  optional: true
  num_devices: 2
  source_file_dependencies:
    - vllm/v1/spec_decode/llm_base_proposer.py
    - vllm/v1/spec_decode/eagle.py
    - vllm/v1/worker/gpu/spec_decode/eagle/
    - vllm/model_executor/models/deepseek_mtp.py
    - vllm/model_executor/models/deepseek_v2.py
    - tests/v1/e2e/spec_decode/test_mtp_parallel_load.py
  commands:
    - pytest -v -s v1/e2e/spec_decode/test_mtp_parallel_load.py
