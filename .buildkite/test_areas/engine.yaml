group: Engine
depends_on:
  - image-build
steps:
- label: Engine
  key: engine
  timeout_in_minutes: 15
  device: h200_18gb
  source_file_dependencies:
  - vllm/compilation/
  - vllm/config/
  - vllm/engine/
  - vllm/entrypoints/logger.py
  - vllm/envs.py
  - vllm/logger.py
  - vllm/logging_utils/
  - vllm/platforms/
  - vllm/sequence.py
  - vllm/triton_utils/
  - vllm/utils/
  - tests/engine
  - tests/test_sequence
  - tests/test_config
  - tests/test_logger
  - tests/test_vllm_port
  - tests/test_jit_monitor.py
  commands:
  - pytest -v -s engine test_sequence.py test_config.py test_logger.py test_vllm_port.py test_jit_monitor.py
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 60
      depends_on:
      - image-build-amd

- label: Engine (1 GPU)
  key: engine-1-gpu
  timeout_in_minutes: 30
  source_file_dependencies:
    - vllm/v1/engine/
    - tests/v1/engine/
  commands:
    - pytest -v -s v1/engine/test_preprocess_error_handling.py
    - pytest -v -s v1/engine --ignore v1/engine/test_preprocess_error_handling.py
  mirror:
    amd:
      device: mi325_1
      timeout_in_minutes: 40
      depends_on:
      - image-build-amd

- label: e2e Scheduling (1 GPU)
  key: e2e-scheduling-1-gpu
  timeout_in_minutes: 30
  device: h200_18gb
  source_file_dependencies:
    - vllm/v1/
    - tests/v1/e2e/general/
  commands:
    - pytest -v -s v1/e2e/general/test_async_scheduling.py
  mirror:
    amd:
      device: mi250_1
      timeout_in_minutes: 60
      depends_on:
      - image-build-amd

- label: e2e Core (1 GPU)
  device: h200_35gb
  key: e2e-core-1-gpu
  timeout_in_minutes: 30
  source_file_dependencies:
    - vllm/v1/
    - tests/v1/e2e/general/
  commands:
    - pytest -v -s v1/e2e/general --ignore v1/e2e/general/test_async_scheduling.py
  mirror:
    amd:
      device: mi250_1
      timeout_in_minutes: 35
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/v1/
      - tests/v1/e2e/general/
      - vllm/platforms/rocm.py

- label: V1 e2e (2 GPUs)
  key: v1-e2e-2-gpus
  timeout_in_minutes: 60 # TODO: Fix timeout after we have more confidence in the test stability
  optional: true
  num_devices: 2
  source_file_dependencies:
    - vllm/compilation/
    - vllm/config/
    - vllm/distributed/
    - vllm/engine/
    - vllm/envs.py
    - vllm/forward_context.py
    - vllm/inputs/
    - vllm/logger.py
    - vllm/logging_utils/
    - vllm/model_executor/
    - vllm/multimodal/
    - vllm/platforms/
    - vllm/sampling_params.py
    - vllm/transformers_utils/
    - vllm/triton_utils/
    - vllm/utils/
    - vllm/v1/
    - tests/v1/e2e/spec_decode
  commands:
    # Only run tests that need exactly 2 GPUs
    - pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k "tensor_parallelism"
  mirror:
    amd:
      device: mi300_2
      depends_on:
      - image-build-amd

- label: V1 e2e (4 GPUs)
  key: v1-e2e-4-gpus
  timeout_in_minutes: 60 # TODO: Fix timeout after we have more confidence in the test stability
  optional: true
  num_devices: 4
  source_file_dependencies:
    - vllm/compilation/
    - vllm/config/
    - vllm/distributed/
    - vllm/engine/
    - vllm/envs.py
    - vllm/forward_context.py
    - vllm/inputs/
    - vllm/logger.py
    - vllm/logging_utils/
    - vllm/model_executor/
    - vllm/multimodal/
    - vllm/platforms/
    - vllm/sampling_params.py
    - vllm/transformers_utils/
    - vllm/triton_utils/
    - vllm/utils/
    - vllm/v1/
    - tests/v1/e2e/spec_decode
  commands:
    # Only run tests that need 4 GPUs
    - pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k "eagle_correctness_heavy"

- label: V1 e2e (4xH100)
  key: v1-e2e-4xh100
  timeout_in_minutes: 60
  device: h100
  num_devices: 4
  optional: true
  source_file_dependencies:
    - vllm/v1/attention/backends/utils.py
    - vllm/v1/worker/gpu_model_runner.py
    - tests/v1/e2e/test_hybrid_chunked_prefill.py
  commands:
    - pytest -v -s v1/e2e/test_hybrid_chunked_prefill.py

- label: Hybrid Mamba prefix cache correctness (4xH200)
  key: v1-e2e-hybrid-mamba-prefix-cache-4xh200
  # Two e2e tests x two engine boots each, incl. a 120B BF16 TP4 model
  # (~240 GB weights: needs 141 GB/GPU H200-class capacity; validated on
  # GB200 — 4x80GB H100 would leave no headroom at gpu_mem_util=0.8).
  # --runxfail: both tests are xfail(raises=CorruptionDetected) while
  # #43559 is unfixed; this optional (non-gating) step surfaces the live
  # corruption as a red dashboard instead of hiding it in XFAIL counts.
  # Drop --runxfail together with the markers once a fix merges.
  timeout_in_minutes: 240
  device: h200
  num_devices: 4
  optional: true
  source_file_dependencies:
    - vllm/v1/core/
    - vllm/v1/worker/gpu_model_runner.py
    - tests/v1/e2e/test_hybrid_mamba_prefix_cache_correctness.py
  commands:
    - pytest -v -s --runxfail -rA v1/e2e/test_hybrid_mamba_prefix_cache_correctness.py
