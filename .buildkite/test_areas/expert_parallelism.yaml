group: Expert Parallelism
depends_on: 
  - image-build
steps:
- label: EPLB Algorithm
  key: eplb-algorithm
  timeout_in_minutes: 20
  device: h200_18gb
  working_dir: "/vllm-workspace/tests"
  source_file_dependencies:
  - vllm/distributed/eplb
  - tests/distributed/test_eplb_algo.py
  - tests/distributed/test_eplb_utils.py
  commands:
  - pytest -v -s distributed/test_eplb_algo.py
  - pytest -v -s distributed/test_eplb_utils.py
  mirror:
    amd:
      native_ci: true
      device: mi300_1
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - .buildkite/hardware_tests/amd.yaml
      - .buildkite/scripts/ci-bake-rocm.sh
      - .buildkite/scripts/hardware_ci/run-amd-test.sh
      - .buildkite/scripts/rocm/build-ci-base.sh
      - .buildkite/scripts/rocm/build-test-image.sh
      - docker/Dockerfile.rocm
      - docker/Dockerfile.rocm_base
      - docker/ci-rocm.hcl
      - docker/docker-bake-rocm.hcl
      - requirements/rocm.txt
      - requirements/test/rocm.txt
      - vllm/distributed/eplb
      - tests/distributed/test_eplb_algo.py
      - tests/distributed/test_eplb_utils.py
      - vllm/platforms/rocm.py

- label: EPLB Execution # 17min
  key: eplb-execution
  timeout_in_minutes: 25
  working_dir: "/vllm-workspace/tests"
  num_devices: 4
  source_file_dependencies:
  - vllm/distributed/eplb
  - tests/distributed/test_eplb_execute.py
  commands:
  - pytest -v -s distributed/test_eplb_execute.py
  - pytest -v -s distributed/test_eplb_spec_decode.py

- label: Elastic EP Scaling Test
  key: elastic-ep-scaling-test
  timeout_in_minutes: 30
  device: h100
  working_dir: "/vllm-workspace/tests"
  num_devices: 4
  source_file_dependencies:
  - vllm/distributed/
  - vllm/engine/
  - vllm/executor/
  - vllm/compilation/
  - tests/distributed/
  commands:
  - pytest -v -s distributed/test_elastic_ep.py
