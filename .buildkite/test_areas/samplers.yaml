group: Samplers
depends_on: 
  - image-build
steps:
- label: Samplers Test
  device: h200_35gb
  key: samplers-test
  timeout_in_minutes: 75
  source_file_dependencies:
  - vllm/model_executor/layers
  - vllm/sampling_metadata.py
  - tests/samplers
  - tests/conftest.py
  - vllm/entrypoints/generate/beam_search
  commands:
    # VLLM_USE_FLASHINFER_SAMPLER defaults to 1 now, so we need to pin both
    # values explicitly to still cover the PyTorch-native (Triton) path.
    - VLLM_USE_FLASHINFER_SAMPLER=0 pytest -v -s samplers
    - VLLM_USE_FLASHINFER_SAMPLER=1 pytest -v -s samplers
  mirror:
    amd:
      device: mi300_1
      depends_on:
      - image-build-amd
      source_file_dependencies:
      - vllm/model_executor/layers
      - vllm/sampling_metadata.py
      - vllm/v1/sample/
      - vllm/entrypoints/generate/beam_search/
      - tests/samplers
      - tests/conftest.py
      - vllm/_aiter_ops.py
      - vllm/platforms/rocm.py
      commands:
      - pytest -v -s samplers
