# Duplicates current AMD mirror coverage onto MI300_1 only.
# Parent steps stay optional so they do not schedule cpu-small jobs.
# The AMD mirror blocks can be opened manually to create MI300_1 workload.
group: AMD MI300_1 workload multiplier
steps:
- label: 'MI300_1 x12: V1 attention (H100-MI300)'
  key: mi300-1-x12-v1-attention-h100-mi300
  timeout_in_minutes: 70
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s v1/attention
- label: 'MI300_1 x12: Engine'
  key: mi300-1-x12-engine
  timeout_in_minutes: 60
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s engine test_sequence.py test_config.py test_logger.py test_vllm_port.py test_jit_monitor.py
- label: 'MI300_1 x12: Engine (1 GPU)'
  key: mi300-1-x12-engine-1-gpu
  timeout_in_minutes: 40
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s v1/engine/test_preprocess_error_handling.py
      - pytest -v -s v1/engine --ignore v1/engine/test_preprocess_error_handling.py
- label: 'MI300_1 x12: e2e Scheduling (1 GPU)'
  key: mi300-1-x12-e2e-scheduling-1-gpu
  timeout_in_minutes: 60
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s v1/e2e/general/test_async_scheduling.py
- label: 'MI300_1 x12: Entrypoints Integration (LLM)'
  key: mi300-1-x12-entrypoints-integration-llm
  timeout_in_minutes: 40
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s entrypoints/llm --ignore=entrypoints/llm/test_generate.py --ignore=entrypoints/llm/test_collective_rpc.py
        --ignore=entrypoints/llm/offline_mode
      - pytest -v -s entrypoints/llm/test_generate.py
      - pytest -v -s entrypoints/llm/offline_mode
- label: 'MI300_1 x12: Entrypoints Integration (API Server)'
  key: mi300-1-x12-entrypoints-integration-api-server
  timeout_in_minutes: 130
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s entrypoints/serve --ignore=entrypoints/serve/dev/rpc
      - PYTHONPATH=/vllm-workspace pytest -v -s entrypoints/serve/dev/rpc
- label: 'MI300_1 x12: Entrypoints Integration (API Server OpenAI - Part 1)'
  key: mi300-1-x12-entrypoints-integration-api-server-openai-part-1
  timeout_in_minutes: 80
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s entrypoints/openai --ignore=entrypoints/openai/completion --ignore=entrypoints/openai/chat_completion
        --ignore=entrypoints/openai/responses --ignore=entrypoints/openai/correctness
- label: 'MI300_1 x12: Entrypoints Integration (API Server OpenAI - Part 2)'
  key: mi300-1-x12-entrypoints-integration-api-server-openai-part-2
  timeout_in_minutes: 80
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s entrypoints/openai/chat_completion
      - pytest -v -s entrypoints/openai/completion --ignore=entrypoints/openai/completion/test_tensorizer_entrypoint.py
- label: 'MI300_1 x12: Entrypoints Integration (API Server Generate)'
  key: mi300-1-x12-entrypoints-integration-api-server-generate
  timeout_in_minutes: 60
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s tool_use
      - pytest -v -s entrypoints/tool_parsers
      - pytest -v -s entrypoints/generate
      - pytest -v -s entrypoints/anthropic
- label: 'MI300_1 x12: OpenAI API Correctness'
  key: mi300-1-x12-openai-api-correctness
  timeout_in_minutes: 30
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - bash ../tools/install_torchcodec_rocm.sh || exit 1
      - pytest -s entrypoints/openai/correctness/
- label: 'MI300_1 x12: Kernels Quantization Test %N'
  key: mi300-1-x12-kernels-quantization-test
  timeout_in_minutes: 90
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 24
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s kernels/quantization --shard-id=$$BUILDKITE_PARALLEL_JOB --num-shards=$$BUILDKITE_PARALLEL_JOB_COUNT
- label: 'MI300_1 x12: LM Eval Small Models'
  key: mi300-1-x12-lm-eval-small-models
  timeout_in_minutes: 55
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -s -v evals/gsm8k/test_gsm8k_correctness.py --config-list-file=configs/models-small.txt
- label: 'MI300_1 x12: V1 Sample + Logits'
  key: mi300-1-x12-v1-sample-logits
  timeout_in_minutes: 30
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s v1/sample
      - pytest -v -s v1/logits_processors
      - pytest -v -s v1/test_oracle.py
      - pytest -v -s v1/test_request.py
      - pytest -v -s v1/test_outputs.py
- label: 'MI300_1 x12: Language Models Tests (Hybrid) %N'
  key: mi300-1-x12-language-models-tests-hybrid
  timeout_in_minutes: 90
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 24
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - uv pip install --system --no-build-isolation 'git+https://github.com/AndreasKaratzas/mamba@fix-rocm-7.0-warp-size-constexpr'
      - uv pip install --system --no-build-isolation 'git+https://github.com/Dao-AILab/causal-conv1d@v1.6.0'
      - pytest -v -s models/language/generation -m hybrid_model --num-shards=$$BUILDKITE_PARALLEL_JOB_COUNT --shard-id=$$BUILDKITE_PARALLEL_JOB
- label: 'MI300_1 x12: Language Models Test (Extended Pooling)'
  key: mi300-1-x12-language-models-test-extended-pooling
  timeout_in_minutes: 100
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s models/language/pooling -m 'not core_model'
- label: 'MI300_1 x12: Multi-Modal Models (Standard) 1: qwen2'
  key: mi300-1-x12-multi-modal-models-standard-1-qwen2
  timeout_in_minutes: 45
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pip install git+https://github.com/TIGER-AI-Lab/Mantis.git
      - pytest -v -s models/multimodal/generation/test_common.py -m core_model -k "qwen2"
      - pytest -v -s models/multimodal/generation/test_ultravox.py -m core_model
- label: 'MI300_1 x12: Multi-Modal Models (Standard) 2: qwen3 + gemma'
  key: mi300-1-x12-multi-modal-models-standard-2-qwen3-gemma
  timeout_in_minutes: 45
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
