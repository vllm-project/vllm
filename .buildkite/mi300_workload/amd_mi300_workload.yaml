  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pip install git+https://github.com/TIGER-AI-Lab/Mantis.git
      - pytest -v -s models/multimodal/generation/test_common.py -m core_model -k "qwen3 or gemma"
      - pytest -v -s models/multimodal/generation/test_qwen2_5_vl.py -m core_model
      - pytest -v -s models/multimodal/generation/test_vit_cudagraph.py -m core_model
- label: 'MI300_1 x12: Multi-Modal Models (Standard) 3: llava + qwen2_vl'
  key: mi300-1-x12-multi-modal-models-standard-3-llava-qwen2-vl
  timeout_in_minutes: 45
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 12
  source_file_dependencies:
  - .buildkite/mi300_workload/amd_mi300_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
