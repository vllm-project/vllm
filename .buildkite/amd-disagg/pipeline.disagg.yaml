# =============================================================================
# Disaggregated P/D (MoRIIO) SLURM gate — step snippet.
# -----------------------------------------------------------------------------
# The Buildkite agent must run on the SLURM login node and
# carry the `agent_pool` tag used here.
#
# Start gated `optional: true`; promote to required after several green runs.
# =============================================================================
steps:
  - label: "ROCm Disagg P/D 1P1D TP8 (MoRIIO + toy proxy) — SLURM"
    key: rocm-disagg-pd-1p1d-tp8-slurm-proxy
    agent_pool: amd_mi250_8 
    timeout_in_minutes: 120
    no_plugin: true                   # sbatch manages containers; skip docker plugin
    optional: true                    # does not block PRs while the queue stabilizes
    depends_on:
      - image-build-amd
    source_file_dependencies:
      - vllm/distributed/kv_transfer/
      - vllm/platforms/rocm.py
      - .buildkite/amd-disagg/
    env:
      NODES: "2"
      GPUS_PER_NODE: "8"
      WIDE_EP_MODE: "0"
      RUN_AFTER_HEALTH: "accuracy"
      SLURM_PARTITION: "amd-rccl"
      SLURM_TIME_LIMIT: "08:30:00"
    commands:
      - bash .buildkite/amd-disagg/run-slurm-disagg-test.sh

  - label: "ROCm Disagg P/D 1P1D TP8 (MoRIIO + vllm-router) — SLURM"
    key: rocm-disagg-pd-1p1d-tp8-router-slurm
    agent_pool: amd_mi250_8
    timeout_in_minutes: 120
    no_plugin: true                   # sbatch manages containers; skip docker plugin
    optional: true                    # does not block PRs while the queue stabilizes
    depends_on:
      - image-build-amd
    source_file_dependencies:
      - vllm/distributed/kv_transfer/
      - vllm/platforms/rocm.py
      - .buildkite/amd-disagg/
    env:
      NODES: "2"
      GPUS_PER_NODE: "8"
      WIDE_EP_MODE: "0"
      RUN_AFTER_HEALTH: "accuracy"
      ROUTER_TYPE: "vllm-router"       # external vllm/vllm-router container (vs in-container toy proxy)
      SLURM_PARTITION: "amd-rccl"
      SLURM_TIME_LIMIT: "08:30:00"
    commands:
      - bash .buildkite/amd-disagg/run-slurm-disagg-test.sh

  - label: "ROCm Disagg P/D 1P1D EP8/DP8 WideEP (MoRIIO + toy proxy) — SLURM"
    key: rocm-disagg-pd-1p1d-ep8-slurm-proxy
    agent_pool: amd_mi250_8 
    timeout_in_minutes: 120
    no_plugin: true                   # sbatch manages containers; skip docker plugin
    optional: true                    # does not block PRs while the queue stabilizes
    depends_on:
      - image-build-amd
    source_file_dependencies:
      - vllm/distributed/kv_transfer/
      - vllm/platforms/rocm.py
      - .buildkite/amd-disagg/
    env:
      NODES: "2"
      GPUS_PER_NODE: "8"
      WIDE_EP_MODE: "1"
      RUN_AFTER_HEALTH: "accuracy"
      SLURM_PARTITION: "amd-rccl"
      SLURM_TIME_LIMIT: "08:30:00"
    commands:
      - bash .buildkite/amd-disagg/run-slurm-disagg-test.sh
