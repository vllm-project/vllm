group: LoRA Intel
depends_on:
  - image-build-xpu
steps:
- label: LoRA %N
  timeout_in_minutes: 30
  device: intel_gpu
  no_plugin: true
  env:
    VLLM_TEST_DEVICE: "xpu"
  source_file_dependencies:
  - vllm/lora
  - tests/lora
  commands:
    - pytest -v -s tests/lora --ignore=tests/lora/test_chatglm3_tp.py --ignore=tests/lora/test_llama_tp.py --ignore=tests/lora/test_llm_with_multi_loras.py --ignore=tests/lora/test_olmoe_tp.py --ignore=tests/lora/test_deepseekv2_tp.py --ignore=tests/lora/test_gptoss_tp.py --ignore=tests/lora/test_qwen3moe_tp.py
