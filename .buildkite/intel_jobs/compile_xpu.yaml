group: Compile XPU
depends_on:
  - image-build-xpu
steps:
- label: Sequence Parallel Correctness Tests (2 GPUs)
  device: intel_gpu
  timeout_in_minutes: 80
  num_devices: 2
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - export VLLM_TEST_CLEAN_GPU_MEMORY=1
  - pytest -v -s tests/compile/correctness_e2e/test_sequence_parallel.py
  source_file_dependencies:
  - vllm/model_executor/layers/
  - vllm/compilation/
  - vllm/v1/worker/
  - vllm/v1/cudagraph_dispatcher.py
  - tests/compile/correctness_e2e/test_sequence_parallel.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_TEST_CLEAN_GPU_MEMORY=1 || true &&
    pytest -v -s tests/compile/correctness_e2e/test_sequence_parallel.py || true'
- label: AsyncTP Correctness Tests (2xH100)
  device: intel_gpu
  timeout_in_minutes: 30
  num_devices: 2
  optional: true
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - export VLLM_TEST_CLEAN_GPU_MEMORY=1
  - pytest -v -s tests/compile/correctness_e2e/test_async_tp.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_TEST_CLEAN_GPU_MEMORY=1 || true &&
    pytest -v -s tests/compile/correctness_e2e/test_async_tp.py || true'
- label: Distributed Compile Unit Tests (2xH100)
  device: intel_gpu
  timeout_in_minutes: 45
  num_devices: 2
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - export VLLM_TEST_CLEAN_GPU_MEMORY=1
  - pytest -s -v tests/compile/passes/distributed
  source_file_dependencies:
  - vllm/compilation/
  - vllm/model_executor/layers
  - tests/compile/passes/distributed/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_TEST_CLEAN_GPU_MEMORY=1 || true &&
    pytest -s -v tests/compile/passes/distributed || true'
- label: Fusion and Compile Unit Tests (2xB200)
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - nvidia-smi
  - pytest -v -s tests/compile/passes/test_fusion_attn.py -k FLASHINFER
  - pytest -v -s tests/compile/passes/test_mla_attn_quant_fusion.py
  - pytest -v -s tests/compile/passes/test_silu_mul_quant_fusion.py
  - pytest -v -s tests/compile/passes/distributed/test_fusion_all_reduce.py
  - pytest -v -s tests/compile/fullgraph/test_full_graph.py::test_fp8_kv_scale_compile
  source_file_dependencies:
  - csrc/quantization/fp4/
  - vllm/model_executor/layers/quantization/
  - vllm/model_executor/layers/layernorm.py
  - vllm/model_executor/layers/activation.py
  - vllm/model_executor/layers/attention/attention.py
  - vllm/v1/attention/backends/flashinfer.py
  - vllm/compilation/
  - tests/compile/passes/test_fusion_attn.py
  - tests/compile/passes/test_mla_attn_quant_fusion.py
  - tests/compile/passes/test_silu_mul_quant_fusion.py
  - tests/compile/passes/distributed/test_fusion_all_reduce.py
  - tests/compile/fullgraph/test_full_graph.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'pytest -v -s tests/compile/passes/test_fusion_attn.py -k FLASHINFER || true &&
    pytest -v -s tests/compile/passes/test_mla_attn_quant_fusion.py || true &&
    pytest -v -s tests/compile/passes/test_silu_mul_quant_fusion.py || true &&
    pytest -v -s tests/compile/passes/distributed/test_fusion_all_reduce.py || true &&
    pytest -v -s tests/compile/fullgraph/test_full_graph.py::test_fp8_kv_scale_compile || true'
- label: Fusion E2E Quick (H100)
  device: intel_gpu
  timeout_in_minutes: 25
  num_devices: 1
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - nvidia-smi
  - pytest -v -s tests/compile/fusions_e2e/test_tp1_quant.py -k "inductor_partition and not +rms_norm and not +quant_fp8"
  - pytest -v -s tests/compile/fusions_e2e/test_tp1_quant.py -k "inductor_partition and not +rms_norm and +quant_fp8 and (qwen3 or deepseek)"
  source_file_dependencies:
  - csrc/quantization/
  - vllm/model_executor/
  - vllm/v1/attention/
  - vllm/compilation/
  - tests/compile/fusions_e2e/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'pytest -v -s tests/compile/fusions_e2e/test_tp1_quant.py -k inductor_partition and not +rms_norm and not +quant_fp8 || true &&
    pytest -v -s tests/compile/fusions_e2e/test_tp1_quant.py -k inductor_partition and not +rms_norm and +quant_fp8 and (qwen3 or deepseek) || true'
