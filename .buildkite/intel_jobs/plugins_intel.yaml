group: Plugins Intel
depends_on:
  - image-build-xpu
steps:
- label: Plugin Tests (2 GPUs)
  timeout_in_minutes: 60
  working_dir: .
  num_devices: 2
  device: intel_gpu
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - pip install -e ./plugins/vllm_add_dummy_platform
  - pytest -v -s plugins_tests/test_platform_plugins.py
  - pip uninstall vllm_add_dummy_platform -y
  - pytest -v -s ./plugins_tests/test_io_processor_plugins.py
  - pip install -e ./plugins/prithvi_io_processor_plugin
  - pytest -v -s plugins_tests/test_terratorch_io_processor_plugins.py
  - pip uninstall prithvi_io_processor_plugin -y
  - pip install -e ./plugins/bge_m3_sparse_plugin
  - pytest -v -s plugins_tests/test_bge_m3_sparse_io_processor_plugins.py
  - pip uninstall bge_m3_sparse_plugin -y
  - pip install -e ./plugins/colbert_query_plugin
  - pytest -v -s plugins_tests/test_colbert_query_io_processor_plugins.py
  - pip uninstall colbert_query_plugin -y
  - pip install -e ./plugins/vllm_add_dummy_stat_logger
  - pytest -v -s plugins_tests/test_stats_logger_plugins.py
  - pip uninstall dummy_stat_logger -y
  - pytest -v -s plugins_tests/test_scheduler_plugins.py
  - pip install -e ./plugins/vllm_add_dummy_model
  - pytest -v -s distributed/test_distributed_oot.py
  - pytest -v -s plugins_tests/test_oot_registration_online.py
  - pytest -v -s plugins_tests/test_oot_registration_offline.py
  - pytest -v -s plugins_tests/lora_resolvers
  source_file_dependencies:
  - vllm/plugins/
  - tests/plugins/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'pip install -e ./plugins/vllm_add_dummy_platform &&
    pytest -v -s plugins_tests/test_platform_plugins.py &&
    pip uninstall vllm_add_dummy_platform -y &&
    pytest -v -s ./plugins_tests/test_io_processor_plugins.py &&
    pip install -e ./plugins/prithvi_io_processor_plugin &&
    pytest -v -s plugins_tests/test_terratorch_io_processor_plugins.py &&
    pip uninstall prithvi_io_processor_plugin -y &&
    pip install -e ./plugins/bge_m3_sparse_plugin &&
    pytest -v -s plugins_tests/test_bge_m3_sparse_io_processor_plugins.py &&
    pip uninstall bge_m3_sparse_plugin -y &&
    pip install -e ./plugins/colbert_query_plugin &&
    pytest -v -s plugins_tests/test_colbert_query_io_processor_plugins.py &&
    pip uninstall colbert_query_plugin -y &&
    pip install -e ./plugins/vllm_add_dummy_stat_logger &&
    pytest -v -s plugins_tests/test_stats_logger_plugins.py &&
    pip uninstall dummy_stat_logger -y &&
    pytest -v -s plugins_tests/test_scheduler_plugins.py &&
    pip install -e ./plugins/vllm_add_dummy_model &&
    pytest -v -s distributed/test_distributed_oot.py &&
    pytest -v -s plugins_tests/test_oot_registration_online.py &&
    pytest -v -s plugins_tests/test_oot_registration_offline.py &&
    pytest -v -s plugins_tests/lora_resolvers'
- label: GGUF Plugin
  device: intel_gpu
  timeout_in_minutes: 30
  soft_fail: true
  optional: true
  no_plugin: true
  working_dir: .
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pip install "vllm-gguf-plugin >= 0.0.2"
  - pytest -v -s plugins_tests/gguf
  source_file_dependencies:
  - vllm/model_executor/layers/quantization
  - tests/plugins_tests/test_gguf_plugin.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'pip install "vllm-gguf-plugin >= 0.0.2" &&
    pytest -v -s plugins_tests/gguf'
