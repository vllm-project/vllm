group: Engine XPU
depends_on:
  - image-build-xpu
steps:
- label: Engine
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s engine test_sequence.py test_config.py test_logger.py test_vllm_port.py test_jit_monitor.py
  source_file_dependencies:
  - vllm/compilation/
  - vllm/config/
  - vllm/engine/
  - vllm/entrypoints/logger.py
  - vllm/envs.py
  - vllm/logger.py
  - vllm/logging_utils/
  - vllm/platforms/
  - vllm/sequence.py
  - vllm/triton_utils/
  - vllm/utils/
  - tests/engine
  - tests/test_sequence
  - tests/test_config
  - tests/test_logger
  - tests/test_vllm_port
  - tests/test_jit_monitor.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s engine test_sequence.py test_config.py test_logger.py test_vllm_port.py test_jit_monitor.py || true'
- label: Engine (1 GPU)
  device: intel_gpu
  timeout_in_minutes: 45
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s v1/engine/test_preprocess_error_handling.py
  - pytest -v -s v1/engine --ignore v1/engine/test_preprocess_error_handling.py
  source_file_dependencies:
  - vllm/v1/engine/
  - tests/v1/engine/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s v1/engine/test_preprocess_error_handling.py || true &&
    pytest -v -s v1/engine --ignore v1/engine/test_preprocess_error_handling.py || true'
- label: e2e Scheduling (1 GPU)
  device: intel_gpu
  timeout_in_minutes: 53
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s v1/e2e/general/test_async_scheduling.py
  source_file_dependencies:
  - vllm/v1/
  - tests/v1/e2e/general/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s v1/e2e/general/test_async_scheduling.py || true'
- label: e2e Core (1 GPU)
  device: intel_gpu
  timeout_in_minutes: 40
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s v1/e2e/general --ignore v1/e2e/general/test_async_scheduling.py
  source_file_dependencies:
  - vllm/v1/
  - tests/v1/e2e/general/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s v1/e2e/general --ignore v1/e2e/general/test_async_scheduling.py || true'
- label: V1 e2e (2 GPUs)
  device: intel_gpu
  timeout_in_minutes: 25
  num_devices: 2
  optional: true
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k "tensor_parallelism"
  source_file_dependencies:
  - vllm/compilation/
  - vllm/config/
  - vllm/distributed/
  - vllm/engine/
  - vllm/envs.py
  - vllm/forward_context.py
  - vllm/inputs/
  - vllm/logger.py
  - vllm/logging_utils/
  - vllm/model_executor/
  - vllm/multimodal/
  - vllm/platforms/
  - vllm/sampling_params.py
  - vllm/transformers_utils/
  - vllm/triton_utils/
  - vllm/utils/
  - vllm/v1/
  - tests/v1/e2e/spec_decode
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k tensor_parallelism || true'
