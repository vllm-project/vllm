group: Rust Frontend E2E XPU
depends_on:
  - image-build-xpu
steps:
- label: Rust Frontend OpenAI Coverage
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_USE_RUST_FRONTEND=1
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - pytest -v -s benchmarks/test_serve_cli.py -k "not insecure and not (test_bench_serve and not test_bench_serve_chat)"
  - pytest -v -s entrypoints/openai/chat_completion/test_chat_completion.py -k "not test_invalid_json_schema and not test_invalid_regex"
  - pytest -v -s entrypoints/openai/chat_completion/test_chat_logit_bias_validation.py -k "not multiple"
  - pytest -v -s entrypoints/openai/completion/test_shutdown.py -k "not engine_failure and not test_abort_timeout_exits_quickly"
  - pytest -v -s entrypoints/openai/test_return_token_ids.py -k "not test_comparison"
  - pytest -v -s entrypoints/openai/test_uds.py
  - pytest -v -s v1/sample/test_logprobs_e2e.py -k "test_prompt_logprobs_e2e_server"
  source_file_dependencies:
  - rust/
  - vllm/benchmarks/
  - vllm/entrypoints/openai/
  - vllm/entrypoints/serve/
  - vllm/v1/sample/
  - tests/utils.py
  - tests/benchmarks/test_serve_cli.py
  - tests/entrypoints/openai/chat_completion/test_chat_completion.py
  - tests/entrypoints/openai/chat_completion/test_chat_logit_bias_validation.py
  - tests/entrypoints/openai/completion/test_shutdown.py
  - tests/entrypoints/openai/test_return_token_ids.py
  - tests/entrypoints/openai/test_uds.py
  - tests/v1/sample/test_logprobs_e2e.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_RUST_FRONTEND=1 || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    pytest -v -s benchmarks/test_serve_cli.py -k not insecure and not (test_bench_serve and not test_bench_serve_chat) || true &&
    pytest -v -s entrypoints/openai/chat_completion/test_chat_completion.py -k not test_invalid_json_schema and not test_invalid_regex || true &&
    pytest -v -s entrypoints/openai/chat_completion/test_chat_logit_bias_validation.py -k not multiple || true &&
    pytest -v -s entrypoints/openai/completion/test_shutdown.py -k not engine_failure and not test_abort_timeout_exits_quickly || true &&
    pytest -v -s entrypoints/openai/test_return_token_ids.py -k not test_comparison || true &&
    pytest -v -s entrypoints/openai/test_uds.py || true &&
    pytest -v -s v1/sample/test_logprobs_e2e.py -k test_prompt_logprobs_e2e_server || true'
- label: Rust Frontend Serve/Admin Coverage
  device: intel_gpu
  timeout_in_minutes: 25
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_USE_RUST_FRONTEND=1
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - PYTHONPATH=/vllm-workspace pytest -v -s entrypoints/serve/dev/rpc/test_collective_rpc.py
  - pytest -v -s entrypoints/serve/instrumentator/test_basic.py -k "not show_version and not server_load"
  - pytest -v -s entrypoints/scale_out/token_in_token_out/test_serving_tokens.py -k "not stream and not lora and not test_generate_logprobs and not stop_string_workflow"
  - pytest -v -s entrypoints/serve/instrumentator/test_metrics.py -k "text and not show and not run_batch and not test_metrics_counts and not test_metrics_exist"
  - pytest -v -s entrypoints/serve/tokenize/test_tokenization.py -k "not tokenizer_info"
  source_file_dependencies:
  - rust/
  - vllm/entrypoints/openai/
  - vllm/entrypoints/serve/
  - vllm/v1/engine/
  - tests/utils.py
  - tests/entrypoints/serve/dev/rpc/test_collective_rpc.py
  - tests/entrypoints/scale_out/token_in_token_out/test_serving_tokens.py
  - tests/entrypoints/serve/instrumentator/test_basic.py
  - tests/entrypoints/serve/instrumentator/test_metrics.py
  - tests/entrypoints/serve/tokenize/test_tokenization.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_RUST_FRONTEND=1 || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    PYTHONPATH=/workspace/vllm pytest -v -s entrypoints/serve/dev/rpc/test_collective_rpc.py || true &&
    pytest -v -s entrypoints/serve/instrumentator/test_basic.py -k not show_version and not server_load || true &&
    pytest -v -s entrypoints/scale_out/token_in_token_out/test_serving_tokens.py -k not stream and not lora and not test_generate_logprobs and not stop_string_workflow || true &&
    pytest -v -s entrypoints/serve/instrumentator/test_metrics.py -k text and not show and not run_batch and not test_metrics_counts and not test_metrics_exist || true &&
    pytest -v -s entrypoints/serve/tokenize/test_tokenization.py -k not tokenizer_info || true'
- label: Rust Frontend Core Correctness
  device: intel_gpu
  timeout_in_minutes: 20
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_USE_RUST_FRONTEND=1
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - pytest -s entrypoints/openai/correctness/test_lmeval.py::test_lm_eval_accuracy_v1_engine
  source_file_dependencies:
  - rust/
  - vllm/entrypoints/openai/
  - tests/utils.py
  - tests/entrypoints/openai/correctness/test_lmeval.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_RUST_FRONTEND=1 || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    pytest -s entrypoints/openai/correctness/test_lmeval.py::test_lm_eval_accuracy_v1_engine || true'
- label: Rust Frontend Tool Use
  device: intel_gpu
  timeout_in_minutes: 25
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_USE_RUST_FRONTEND=1
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - pytest -v -s tool_use --ignore=tool_use/mistral --models llama3.2 -k "not test_response_format_with_tool_choice_required and not test_parallel_tool_calls_false and not test_tool_call_and_choice"
  source_file_dependencies:
  - rust/
  - vllm/entrypoints/openai/
  - vllm/tool_parsers/
  - tests/utils.py
  - tests/tool_use/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_RUST_FRONTEND=1 || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    pytest -v -s tool_use --ignore=tool_use/mistral --models llama3.2 -k not test_response_format_with_tool_choice_required and not test_parallel_tool_calls_false and not test_tool_call_and_choice || true'
- label: Rust Frontend Distributed
  device: intel_gpu
  timeout_in_minutes: 25
  num_devices: 4
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 4+
  _raw_old_commands:
  - export VLLM_USE_RUST_FRONTEND=1
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - export NCCL_CUMEM_HOST_ENABLE=0
  - TP_SIZE=1 DP_SIZE=4 pytest -v -s v1/distributed/test_internal_lb_dp.py -k "not 4 and not server_info"
  - TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_external_lb_dp.py -k "not 4 and not server_info"
  - TP_SIZE=1 DP_SIZE=4 pytest -v -s v1/distributed/test_hybrid_lb_dp.py -k "not 4 and not server_info"
  source_file_dependencies:
  - rust/
  - vllm/distributed/
  - vllm/engine/
  - vllm/executor/
  - vllm/v1/engine/
  - vllm/v1/worker/
  - tests/utils.py
  - tests/v1/distributed/test_external_lb_dp.py
  - tests/v1/distributed/test_hybrid_lb_dp.py
  - tests/v1/distributed/test_internal_lb_dp.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_RUST_FRONTEND=1 || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    export NCCL_CUMEM_HOST_ENABLE=0 || true &&
    cd tests &&
    TP_SIZE=1 DP_SIZE=4 pytest -v -s v1/distributed/test_internal_lb_dp.py -k not 4 and not server_info || true &&
    TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_external_lb_dp.py -k not 4 and not server_info || true &&
    TP_SIZE=1 DP_SIZE=4 pytest -v -s v1/distributed/test_hybrid_lb_dp.py -k not 4 and not server_info || true'
