group: Miscellaneous XPU
depends_on:
  - image-build-xpu
steps:
- label: V1 Spec Decode
  device: intel_gpu
  timeout_in_minutes: 40
  no_plugin: true
  working_dir: .
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  # v1/spec_decode/test_max_len.py::test_eagle_max_len[FLASH_ATTN-10] skipped due to OOM on Intel GPU and will hang
  - pytest -v -s -m 'not slow_test' v1/spec_decode
  source_file_dependencies:
  - vllm/config/
  - vllm/distributed/
  - vllm/inputs/
  - vllm/model_executor/
  - vllm/platforms/
  - vllm/sampling_params.py
  - vllm/transformers_utils/
  - vllm/utils/
  - vllm/v1/
  - tests/v1/spec_decode
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    pytest -v -s -m not slow_test v1/spec_decode --deselect="v1/spec_decode/test_max_len.py::test_eagle_max_len[FLASH_ATTN-10]"|| true'
- label: V1 Sample + Logits
  timeout_in_minutes: 45
  device: intel_gpu
  no_plugin: true
  working_dir: .
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - pytest -v -s v1/sample
  - pytest -v -s v1/logits_processors
  - pytest -v -s v1/test_oracle.py
  - pytest -v -s v1/test_request.py
  - pytest -v -s v1/test_outputs.py
  source_file_dependencies:
  - vllm/config/
  - vllm/distributed/
  - vllm/engine/
  - vllm/inputs/
  - vllm/logger.py
  - vllm/model_executor/
  - vllm/platforms/
  - vllm/sampling_params.py
  - vllm/transformers_utils/
  - vllm/utils/
  - vllm/v1/
  - tests/v1/sample
  - tests/v1/logits_processors
  - tests/v1/test_oracle.py
  - tests/v1/test_request.py
  - tests/v1/test_outputs.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    cd tests &&
    pytest -v -s v1/sample || true &&
    pytest -v -s v1/logits_processors || true &&
    pytest -v -s v1/test_oracle.py || true &&
    pytest -v -s v1/test_request.py || true &&
    pytest -v -s v1/test_outputs.py || true'
- label: V1 Core + KV + Metrics
  timeout_in_minutes: 60
  device: intel_gpu
  no_plugin: true
  working_dir: .
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - bash /vllm-workspace/.buildkite/scripts/install-kv-connectors.sh
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  - pytest -v -s -m 'not cpu_test' v1/core
  - pytest -v -s v1/executor
  - pytest -v -s v1/kv_offload
  - pytest -v -s v1/simple_kv_offload
  - pytest -v -s v1/worker
  - pytest -v -s -m 'not cpu_test' v1/kv_connector/unit
  - pytest -v -s -m 'not cpu_test' v1/ec_connector/unit
  - pytest -v -s -m 'not cpu_test' v1/metrics
  - pip install -U git+https://github.com/vllm-project/lm-evaluation-harness.git@streaming-api
  - pytest -v -s entrypoints/openai/correctness/test_lmeval.py::test_lm_eval_accuracy_v1_engine
  source_file_dependencies:
  - vllm/config/
  - vllm/distributed/
  - vllm/engine/
  - vllm/entrypoints/pooling/
  - vllm/inputs/
  - vllm/lora/
  - vllm/model_executor/
  - vllm/multimodal/
  - vllm/outputs.py
  - vllm/platforms/
  - vllm/pooling_params.py
  - vllm/profiler/
  - vllm/sampling_params.py
  - vllm/tokenizers/
  - vllm/transformers_utils/
  - vllm/utils/
  - vllm/v1/
  - tests/v1/core
  - tests/v1/executor
  - tests/v1/kv_offload
  - tests/v1/simple_kv_offload
  - tests/v1/worker
  - tests/v1/kv_connector/unit
  - tests/v1/ec_connector/unit
  # v1/metrics/test_ray_metrics.py is skipped due to Ray dependency issues on Intel GPU
  - tests/v1/metrics
  - tests/entrypoints/openai/correctness/test_lmeval.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    bash /workspace/vllm/.buildkite/scripts/install-kv-connectors.sh || true &&
    export VLLM_WORKER_MULTIPROC_METHOD=spawn || true &&
    pytest -v -s -m not cpu_test v1/core || true &&
    pytest -v -s v1/executor || true &&
    pytest -v -s v1/kv_offload || true &&
    pytest -v -s v1/simple_kv_offload || true &&
    pytest -v -s v1/worker || true &&
    pytest -v -s -m not cpu_test v1/kv_connector/unit || true &&
    pytest -v -s -m not cpu_test v1/ec_connector/unit || true &&
    pytest -v -s -m not cpu_test v1/metrics --ignore="v1/metrics/test_ray_metrics.py" || true &&
    pip install -U git+https://github.com/vllm-project/lm-evaluation-harness.git@streaming-api || true &&
    pytest -v -s entrypoints/openai/correctness/test_lmeval.py::test_lm_eval_accuracy_v1_engine || true'
