group: Models - Multimodal XPU
depends_on:
  - image-build-xpu
steps:
- label: 'Multi-Modal Models (Standard) 1: qwen2'
  device: intel_gpu
  timeout_in_minutes: 68
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal/generation/test_common.py -m core_model -k "qwen2"
  - pytest -v -s models/multimodal/generation/test_ultravox.py -m core_model
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s models/multimodal/generation/test_common.py -m core_model -k qwen2 || true &&
    pytest -v -s models/multimodal/generation/test_ultravox.py -m core_model || true'
- label: 'Multi-Modal Models (Standard) 2: qwen3 + gemma'
  device: intel_gpu
  timeout_in_minutes: 75
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal/generation/test_common.py -m core_model -k "qwen3 or gemma"
  - pytest -v -s models/multimodal/generation/test_mm_prefix_lm.py -m core_model
  - pytest -v -s models/multimodal/generation/test_qwen2_5_vl.py -m core_model
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s models/multimodal/generation/test_common.py -m core_model -k qwen3 or gemma || true &&
    pytest -v -s models/multimodal/generation/test_mm_prefix_lm.py -m core_model || true &&
    pytest -v -s models/multimodal/generation/test_qwen2_5_vl.py -m core_model || true'
- label: 'Multi-Modal Models (Standard) 3: llava + qwen2_vl'
  device: intel_gpu
  timeout_in_minutes: 40
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal/generation/test_common.py -m core_model -k "not qwen2 and not qwen3 and not gemma"
  - pytest -v -s models/multimodal/generation/test_qwen2_vl.py -m core_model
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s models/multimodal/generation/test_common.py -m core_model -k not qwen2 and not qwen3 and not gemma || true &&
    pytest -v -s models/multimodal/generation/test_qwen2_vl.py -m core_model || true'
- label: 'Multi-Modal Models (Standard) 4: other + whisper'
  device: intel_gpu
  timeout_in_minutes: 75
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal -m core_model --ignore models/multimodal/generation/test_common.py --ignore models/multimodal/generation/test_ultravox.py --ignore models/multimodal/generation/test_qwen2_5_vl.py --ignore models/multimodal/generation/test_qwen2_vl.py --ignore models/multimodal/generation/test_whisper.py --ignore models/multimodal/generation/test_mm_prefix_lm.py --ignore models/multimodal/generation/test_memory_leak.py --ignore models/multimodal/generation/test_vit_cudagraph.py --ignore models/multimodal/processing
  - pytest -v -s models/multimodal/generation/test_vit_cudagraph.py -m core_model
  - pytest models/multimodal/generation/test_memory_leak.py -m core_model
  - cd .. && VLLM_WORKER_MULTIPROC_METHOD=spawn pytest -v -s tests/models/multimodal/generation/test_whisper.py -m core_model
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'pip install vllm[audio] || true && 
    cd tests &&
    pytest -v -s models/multimodal -m core_model --ignore models/multimodal/generation/test_common.py --ignore models/multimodal/generation/test_ultravox.py --ignore models/multimodal/generation/test_qwen2_5_vl.py --ignore models/multimodal/generation/test_qwen2_vl.py --ignore models/multimodal/generation/test_whisper.py --ignore models/multimodal/generation/test_mm_prefix_lm.py --ignore models/multimodal/generation/test_memory_leak.py --ignore models/multimodal/generation/test_vit_cudagraph.py --ignore models/multimodal/processing || true &&
    pytest -v -s models/multimodal/generation/test_vit_cudagraph.py -m core_model || true &&
    pytest models/multimodal/generation/test_memory_leak.py -m core_model || true &&
    cd .. && VLLM_WORKER_MULTIPROC_METHOD=spawn pytest -v -s tests/models/multimodal/generation/test_whisper.py -m core_model'
- label: Multi-Modal Processor
  device: intel_gpu
  timeout_in_minutes: 98
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal/processing/test_tensor_schema.py
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal
  - tests/models/registry.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s models/multimodal/processing/test_tensor_schema.py || true'
- label: Multi-Modal Accuracy Eval (Small Models)
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -s -v test_lm_eval_correctness.py --config-list-file=configs/models-mm-small.txt --tp-size=1
  source_file_dependencies:
  - vllm/multimodal/
  - vllm/inputs/
  - vllm/v1/core/
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd .buildkite/lm-eval-harness &&
    pytest -s -v test_lm_eval_correctness.py --config-list-file=configs/models-mm-small.txt --tp-size=1 || true'
- label: Multi-Modal Models (Extended Generation 1)
  device: intel_gpu
  optional: true
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s models/multimodal/generation -m 'not core_model' --ignore models/multimodal/generation/test_common.py
  - pytest -v -s models/multimodal/test_mapping.py
  source_file_dependencies:
  - vllm/
  - tests/models/multimodal/generation
  - tests/models/multimodal/test_mapping.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s models/multimodal/generation -m not core_model --ignore models/multimodal/generation/test_common.py || true &&
    pytest -v -s models/multimodal/test_mapping.py || true'
