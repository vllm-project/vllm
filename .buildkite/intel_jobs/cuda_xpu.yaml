group: CUDA XPU
depends_on:
  - image-build-xpu
steps:
- label: Platform Tests
  device: intel_gpu
  timeout_in_minutes: 20
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s cuda/test_cuda_context.py
  - pytest -v -s cuda/test_platform_no_cuda_init.py
  source_file_dependencies:
  - vllm/envs.py
  - vllm/logger.py
  - vllm/platforms/
  - vllm/plugins/
  - vllm/utils/
  - tests/cuda
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s cuda/test_cuda_context.py || true &&
    pytest -v -s cuda/test_platform_no_cuda_init.py || true'
- label: Cudagraph
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - pytest -v -s v1/cudagraph/test_cudagraph_dispatch.py
  - pytest -v -s v1/cudagraph/test_cudagraph_mode.py
  - pytest -v -s v1/cudagraph/test_breakable_cudagraph.py
  - pytest -v -s v1/cudagraph/test_encoder_cudagraph.py
  source_file_dependencies:
  - tests/v1/cudagraph
  - vllm/v1/cudagraph_dispatcher.py
  - vllm/config/compilation.py
  - vllm/compilation
  - vllm/v1/worker/encoder_cudagraph.py
  - vllm/v1/worker/encoder_cudagraph_defs.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'cd tests &&
    pytest -v -s v1/cudagraph/test_cudagraph_dispatch.py || true &&
    pytest -v -s v1/cudagraph/test_cudagraph_mode.py || true &&
    pytest -v -s v1/cudagraph/test_breakable_cudagraph.py || true &&
    pytest -v -s v1/cudagraph/test_encoder_cudagraph.py || true'
