group: Model Runner V2 XPU
depends_on:
  - image-build-xpu
steps:
- label: Model Runner V2 Core Tests
  device: intel_gpu
  timeout_in_minutes: 35
  no_plugin: true
  working_dir: .
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - set -x
  - export VLLM_USE_V2_MODEL_RUNNER=1
  - pytest -v -s v1/engine/test_llm_engine.py -k "not test_engine_metrics"
  - pytest -v -s v1/e2e/general/test_async_scheduling.py -k "not ngram"
  - pytest -v -s v1/e2e/general/test_context_length.py
  - pytest -v -s v1/e2e/general/test_min_tokens.py
  - pytest -v -s entrypoints/llm/test_struct_output_generate.py -k "xgrammar and not speculative_config6 and not speculative_config7 and not speculative_config8 and not speculative_config0"
  source_file_dependencies:
  - vllm/v1/worker/gpu/
  - vllm/v1/worker/gpu_worker.py
  - vllm/v1/core/sched/
  - vllm/v1/attention/
  - tests/v1/engine/test_llm_engine.py
  - tests/v1/e2e/
  - tests/entrypoints/llm/test_struct_output_generate.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_V2_MODEL_RUNNER=1 || true &&
    cd tests &&
    pytest -v -s v1/engine/test_llm_engine.py -k not test_engine_metrics || true &&
    pytest -v -s v1/e2e/general/test_async_scheduling.py -k not ngram || true &&
    pytest -v -s v1/e2e/general/test_context_length.py || true &&
    pytest -v -s v1/e2e/general/test_min_tokens.py || true &&
    pytest -v -s entrypoints/llm/test_struct_output_generate.py -k xgrammar and not speculative_config6 and not speculative_config7 and not speculative_config8 and not speculative_config0 || true'
- label: Model Runner V2 Distributed (2 GPUs)
  timeout_in_minutes: 30
  working_dir: .
  num_devices: 2
  device: intel_gpu
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 2+
  _raw_old_commands:
  - set -x
  - export VLLM_USE_V2_MODEL_RUNNER=1
  - TARGET_TEST_SUITE=L4 pytest -v -s basic_correctness/test_basic_correctness.py -m 'distributed(num_gpus=2)' -k "not ray and not True"
  - export NCCL_CUMEM_HOST_ENABLE=0
  - TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_async_llm_dp.py -k "not ray"
  - TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_eagle_dp.py
  source_file_dependencies:
  - vllm/v1/worker/gpu/
  - vllm/v1/worker/gpu_worker.py
  - tests/basic_correctness/test_basic_correctness.py
  - tests/v1/distributed/test_async_llm_dp.py
  - tests/v1/distributed/test_eagle_dp.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_V2_MODEL_RUNNER=1 || true &&
    cd tests &&
    TARGET_TEST_SUITE=L4 pytest -v -s basic_correctness/test_basic_correctness.py -m distributed(num_gpus=2) -k not ray and not True || true &&
    export NCCL_CUMEM_HOST_ENABLE=0 || true &&
    TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_async_llm_dp.py -k not ray || true &&
    TP_SIZE=1 DP_SIZE=2 pytest -v -s v1/distributed/test_eagle_dp.py || true'
- label: Model Runner V2 Pipeline Parallelism (4 GPUs)
  timeout_in_minutes: 50
  working_dir: .
  num_devices: 4
  device: intel_gpu
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 4+
  _raw_old_commands:
  - set -x
  - export VLLM_USE_V2_MODEL_RUNNER=1
  - pytest -v -s distributed/test_pipeline_parallel.py -k "not ray and not Jamba"
  - pytest -v -s distributed/test_pp_cudagraph.py -k "not ray"
  - pytest -v -s v1/distributed/test_pp_dp_v2.py
  source_file_dependencies:
  - vllm/v1/worker/gpu/
  - vllm/v1/worker/gpu_worker.py
  - tests/distributed/test_pipeline_parallel.py
  - tests/distributed/test_pp_cudagraph.py
  - tests/v1/distributed/test_pp_dp_v2.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_V2_MODEL_RUNNER=1 || true &&
    cd tests &&
    pytest -v -s distributed/test_pipeline_parallel.py -k not ray and not Jamba || true &&
    pytest -v -s distributed/test_pp_cudagraph.py -k not ray || true &&
    pytest -v -s v1/distributed/test_pp_dp_v2.py || true'
- label: Model Runner V2 Spec Decode
  device: intel_gpu
  timeout_in_minutes: 30
  working_dir: .
  no_plugin: true
  env:
    REGISTRY: public.ecr.aws/q9t5s3a7
    REPO: vllm-ci-test-repo
    VLLM_TEST_DEVICE: xpu
  agent_tags:
    label: debug
    gpu: 1+
  _raw_old_commands:
  - set -x
  - export VLLM_USE_V2_MODEL_RUNNER=1
  # v1/spec_decode/test_max_len.py::test_eagle_max_len[FLASH_ATTN-10] skipped due to OOM on Intel GPU and will hang
  - pytest -v -s v1/spec_decode/test_max_len.py -k "eagle or mtp"
  - pytest -v -s v1/spec_decode/test_rejection_sampler_utils.py
  - pytest -v -s v1/spec_decode/test_synthetic_rejection_sampler_utils.py
  - pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k "eagle or mtp"
  source_file_dependencies:
  - vllm/v1/worker/gpu/
  - vllm/v1/worker/gpu_worker.py
  - tests/v1/spec_decode/test_max_len.py
  - tests/v1/spec_decode/test_rejection_sampler_utils.py
  - tests/v1/e2e/spec_decode/test_spec_decode.py
  commands:
  - >-
    bash .buildkite/scripts/hardware_ci/run-intel-test.sh
    'export VLLM_USE_V2_MODEL_RUNNER=1 || true &&
    cd tests &&
    pytest -v -s v1/spec_decode/test_max_len.py -k eagle or mtp --deselect="v1/spec_decode/test_max_len.py::test_eagle_max_len[FLASH_ATTN-10]" || true &&
    pytest -v -s v1/spec_decode/test_rejection_sampler_utils.py || true &&
    pytest -v -s v1/spec_decode/test_synthetic_rejection_sampler_utils.py || true &&
    pytest -v -s v1/e2e/spec_decode/test_spec_decode.py -k eagle or mtp || true'
