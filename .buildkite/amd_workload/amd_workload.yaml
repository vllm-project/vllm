      working_dir: /vllm-workspace/tests
      commands:
      - pytest -v -s benchmarks/

- label: 'AMD x3: Distributed NixlConnector PD accuracy (4 GPUs)'
  key: amd-x3-distributed-nixlconnector-pd-accuracy-4-gpus
  timeout_in_minutes: 110
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  - .buildkite/test_areas/disaggregated.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi300_4
      depends_on:
      - image-build-amd
      working_dir: /vllm-workspace/tests
      commands:
      - uv pip install --system -r /vllm-workspace/requirements/kv_connectors_rocm.txt
      - ATTENTION_BACKEND=TRITON_ATTN bash v1/kv_connector/nixl_integration/config_sweep_accuracy_test.sh

- label: 'AMD x3: DP EP Distributed NixlConnector PD accuracy tests (4 GPUs)'
