# Duplicates the Stage D gating AMD mirror coverage using its mixed-device distribution.
# Parent steps stay optional so they do not schedule cpu-small jobs.
# The AMD mirror blocks can be opened manually to create x3 MI250/MI300/MI325 workload.
group: AMD Stage D gating workload multiplier
steps:
- label: 'MI325_1 x3: V1 attention (H100-MI300)'
  key: mi325-1-x3-v1-attention-h100-mi300
  timeout_in_minutes: 70
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi325_1
      working_dir: /vllm-workspace/tests
      depends_on:
      - image-build-amd
      commands:
      - pytest -v -s v1/attention

- label: 'MI250_1 x3: Cudagraph'
  key: mi250-1-x3-cudagraph
  timeout_in_minutes: 60
  device: cpu-small
