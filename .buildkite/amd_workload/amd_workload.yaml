# Generated from current origin/main .buildkite/test_areas mirror.amd blocks.
# Each upstream AMD workload step uses Buildkite parallelism x3; sharded steps keep the same multiplier pattern.
group: AMD workload x3
steps:

- label: 'AMD x3: V1 attention (H100-MI300)'
  key: amd-x3-v1-attention-h100-mi300
  timeout_in_minutes: 70
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  - .buildkite/test_areas/attention.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi325_1
      depends_on:
      - image-build-amd
      working_dir: /vllm-workspace/tests
      commands:
      - pytest -v -s v1/attention

- label: 'AMD x3: Engine'
  key: amd-x3-engine
  timeout_in_minutes: 60
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  - .buildkite/test_areas/engine.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi325_1
      depends_on:
      - image-build-amd
      working_dir: /vllm-workspace/tests
      commands:
      - pytest -v -s engine test_sequence.py test_config.py test_logger.py test_vllm_port.py test_jit_monitor.py

- label: 'AMD x3: Engine (1 GPU)'
  key: amd-x3-engine-1-gpu
