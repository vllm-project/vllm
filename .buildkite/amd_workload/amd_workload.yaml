# Generated from current origin/main .buildkite/test_areas mirror.amd blocks.
# Each upstream AMD workload step uses Buildkite parallelism x3; sharded steps keep the same multiplier pattern.
group: AMD workload x3
steps:

- label: 'AMD x3: V1 attention (H100-MI300)'
  key: amd-x3-v1-attention-h100-mi300
  timeout_in_minutes: 70
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  - .buildkite/test_areas/attention.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi325_1
      depends_on:
      - image-build-amd
      working_dir: /vllm-workspace/tests
      commands:
      - pytest -v -s v1/attention

- label: 'AMD x3: Basic Correctness'
  key: amd-x3-basic-correctness
  timeout_in_minutes: 40
  device: cpu-small
  no_plugin: true
  optional: true
  parallelism: 3
  source_file_dependencies:
  - .buildkite/amd_workload/amd_workload.yaml
  - .buildkite/test_areas/basic_correctness.yaml
  commands:
  - ':'
  mirror:
    amd:
      device: mi325_1
      depends_on:
      - image-build-amd
      working_dir: /vllm-workspace/tests
      commands:
      - export VLLM_WORKER_MULTIPROC_METHOD=spawn
      - pytest -v -s basic_correctness/test_mem.py
      - pytest -v -s basic_correctness/test_basic_correctness.py
      - pytest -v -s basic_correctness/test_cpu_offload.py

- label: 'AMD x3: Benchmarks CLI Test'
  key: amd-x3-benchmarks-cli-test
  timeout_in_minutes: 20
  device: cpu-small
