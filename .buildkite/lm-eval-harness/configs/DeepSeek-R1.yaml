# For vllm script, with -t option (tensor parallel size).
# bash ./run-lm-eval-gsm-vllm-baseline.sh -m deepseek-ai/DeepSeek-R1 -b "auto" -l 1000 -f 5 -t 2
model_name: "deepseek-ai/DeepSeek-R1"
tasks:
- name: "gsm8k"
  metrics:
  - name: "exact_match,strict-match"
    value: 0.95
  - name: "exact_match,flexible-extract"
    value: 0.95
limit: 1000
num_fewshot: 5
trust_remote_code: True
enforce_eager: false # we use false to speed up the eval process
kv_cache_dtype: fp8 # we use fp8 to speed up the eval process
max_model_len: 16384