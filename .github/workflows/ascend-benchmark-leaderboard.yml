name: Ascend Benchmark Leaderboard

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  issue_comment:
    types: [created]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_scenario:
        description: Benchmark scenario to run
        required: false
        type: choice
        default: random-online
        options:
          - random-online
          - sharegpt-online
      publish_to_hf:
        description: Publish benchmark result to HF
        required: false
        type: boolean
        default: false
      publish_to_benchmark_repo:
        description: Publish benchmark result to the benchmark repo and refresh leaderboard snapshots
        required: false
        type: boolean
        default: false
      model_name:
        description: Model used for the benchmark run
        required: false
        type: string
        default: Qwen/Qwen2.5-14B-Instruct
      dataset_path:
        description: Dataset path on the trusted runner for formal workloads such as sharegpt-online
        required: false
        type: string
        default: ""
      constraints_file:
        description: Constraints JSON file path on the trusted runner for the selected workload
        required: false
        type: string
        default: ""
      num_prompts:
        description: Number of prompts to benchmark
        required: false
        type: string
        default: "200"
      request_rate:
        description: Request rate passed to vllm bench serve
        required: false
        type: string
        default: "1"
      max_concurrency:
        description: Max concurrency passed to vllm bench serve
        required: false
        type: string
        default: "4"
      metadata_lengths:
        description: Optional logical input/output lengths recorded in exported metadata, formatted as input,output
        required: false
        type: string
        default: ""

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  issue-comment-command:
    if: ${{ github.event_name == 'issue_comment' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.parse-command.outputs.ASCEND_COMMENT_COMMAND }}
      help_requested: ${{ steps.parse-command.outputs.ASCEND_COMMENT_HELP }}
      deny_reason: ${{ steps.parse-command.outputs.ASCEND_COMMENT_DENY_REASON }}
      pr_number: ${{ steps.parse-command.outputs.ISSUE_COMMENT_PR_NUMBER }}
      pr_head_sha: ${{ steps.parse-command.outputs.ISSUE_COMMENT_PR_HEAD_SHA }}
      pr_base_sha: ${{ steps.parse-command.outputs.ISSUE_COMMENT_PR_BASE_SHA }}
      benchmark_scenario: ${{ steps.parse-command.outputs.INPUT_BENCHMARK_SCENARIO }}
      model_name: ${{ steps.parse-command.outputs.MODEL_NAME }}
      dataset_path: ${{ steps.parse-command.outputs.BENCH_DATASET_PATH }}
      constraints_file: ${{ steps.parse-command.outputs.BENCH_CONSTRAINTS_FILE }}
      num_prompts: ${{ steps.parse-command.outputs.BENCH_NUM_PROMPTS }}
      request_rate: ${{ steps.parse-command.outputs.BENCH_REQUEST_RATE }}
      max_concurrency: ${{ steps.parse-command.outputs.BENCH_MAX_CONCURRENCY }}
      input_length: ${{ steps.parse-command.outputs.BENCH_INPUT_LEN }}
      output_length: ${{ steps.parse-command.outputs.BENCH_OUTPUT_LEN }}
      publish_to_hf: ${{ steps.parse-command.outputs.PUBLISH_TO_HF }}
      publish_to_benchmark_repo: ${{ steps.parse-command.outputs.PUBLISH_TO_BENCHMARK_REPO }}
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Fetch PR metadata
        id: fetch-pr
        if: ${{ github.event.issue.pull_request }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const {owner, repo} = context.repo;
            const pull_number = context.payload.issue.number;
            const {data: pullRequest} = await github.rest.pulls.get({owner, repo, pull_number});
            const fs = require('fs');
            fs.writeFileSync(process.env.RUNNER_TEMP + '/issue-comment-pr.json', JSON.stringify(pullRequest));
            core.setOutput('pr_payload_path', process.env.RUNNER_TEMP + '/issue-comment-pr.json');

      - name: Parse Ascend comment command
        id: parse-command
        if: ${{ github.event.comment.body != '' }}
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_COMMENT_PR_PAYLOAD: ${{ steps.fetch-pr.outputs.pr_payload_path }}
        run: |
          python3 .github/workflows/scripts/parse_ascend_comment_command.py \
            --event-payload "$GITHUB_EVENT_PATH" \
            --pr-payload "$ISSUE_COMMENT_PR_PAYLOAD" \
            --github-output "$GITHUB_OUTPUT"

  issue-comment-help:
    needs: [issue-comment-command]
    if: >-
      always() &&
      github.event_name == 'issue_comment' &&
      needs.issue-comment-command.outputs.help_requested == '1'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Reply with Ascend command help
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = [
              '<!-- ascend-benchmark-command-help -->',
              '## Ascend Benchmark Command Help',
              '',
              'Supported same-repository PR preview commands:',
              '- `/ascend smoke`',
              '- `/ascend scenario random`',
              '- `/ascend group smoke`',
              '- `/ascend benchmark random`',
              '- `/ascend benchmark random --num-prompts 16 --request-rate inf --max-concurrency 4`',
              '- `/ascend scenario sharegpt --dataset-path /data/sharegpt.jsonl --constraints-file /data/constraints.json`',
              '- `/ascend benchmark sharegpt --dataset-path /data/sharegpt.jsonl --constraints-file /data/constraints.json`',
              '- `/ascend help`',
              '',
              'Notes:',
              '- Commands only run on same-repository PRs.',
              '- Commands require the PR author or a repository collaborator.',
              '- Fork PR commands are rejected without using the Ascend self-hosted runner.',
              '- Comment-triggered runs use the fixed preview model `Qwen/Qwen2.5-3B-Instruct`.',
              '- Comment-triggered limits: `--num-prompts <= 32`, `--max-concurrency <= 4`, `--request-rate <= 4` or `inf`.',
              '- ShareGPT dataset and constraints files must be absolute `.json`/`.jsonl` paths under `/data/` or `/mnt/data/`.',
              '- Comment-triggered runs are optional preview checks and are not required checks.',
              '- Comment-triggered runs do not publish to HF or the benchmark repository.',
              '- `/ascend official ...` is reserved for the future formal leaderboard path and is not supported yet.',
            ].join('\n');
            const {owner, repo} = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.payload.issue.number,
              body,
            });

  issue-comment-denied:
    needs: [issue-comment-command]
    if: >-
      always() &&
      github.event_name == 'issue_comment' &&
      needs.issue-comment-command.outputs.should_run == '0' &&
      needs.issue-comment-command.outputs.deny_reason != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Reply with Ascend command denial reason
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          ASCEND_COMMENT_DENY_REASON: ${{ needs.issue-comment-command.outputs.deny_reason }}
        with:
          script: |
            const reason = process.env.ASCEND_COMMENT_DENY_REASON || 'The command could not be accepted.';
            const safeReason = reason.replace(/([\\`*_{}[\]()#+.!|>-])/g, '\\$1').replace(/@/g, '@\u200b');
            const body = [
              '<!-- ascend-benchmark-command-denied -->',
              '## Ascend Benchmark Command Not Accepted',
              '',
              `Reason: ${safeReason}`,
              '',
              'Supported same-repository PR preview commands:',
              '- `/ascend smoke`',
              '- `/ascend scenario random`',
              '- `/ascend group smoke`',
              '- `/ascend benchmark random`',
              '- `/ascend scenario sharegpt --dataset-path /data/sharegpt.jsonl --constraints-file /data/constraints.json`',
              '- `/ascend benchmark sharegpt --dataset-path /data/sharegpt.jsonl --constraints-file /data/constraints.json`',
              '',
              'Notes:',
              '- Commands require the PR author or a repository collaborator.',
              '- Comment-triggered limits: `--num-prompts <= 32`, `--max-concurrency <= 4`, `--request-rate <= 4` or `inf`.',
              '- ShareGPT dataset and constraints files must be absolute `.json`/`.jsonl` paths under `/data/` or `/mnt/data/`.',
              '- Comment-triggered runs are optional preview checks and are not required checks.',
              '- `/ascend official ...` is reserved for the future formal leaderboard path and is not supported yet.',
            ].join('\n');
            const {owner, repo} = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.payload.issue.number,
              body,
            });

  fork-pr-security-note:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain fork PR restriction
        run: |
          echo "Skipping Ascend benchmark on fork PRs because this workflow requires a self-hosted Ascend runner and trusted execution." >> "$GITHUB_STEP_SUMMARY"
          exit 1

  ascend-benchmark:
    needs: [issue-comment-command]
    if: >-
      always() &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
        (github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.should_run == '1')
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on:
      - self-hosted
      - linux-aarch64-a2b3-0
      - docker
    timeout-minutes: 60
    env:
      HOME: ${{ github.workspace }}/.ci-home
      DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER: /usr/local/bin/run_ascend_benchmark_root_helper.sh
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_hf) && secrets.HF_TOKEN || '' }}
      HF_REPO_ID: intellistream/vllm-hust-benchmark-results
      MODEL_NAME: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && (github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.model_name || 'Qwen/Qwen2.5-3B-Instruct') || (github.event_name == 'workflow_dispatch' && inputs.model_name || 'Qwen/Qwen2.5-14B-Instruct') }}
      BENCH_SCENARIO: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.benchmark_scenario || (github.event_name == 'workflow_dispatch' && inputs.benchmark_scenario || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_SCENARIO) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_SCENARIO) || 'random-online') }}
      BENCH_DATASET_PATH: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.dataset_path || (github.event_name == 'workflow_dispatch' && inputs.dataset_path || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_DATASET_PATH) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_DATASET_PATH) || '') }}
      BENCH_CONSTRAINTS_FILE: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.constraints_file || (github.event_name == 'workflow_dispatch' && inputs.constraints_file || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_CONSTRAINTS_FILE) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_CONSTRAINTS_FILE) || '') }}
      MODEL_PARAMETERS: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && '3B' || '14B' }}
      MODEL_PRECISION: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'BF16' || 'FP16' }}
      DTYPE: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'bfloat16' || 'float16' }}
      MAX_MODEL_LEN: ""
      MAX_NUM_SEQS: "1"
      BENCH_NUM_PROMPTS: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.num_prompts || (github.event_name == 'workflow_dispatch' && inputs.num_prompts || '200') }}
      BENCH_RANDOM_INPUT_LEN: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && '64' || '1024' }}
      BENCH_RANDOM_OUTPUT_LEN: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && '16' || '256' }}
      BENCH_REQUEST_RATE: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.request_rate || (github.event_name == 'workflow_dispatch' && inputs.request_rate || '1') }}
      BENCH_MAX_CONCURRENCY: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.max_concurrency || (github.event_name == 'workflow_dispatch' && inputs.max_concurrency || '4') }}
      BENCH_INPUT_LEN: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.input_length || '' }}
      BENCH_OUTPUT_LEN: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.output_length || '' }}
      BENCH_METADATA_LENGTHS: ${{ github.event_name == 'workflow_dispatch' && inputs.metadata_lengths || '' }}
      INPUT_BENCHMARK_SCENARIO: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.benchmark_scenario || (github.event_name == 'workflow_dispatch' && inputs.benchmark_scenario || '') }}
      PR_LABELS: ${{ github.event_name == 'pull_request' && toJson(github.event.pull_request.labels) || '[]' }}
      SOC_VERSION: ascend910b3
      HARDWARE_VENDOR: Huawei
      HARDWARE_CHIP_MODEL: 910B3
      CHIP_COUNT: "1"
      NODE_COUNT: "1"
      SAME_SPEC_BENCHMARK_ENABLED: ${{ vars.VLLM_HUST_SAME_SPEC_BENCHMARK_ENABLED || '1' }}
      PERFGATE_MODE: ${{ vars.VLLM_HUST_PERFGATE_MODE || 'report' }}
      PERFGATE_SPEC_FILE: ${{ vars.VLLM_HUST_PERFGATE_SPEC_FILE || 'docs/official-baselines/perfgate-ascend-qwen25-3b-910b3.json' }}
      MAIN_SAME_SPEC_SPEC_FILE: ${{ vars.VLLM_HUST_MAIN_SAME_SPEC_SPEC_FILE || 'docs/official-baselines/official-ascend-jan-2026-v0180-random-online-qwen25-14b-910b2.json' }}
      SAME_SPEC_SPEC_FILE: ${{ vars.VLLM_HUST_SAME_SPEC_SPEC_FILE || '' }}
      SAME_SPEC_CONSTRAINTS_FILE: ${{ vars.VLLM_HUST_SAME_SPEC_CONSTRAINTS_FILE || '' }}
      ASCEND_BENCHMARK_USE_SUDO: ${{ vars.VLLM_HUST_BENCHMARK_USE_SUDO || '1' }}
      ASCEND_BENCHMARK_ROOT_HELPER: ${{ vars.VLLM_HUST_BENCHMARK_ROOT_HELPER || '' }}
      ALLOW_RANDOM_HF_PUBLISH: ${{ vars.VLLM_HUST_ALLOW_RANDOM_HF_PUBLISH || '0' }}
      WEBSITE_LEADERBOARD_URL: ${{ vars.VLLM_HUST_LEADERBOARD_URL || '' }}
      PUBLISH_TO_BENCHMARK_REPO: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VLLM_HUST_PUBLISH_BENCHMARK_ON_MAIN == '1') || (github.event_name == 'workflow_dispatch' && inputs.publish_to_benchmark_repo)) && '1' || '0' }}
      PUBLISH_TO_HF: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_hf && secrets.HF_TOKEN != '') && '1' || '0' }}
      TARGET_REPO_URL: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && format('https://github.com/{0}.git', github.repository) || format('git@github.com:{0}.git', github.repository) }}
      TARGET_REPO_SHA: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.pr_head_sha || github.sha }}
      BENCHMARK_REPO_URL: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'https://github.com/vLLM-HUST/vllm-hust-benchmark.git' || 'git@github.com:vLLM-HUST/vllm-hust-benchmark.git' }}
      BENCHMARK_REPO_SLUG: vLLM-HUST/vllm-hust-benchmark
      BENCHMARK_REPO_GH_TOKEN: ${{ (github.event_name != 'pull_request' && github.event_name != 'issue_comment') && secrets.VLLM_HUST_BENCHMARK_GH_TOKEN || '' }}
      BENCHMARK_REPO_SSH_KEY: ${{ (github.event_name != 'pull_request' && github.event_name != 'issue_comment') && secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY || '' }}
      BENCHMARK_REPO_REF: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch') && (vars.VLLM_HUST_BENCHMARK_REPO_REF || 'main') || 'main' }}
      WEBSITE_REPO_URL: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'https://github.com/vLLM-HUST/vllm-hust-website.git' || 'git@github.com:vLLM-HUST/vllm-hust-website.git' }}
      VLLM_ASCEND_HUST_REPO_URL: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'https://github.com/vLLM-HUST/vllm-ascend-hust.git' || 'git@github.com:vLLM-HUST/vllm-ascend-hust.git' }}
      ISSUE_COMMENT_PR_NUMBER: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.pr_number || '' }}
      HUST_ASCEND_MANAGER_REPO_URL: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && 'https://github.com/vLLM-HUST/ascend-runtime-manager.git' || 'git@github.com:vLLM-HUST/ascend-runtime-manager.git' }}
      HUST_ASCEND_MANAGER_REPO: ${{ github.workspace }}/ascend-runtime-manager
      # Disable precompiled CUDA wheel fetch from wheels.vllm.ai.
      # The Ascend benchmark uses the vllm-ascend-hust plugin, not CUDA
      # precompiled wheels, so this avoids transient SSL failures.
      VLLM_USE_PRECOMPILED: "0"

    steps:
      - name: Resolve workflow dispatch metadata lengths
        if: ${{ github.event_name == 'workflow_dispatch' && env.BENCH_METADATA_LENGTHS != '' }}
        shell: bash
        run: |
          metadata_lengths="$(printf '%s' "$BENCH_METADATA_LENGTHS" | tr -d '[:space:]')"
          if [[ "$metadata_lengths" != *,* ]]; then
            echo "metadata_lengths must be formatted as input,output; got: $BENCH_METADATA_LENGTHS" >&2
            exit 1
          fi

          input_len="${metadata_lengths%%,*}"
          output_len="${metadata_lengths#*,}"
          if [[ -z "$input_len" || -z "$output_len" || "$output_len" == *,* ]]; then
            echo "metadata_lengths must contain exactly two values formatted as input,output; got: $BENCH_METADATA_LENGTHS" >&2
            exit 1
          fi
          if [[ ! "$input_len" =~ ^[0-9]+$ || ! "$output_len" =~ ^[0-9]+$ ]]; then
            echo "metadata_lengths values must be positive integers; got: $BENCH_METADATA_LENGTHS" >&2
            exit 1
          fi
          if [[ "$input_len" -le 0 || "$output_len" -le 0 ]]; then
            echo "metadata_lengths values must be positive integers; got: $BENCH_METADATA_LENGTHS" >&2
            exit 1
          fi

          echo "BENCH_INPUT_LEN=$input_len" >> "$GITHUB_ENV"
          echo "BENCH_OUTPUT_LEN=$output_len" >> "$GITHUB_ENV"

      - name: Detect runner user and Ascend devices
        shell: bash
        run: |
          if [[ "$(id -u)" == "0" ]]; then
            echo "Runner is running as root; sudo helper is not required."
            echo "ASCEND_BENCHMARK_USE_SUDO=0" >> "$GITHUB_ENV"
          fi

          # Auto-detect NPU devices when no visibility env is set.
          # This is needed for root runners (where the root helper is
          # skipped) and any other case where the caller did not pre-set
          # ASCEND_VISIBLE_DEVICES / ASCEND_RT_VISIBLE_DEVICES.
          if [[ -z "${ASCEND_VISIBLE_DEVICES:-}" && -z "${ASCEND_RT_VISIBLE_DEVICES:-}" ]]; then
            detected_devices=""
            if command -v npu-smi >/dev/null 2>&1; then
              detected_devices="$(npu-smi info -m 2>/dev/null \
                | awk 'NR>2 && NF>=3 && $1+0==$1 {print $1}' \
                | sort -un | paste -sd ',' || true)"
            fi
            if [[ -z "$detected_devices" ]]; then
              detected_devices="$(find /dev -maxdepth 1 -name 'davinci[0-9]*' -printf '%f\n' 2>/dev/null \
                | sort -t i -k2 -n | paste -sd ',' || true)"
            fi
            if [[ -n "$detected_devices" ]]; then
              echo "Auto-detected NPU devices: $detected_devices"
              echo "ASCEND_VISIBLE_DEVICES=$detected_devices" >> "$GITHUB_ENV"
            else
              echo "[WARN] No NPU devices detected." >&2
            fi
          fi

      - name: Pre-clean stale checkout state
        shell: bash
        run: |
          legacy_paths=(
            "${GITHUB_WORKSPACE}/.benchmarks"
            "${GITHUB_WORKSPACE}/.ci-runtime"
            "${GITHUB_WORKSPACE}/vllm-hust-benchmark"
            "${GITHUB_WORKSPACE}/vllm-hust-website"
            "${GITHUB_WORKSPACE}/vllm-ascend-hust"
            "${GITHUB_WORKSPACE}/ascend-runtime-manager"
          )

          shopt -s nullglob dotglob
          workspace_entries=("${GITHUB_WORKSPACE}"/*)
          shopt -u nullglob dotglob
          cleanup_paths=("${legacy_paths[@]}" "${workspace_entries[@]}")

          if [[ "${ASCEND_BENCHMARK_USE_SUDO}" == "1" ]] \
            && command -v sudo >/dev/null 2>&1 \
            && [[ -x "$DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER" ]] \
            && sudo -n "$DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER" cleanup-paths "${cleanup_paths[@]}"; then
            exit 0
          fi

          rm -rf "${cleanup_paths[@]}" || {
            echo "Failed to clear stale benchmark workspace state as the runner user." >&2
            echo "Install or refresh the benchmark root helper at $DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER, then rerun the workflow." >&2
            exit 1
          }

      - name: Configure GitHub SSH checkout
        if: ${{ env.BENCHMARK_REPO_SSH_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail

          # The runner container may not have HOME set; default to /root for root user.
          export HOME="${HOME:-/root}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          key_file="$HOME/.ssh/vllm_hust_benchmark_key"
          printf '%s\n' "$BENCHMARK_REPO_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          known_hosts_tmp="$(mktemp)"
          ssh-keyscan -p 443 -t rsa,ecdsa,ed25519 ssh.github.com > "$known_hosts_tmp" 2>/dev/null
          if [[ ! -s "$known_hosts_tmp" ]]; then
            echo "Unable to scan ssh.github.com host keys." >&2
            exit 2
          fi
          cat "$known_hosts_tmp" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host github.com
            HostName ssh.github.com
            Port 443
            User git
            IdentityFile $key_file
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$HOME/.ssh/config"

          ssh_output="$(ssh -o BatchMode=yes -T git@github.com 2>&1)" && ssh_status=$? || ssh_status=$?
          echo "$ssh_output"
          if [[ "$ssh_output" == *"Permission denied"* ]]; then
            echo "GitHub SSH authentication failed for the configured key." >&2
            exit 2
          fi
          if [[ "$ssh_status" -ne 0 && "$ssh_status" -ne 1 ]]; then
            echo "GitHub SSH probe failed with status $ssh_status." >&2
            exit "$ssh_status"
          fi

      - name: Checkout target repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$TARGET_REPO_URL" "$GITHUB_WORKSPACE" "$TARGET_REPO_SHA"

      - name: L3 benchmark publication preflight
        shell: bash
        run: bash .github/workflows/scripts/l3_benchmark_publish_preflight.sh

      - name: Deepen clone for fork-point detection
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' }}
        shell: bash
        env:
          PR_HEAD_SHA: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.pr_head_sha || github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event_name == 'issue_comment' && needs.issue-comment-command.outputs.pr_base_sha || github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          fetch_with_retry() {
            local attempts=4
            local delay_seconds=15
            local try=1

            while [[ "$try" -le "$attempts" ]]; do
              echo "Fetch attempt ${try}/${attempts}: git fetch $*"
              if git fetch "$@"; then
                return 0
              fi
              echo "Fetch failed (${try}/${attempts}): git fetch $*" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
              delay_seconds=$((delay_seconds * 2))
            done

            echo "Failed to fetch after ${attempts} attempts: git fetch $*" >&2
            return 1
          }

          fetch_with_retry --deepen=500 origin main || fetch_with_retry --unshallow origin main || true
          fetch_with_retry --no-tags origin "$PR_HEAD_SHA" "$PR_BASE_SHA"
          git checkout --force "$PR_HEAD_SHA"
          fork_point="$(git merge-base "$PR_HEAD_SHA" "$PR_BASE_SHA")"
          echo "FORK_POINT=$fork_point" >> "$GITHUB_ENV"
          echo "Fork point: $fork_point"

      - name: Checkout benchmark repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_ref=${3:-}
            local attempts=6
            local delay_seconds=20
            local try=1
            local parent_dir
            local temp_dir
            local checkout_ref

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-benchmark-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$target_dir" "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              echo "Clone attempt ${try}/${attempts}: $repo_url"
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if [[ -n "$target_ref" ]]; then
                  checkout_ref="$target_ref"
                  if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_ref^{commit}" >/dev/null; then
                    git -C "$temp_dir" fetch --depth 1 origin "$target_ref"
                    checkout_ref=FETCH_HEAD
                  fi
                  git -C "$temp_dir" checkout --force "$checkout_ref"
                fi
                mv "$temp_dir" "$target_dir"
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
              delay_seconds=$((delay_seconds * 2))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$BENCHMARK_REPO_URL" "$GITHUB_WORKSPACE/vllm-hust-benchmark" "$BENCHMARK_REPO_REF"

      - name: Checkout website repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
