            --require-npu \
            --json | tee "$PRECHECK_DIR/runtime-check.json" || {
            echo "[WARNING] Runtime check with --require-npu failed." >&2
            clean_ld="$(_strip_conda_ld)"
            npu_smi_output="$(env LD_LIBRARY_PATH="$clean_ld" npu-smi info 2>&1)" || true
            healthy_count="$(echo "$npu_smi_output" | grep -c '| OK ' || true)"
            if [[ "$healthy_count" -gt 0 ]]; then
              echo "[WARNING] npu-smi confirms $healthy_count healthy NPU device(s) — proceeding despite torch_npu probe failure." >&2
            else
              # Last resort: check for NPU device files in /dev
              davinci_count="$(find /dev -maxdepth 1 -name 'davinci[0-9]*' 2>/dev/null | wc -l || echo 0)"
              if [[ "$davinci_count" -gt 0 ]]; then
                echo "[WARNING] Found $davinci_count NPU device file(s) in /dev — proceeding despite torch_npu probe failure." >&2
              else
                echo "Runner health preflight failed before benchmark" >&2
                exit 1
              fi
            fi
          }

      - name: Performance gate - fetch Stage 1 baseline
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' }}
        shell: bash
        env:
          PERFGATE_ALLOW_BASELINE_FALLBACK: "0"
        run: bash .github/workflows/scripts/perfgate_fetch_baseline.sh "$FORK_POINT"

      - name: Run benchmark CI and optional formal publish
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
          VLLM_HUST_REPO: ${{ github.workspace }}
          VLLM_HUST_BENCHMARK_REPO: ${{ github.workspace }}/vllm-hust-benchmark
          VLLM_HUST_WEBSITE_REPO: ${{ github.workspace }}/vllm-hust-website
          RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.TARGET_REPO_SHA }}
          SAME_SPEC_SPEC_FILE: ${{ github.workspace }}/vllm-hust-benchmark/${{ env.SAME_SPEC_SPEC_FILE || ((github.event_name == 'pull_request' || github.event_name == 'issue_comment') && env.PERFGATE_SPEC_FILE || env.MAIN_SAME_SPEC_SPEC_FILE) }}
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          max_attempts=${NODE_ENV_RETRY_MAX_ATTEMPTS:-3}
          retry_delay_seconds=${NODE_ENV_RETRY_DELAY_SECONDS:-30}
          attempt=1
          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "[benchmark] attempt ${attempt}/${max_attempts}"
            set +e
            bash .github/workflows/scripts/run_ascend_benchmark_ci.sh
            rc=$?
            set -e

            if [[ "$rc" -eq 0 ]]; then
              break
            fi

            if [[ "$rc" -eq 86 && "$attempt" -lt "$max_attempts" ]]; then
              echo "Detected node-level Ascend runtime failure (87/507899); retrying benchmark after ${retry_delay_seconds}s backoff."
              bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh || true
              sleep "$retry_delay_seconds"
              attempt=$((attempt + 1))
              continue
            fi

            exit "$rc"
          done

      - name: Performance gate - Stage 1 comparison
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' }}
        shell: bash
        env:
          SAME_SPEC_SPEC_FILE: ${{ github.workspace }}/vllm-hust-benchmark/${{ env.SAME_SPEC_SPEC_FILE || env.PERFGATE_SPEC_FILE }}
        run: bash .github/workflows/scripts/perfgate_stage1_compare.sh


      - name: Performance gate - Stage 2 trial rebase and benchmark
        if: ${{ (github.event_name == 'pull_request' || github.event_name == 'issue_comment') && env.PERFGATE_BASELINE_AVAILABLE != '0' && (env.PERFGATE_MODE != 'enforce' || env.PERFGATE_STAGE1_RESULT == 'pass') }}
        shell: bash
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
          VLLM_HUST_REPO: ${{ github.workspace }}
          VLLM_HUST_BENCHMARK_REPO: ${{ github.workspace }}/vllm-hust-benchmark
          VLLM_HUST_WEBSITE_REPO: ${{ github.workspace }}/vllm-hust-website
          SAME_SPEC_SPEC_FILE: ${{ github.workspace }}/vllm-hust-benchmark/${{ env.SAME_SPEC_SPEC_FILE || env.PERFGATE_SPEC_FILE }}
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          bash .github/workflows/scripts/perfgate_stage2_rebase_and_benchmark.sh

      - name: Performance gate - two-stage comparison
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'issue_comment' }}
        shell: bash
        env:
          SAME_SPEC_SPEC_FILE: ${{ github.workspace }}/vllm-hust-benchmark/${{ env.SAME_SPEC_SPEC_FILE || env.PERFGATE_SPEC_FILE }}
        run: bash .github/workflows/scripts/perfgate_compare.sh

      - name: Cleanup leftover Ascend CI processes
        if: always()
        run: |
          if [[ -f .github/workflows/scripts/cleanup_ascend_ci_processes.sh ]]; then
            bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh
          else
            echo "Skipping Ascend CI process cleanup because workflow scripts were not checked out."
          fi

      - name: Release Ascend hardware lock
        if: always()
        run: |
          if [[ -f .github/workflows/scripts/release_ascend_hardware_lock.sh ]]; then
            bash .github/workflows/scripts/release_ascend_hardware_lock.sh
          else
            echo "Skipping Ascend hardware lock release because workflow scripts were not checked out."
          fi

      - name: Build benchmark summary artifacts
        if: always()
        run: |
          if [[ -z "${PYTHON_BIN:-}" ]]; then
            PYTHON_BIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          fi
          if [[ -z "${PYTHON_BIN:-}" ]]; then
            echo "Unable to build benchmark summary because no Python runtime is available." >&2
            exit 1
          fi
          "${PYTHON_BIN}" - <<'PY'
          import json
          import os
          from pathlib import Path

          target_repo_sha = os.environ.get('TARGET_REPO_SHA') or os.environ['GITHUB_SHA']
          run_id = f"ci-{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}-{target_repo_sha}"
          result_root = Path(os.environ['GITHUB_WORKSPACE']) / '.benchmarks' / 'ci' / run_id
          raw_result = result_root / 'raw_benchmark.json'
          leaderboard_entry = result_root / 'submissions' / run_id / 'run_leaderboard.json'
          runner_preflight_failure = result_root / 'runner_preflight_failure.txt'
          summary_path = Path(os.environ['GITHUB_STEP_SUMMARY'])
          comment_path = result_root / 'benchmark_comment.md'
          perfgate_report = result_root / 'perfgate_report.md'
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          bench_scenario = os.environ.get('BENCH_SCENARIO', 'random-online')
          benchmark_repo_publish_enabled = os.environ.get('PUBLISH_TO_BENCHMARK_REPO') == '1'
          hf_publish_enabled = os.environ.get('PUBLISH_TO_HF') == '1'
          if benchmark_repo_publish_enabled:
            publish_mode = 'benchmark-repo-publish'
          elif hf_publish_enabled:
            publish_mode = 'hf-publish'
          else:
            publish_mode = 'artifact-preview'
          model_name = os.environ.get('MODEL_NAME', 'unknown')
          hf_repo = os.environ.get('HF_REPO_ID', 'unknown')
          leaderboard_url = os.environ.get('WEBSITE_LEADERBOARD_URL', '').strip()
          perfgate_mode = os.environ.get('PERFGATE_MODE', 'report')
          baseline_source = os.environ.get('PERFGATE_BASELINE_SOURCE') or 'unavailable'
          l2_scenario_mode = os.environ.get('L2_SCENARIO_MODE', '').strip()
          l2_scenario_label = os.environ.get('L2_SCENARIO_LABEL', '').strip()
          l2_scenario_reason = os.environ.get('L2_SCENARIO_REASON', '').strip()
          snapshot_sync_status = os.environ.get('GITHUB_SNAPSHOT_SYNC_STATUS', '').strip()
          snapshot_sync_commit = os.environ.get('GITHUB_SNAPSHOT_SYNC_COMMIT', '').strip()
          snapshot_sync_repo = os.environ.get('GITHUB_SNAPSHOT_SYNC_REPO', '').strip()
          snapshot_sync_branch = os.environ.get('GITHUB_SNAPSHOT_SYNC_BRANCH', '').strip()
          snapshot_sync_submission_path = os.environ.get('GITHUB_SNAPSHOT_SYNC_SUBMISSION_PATH', '').strip()
          snapshot_sync_snapshot_path = os.environ.get('GITHUB_SNAPSHOT_SYNC_SNAPSHOT_PATH', '').strip()
          snapshot_sync_verification = os.environ.get('GITHUB_SNAPSHOT_SYNC_VERIFICATION', '').strip()
          snapshot_sync_verified_commit = os.environ.get('GITHUB_SNAPSHOT_SYNC_VERIFIED_COMMIT', '').strip()
          l3_publish_preflight = os.environ.get('L3_BENCHMARK_PUBLISH_PREFLIGHT', '').strip()
          l3_publish_target = os.environ.get('L3_BENCHMARK_PUBLISH_TARGET', '').strip()
          l3_publish_credential = os.environ.get('L3_BENCHMARK_PUBLISH_CREDENTIAL', '').strip()

          result_root.mkdir(parents=True, exist_ok=True)

          artifact = None
          if leaderboard_entry.is_file():
            artifact = json.loads(leaderboard_entry.read_text(encoding='utf-8'))

          display_model_name = model_name
          if isinstance(artifact, dict):
            display_model_name = artifact.get('model_name') or model_name

          lines = [
            '## Ascend Benchmark Summary',
            f'- Run ID: `{run_id}`',
            f'- Commit: `{target_repo_sha}`',
            f'- Scenario: `{bench_scenario}`',
            f'- Model: `{display_model_name}`',
            f'- Publish mode: `{publish_mode}`',
            f"- Leaderboard publish: `{'enabled' if benchmark_repo_publish_enabled else 'skipped'}`",
            f"- HF publish: `{'enabled' if hf_publish_enabled else 'skipped'}`",
            f'- Perfgate mode: `{perfgate_mode}`',
            f'- Baseline source: `{baseline_source}`',
            f'- Scenario mode: `{l2_scenario_mode or "unavailable"}`',
            f'- Scenario label: `{l2_scenario_label or "none"}`',
            f'- Scenario reason: `{l2_scenario_reason or "unavailable"}`',
            f'- Workflow run: [view run]({run_url})',
          ]
          comment_lines = [
            '<!-- ascend-benchmark-leaderboard-comment -->',
            '## Ascend Benchmark Result',
            f'- Commit: `{target_repo_sha}`',
            f'- Scenario: `{bench_scenario}`',
            f'- Model: `{display_model_name}`',
            f'- Publish mode: `{publish_mode}`',
            f"- Leaderboard publish: `{'enabled' if benchmark_repo_publish_enabled else 'skipped'}`",
            f"- HF publish: `{'enabled' if hf_publish_enabled else 'skipped'}`",
            f'- Perfgate mode: `{perfgate_mode}`',
            f'- Baseline source: `{baseline_source}`',
            f'- Scenario mode: `{l2_scenario_mode or "unavailable"}`',
            f'- Scenario label: `{l2_scenario_label or "none"}`',
            f'- Scenario reason: `{l2_scenario_reason or "unavailable"}`',
            f'- Workflow run: [view run]({run_url})',
          ]
          if runner_preflight_failure.is_file():
            failure_note = (
              '- Runner health: `unhealthy` '
              '(benchmark failed before vLLM startup because all visible torch_npu allocations failed)'
            )
            lines.append(failure_note)
            comment_lines.append(failure_note)
          baseline_notes = []
          stage1_source = os.environ.get('PERFGATE_BASELINE_SOURCE')
          stage1_commit = os.environ.get('PERFGATE_BASELINE_COMMIT')
          if stage1_source or stage1_commit:
            baseline_notes.append(
              f"- Stage 1 baseline: `{stage1_commit or 'unknown'}` source `{stage1_source or 'unknown'}`"
            )
          stage2_source = os.environ.get('PERFGATE_STAGE2_M2_BASELINE_SOURCE')
          stage2_commit = os.environ.get('PERFGATE_STAGE2_M2_BASELINE_COMMIT')
          if stage2_source or stage2_commit:
            baseline_notes.append(
              f"- Stage 2 baseline: `{stage2_commit or 'unknown'}` source `{stage2_source or 'unknown'}`"
            )
          if baseline_notes:
            lines.extend(baseline_notes)
            comment_lines.extend(baseline_notes)
          if perfgate_report.is_file():
            perfgate_markdown = perfgate_report.read_text(encoding='utf-8').strip()
            lines.extend(['', perfgate_markdown])
            comment_lines.extend(['', perfgate_markdown])

          if raw_result.is_file():
            payload = json.loads(raw_result.read_text(encoding='utf-8'))
            metric_lines = [
              f"- Request throughput: `{payload.get('request_throughput')}` req/s",
              f"- Output throughput: `{payload.get('output_throughput')}` tok/s",
              f"- Mean TTFT: `{payload.get('mean_ttft_ms')}` ms",
              f"- Failed requests: `{payload.get('failed')}`",
            ]
            lines.extend(metric_lines)
            comment_lines.extend(metric_lines)
          else:
            lines.append('- Raw benchmark result: `missing`')
            comment_lines.append('- Raw benchmark result: `missing`')
          if leaderboard_entry.is_file():
            lines.append(f"- Leaderboard engine version: `{artifact.get('engine_version')}`")
            comment_lines.append(f"- Leaderboard engine version: `{artifact.get('engine_version')}`")
            same_spec = artifact.get('same_spec') if isinstance(artifact, dict) else None
            if isinstance(same_spec, dict):
              spec_id = same_spec.get('spec_id') or 'unknown'
              spec_hash = str(same_spec.get('resolved_spec_hash') or '')
              spec_note = f'- Same-spec goal artifact: `{spec_id}`'
              if spec_hash:
                spec_note += f' (`{spec_hash[:8]}`)'
              lines.append(spec_note)
              comment_lines.append(spec_note)
          else:
            lines.append('- Leaderboard entry: `missing`')
            comment_lines.append('- Leaderboard entry: `missing`')

          if bench_scenario != 'random-online':
            dataset_path = os.environ.get('BENCH_DATASET_PATH') or 'unset'
            constraints_path = os.environ.get('BENCH_CONSTRAINTS_FILE') or 'unset'
            lines.append(f'- Dataset path: `{dataset_path}`')
            lines.append(f'- Constraints file: `{constraints_path}`')
            comment_lines.append(f'- Dataset path: `{dataset_path}`')
            comment_lines.append(f'- Constraints file: `{constraints_path}`')
          elif publish_mode == 'artifact-preview' and not (artifact and isinstance(artifact.get('same_spec'), dict)):
            note = '- Note: random-online runs stay as preview artifacts unless random preview publish is explicitly enabled.'
            lines.append(note)
            comment_lines.append(note)

          if hf_publish_enabled:
            hf_note = f'- HF dataset repo: `{hf_repo}`'
            lines.append(hf_note)
            comment_lines.append(hf_note)
            if leaderboard_url:
              site_note = f'- Website leaderboard: {leaderboard_url}'
              lines.append(site_note)
              comment_lines.append(site_note)

          if benchmark_repo_publish_enabled:
            publication_lines = ['','### L3 Benchmark Repository Publication']
            publication_lines.append(f"- Preflight: `{l3_publish_preflight or 'unknown'}`")
            if l3_publish_target:
              publication_lines.append(f"- Publish target: `{l3_publish_target}`")
            if l3_publish_credential:
              publication_lines.append(f"- Credential type: `{l3_publish_credential}`")
            publication_lines.append(f"- Sync status: `{snapshot_sync_status or 'unknown'}`")
            if snapshot_sync_repo or snapshot_sync_branch:
              publication_lines.append(
                f"- Target: `{snapshot_sync_repo or 'unknown'}@{snapshot_sync_branch or 'unknown'}`"
              )
            if snapshot_sync_commit:
              publication_lines.append(f'- Commit: `{snapshot_sync_commit}`')
            if snapshot_sync_verification:
              publication_lines.append(f'- Verification: `{snapshot_sync_verification}`')
            if snapshot_sync_verified_commit:
              publication_lines.append(f'- Verified commit: `{snapshot_sync_verified_commit}`')
            if snapshot_sync_submission_path:
              publication_lines.append(f'- Submission path: `{snapshot_sync_submission_path}`')
            if snapshot_sync_snapshot_path:
              publication_lines.append(f'- Snapshot path: `{snapshot_sync_snapshot_path}`')
            lines.extend(publication_lines)
            comment_lines.extend(publication_lines)

          summary_path.write_text("\n".join(lines) + "\n", encoding='utf-8')
          comment_path.write_text("\n".join(comment_lines) + "\n", encoding='utf-8')
          PY

      - name: Upload benchmark artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ascend-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/.benchmarks/ci/
          if-no-files-found: warn
          retention-days: 14

      - name: Update PR benchmark comment
        if: ${{ always() && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'issue_comment') }}
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          retries: 3
          script: |
            const fs = require('fs');
            const path = require('path');

            const targetRepoSha = process.env.TARGET_REPO_SHA || process.env.GITHUB_SHA;
            const runId = `ci-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}-${targetRepoSha}`;
            const commentPath = path.join(process.env.GITHUB_WORKSPACE, '.benchmarks', 'ci', runId, 'benchmark_comment.md');
            const marker = '<!-- ascend-benchmark-leaderboard-comment -->';

            if (!fs.existsSync(commentPath)) {
              core.info(`Benchmark comment file not found: ${commentPath}`);
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            const issue_number = context.payload.pull_request?.number || Number(process.env.ISSUE_COMMENT_PR_NUMBER);
            if (!issue_number) {
              core.info('No PR number available for benchmark comment update.');
              return;
            }
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated benchmark comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created benchmark PR comment');
            }

  store-main-perfgate-baseline:
    name: Store main perfgate baseline
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: ascend-benchmark
    runs-on: ubuntu-latest
    env:
      TARGET_REPO_SHA: ${{ github.sha }}
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout benchmark repo
        shell: bash
        env:
          BENCHMARK_REPO_URL: https://github.com/vLLM-HUST/vllm-hust-benchmark.git
          BENCHMARK_REPO_REF: main
        run: |
          set -euo pipefail
          git clone --depth 1 "$BENCHMARK_REPO_URL" vllm-hust-benchmark
          if ! git -C vllm-hust-benchmark rev-parse --verify --quiet "$BENCHMARK_REPO_REF^{commit}" >/dev/null; then
            git -C vllm-hust-benchmark fetch --depth 1 origin "$BENCHMARK_REPO_REF"
            git -C vllm-hust-benchmark checkout --force FETCH_HEAD
          else
            git -C vllm-hust-benchmark checkout --force "$BENCHMARK_REPO_REF"
          fi

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: ascend-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: .benchmarks/ci

      - name: Store perfgate baseline
        shell: bash
        env:
          RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.TARGET_REPO_SHA }}
          RESULT_ROOT: ${{ github.workspace }}/.benchmarks/ci/ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.TARGET_REPO_SHA }}
          PYTHON_BIN: python3
          BENCHMARK_REPO_URL: https://github.com/vLLM-HUST/vllm-hust-benchmark.git
          BENCHMARK_REPO_REF: main
          SAME_SPEC_SPEC_FILE: ${{ github.workspace }}/vllm-hust-benchmark/${{ vars.VLLM_HUST_SAME_SPEC_SPEC_FILE || vars.VLLM_HUST_MAIN_SAME_SPEC_SPEC_FILE || 'docs/official-baselines/official-ascend-jan-2026-v0180-random-online-qwen25-14b-910b2.json' }}
        run: bash .github/workflows/scripts/perfgate_store_baseline.sh
