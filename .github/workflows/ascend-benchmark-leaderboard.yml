name: Ascend Benchmark Leaderboard

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_scenario:
        description: Benchmark scenario to run
        required: false
        type: choice
        default: random-online
        options:
          - random-online
          - sharegpt-online
      publish_to_hf:
        description: Publish benchmark result to HF and refresh website leaderboard
        required: false
        type: boolean
        default: false
      model_name:
        description: Model used for the benchmark run
        required: false
        type: string
        default: Qwen/Qwen2.5-0.5B-Instruct
      dataset_path:
        description: Dataset path on the trusted runner for formal workloads such as sharegpt-online
        required: false
        type: string
        default: ""
      constraints_file:
        description: Constraints JSON file path on the trusted runner for the selected workload
        required: false
        type: string
        default: ""
      num_prompts:
        description: Number of prompts to benchmark
        required: false
        type: string
        default: "8"
      request_rate:
        description: Request rate passed to vllm bench serve
        required: false
        type: string
        default: inf
      max_concurrency:
        description: Max concurrency passed to vllm bench serve
        required: false
        type: string
        default: "4"
      input_length:
        description: Optional logical input length recorded in exported metadata
        required: false
        type: string
        default: ""
      output_length:
        description: Optional logical output length recorded in exported metadata
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  fork-pr-security-note:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain fork PR restriction
        run: |
          echo "Skipping Ascend benchmark on fork PRs because this workflow requires a self-hosted Ascend runner and trusted execution." >> "$GITHUB_STEP_SUMMARY"

  ascend-benchmark:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - linux-aarch64-a2b3-0
      - docker
    timeout-minutes: 60
    env:
      DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER: /usr/local/bin/run_ascend_benchmark_root_helper.sh
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_REPO_ID: intellistream/vllm-hust-benchmark-results
      MODEL_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.model_name || 'Qwen/Qwen2.5-0.5B-Instruct' }}
      BENCH_SCENARIO: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_scenario || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_SCENARIO) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_SCENARIO) || 'random-online' }}
      BENCH_DATASET_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.dataset_path || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_DATASET_PATH) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_DATASET_PATH) || '' }}
      BENCH_CONSTRAINTS_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.constraints_file || (github.event_name == 'pull_request' && vars.VLLM_HUST_PR_BENCHMARK_CONSTRAINTS_FILE) || (github.event_name == 'push' && vars.VLLM_HUST_MAIN_BENCHMARK_CONSTRAINTS_FILE) || '' }}
      MODEL_PARAMETERS: 0.5B
      MODEL_PRECISION: BF16
      DTYPE: bfloat16
      MAX_MODEL_LEN: "256"
      MAX_NUM_SEQS: "1"
      BENCH_NUM_PROMPTS: ${{ github.event_name == 'workflow_dispatch' && inputs.num_prompts || '8' }}
      BENCH_RANDOM_INPUT_LEN: "64"
      BENCH_RANDOM_OUTPUT_LEN: "16"
      BENCH_REQUEST_RATE: ${{ github.event_name == 'workflow_dispatch' && inputs.request_rate || 'inf' }}
      BENCH_MAX_CONCURRENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.max_concurrency || '4' }}
      BENCH_INPUT_LEN: ${{ github.event_name == 'workflow_dispatch' && inputs.input_length || '' }}
      BENCH_OUTPUT_LEN: ${{ github.event_name == 'workflow_dispatch' && inputs.output_length || '' }}
      SOC_VERSION: ascend910b3
      HARDWARE_VENDOR: Huawei
      HARDWARE_CHIP_MODEL: 910B3
      CHIP_COUNT: "1"
      NODE_COUNT: "1"
      SAME_SPEC_BENCHMARK_ENABLED: ${{ vars.VLLM_HUST_SAME_SPEC_BENCHMARK_ENABLED || '1' }}
      SAME_SPEC_SPEC_FILE: ${{ vars.VLLM_HUST_SAME_SPEC_SPEC_FILE || '' }}
      SAME_SPEC_CONSTRAINTS_FILE: ${{ vars.VLLM_HUST_SAME_SPEC_CONSTRAINTS_FILE || '' }}
      ASCEND_BENCHMARK_USE_SUDO: ${{ vars.VLLM_HUST_BENCHMARK_USE_SUDO || '1' }}
      ASCEND_BENCHMARK_ROOT_HELPER: ${{ vars.VLLM_HUST_BENCHMARK_ROOT_HELPER || '' }}
      ALLOW_RANDOM_HF_PUBLISH: ${{ vars.VLLM_HUST_ALLOW_RANDOM_HF_PUBLISH || '0' }}
      WEBSITE_LEADERBOARD_URL: ${{ vars.VLLM_HUST_LEADERBOARD_URL || '' }}
      PUBLISH_TO_HF: ${{ (((github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VLLM_HUST_PUBLISH_BENCHMARK_ON_MAIN == '1') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && vars.VLLM_HUST_PUBLISH_BENCHMARK_ON_PR == '1') || (github.event_name == 'workflow_dispatch' && inputs.publish_to_hf)) && secrets.HF_TOKEN != '') && '1' || '0' }}
      TARGET_REPO_URL: git@github.com:${{ github.repository }}.git
      TARGET_REPO_SHA: ${{ github.sha }}
      BENCHMARK_REPO_URL: git@github.com:vLLM-HUST/vllm-hust-benchmark.git
      BENCHMARK_REPO_SLUG: vLLM-HUST/vllm-hust-benchmark
      BENCHMARK_REPO_GH_TOKEN: ${{ secrets.VLLM_HUST_BENCHMARK_GH_TOKEN }}
      BENCHMARK_REPO_SSH_KEY: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
      BENCHMARK_REPO_REF: ${{ vars.VLLM_HUST_BENCHMARK_REPO_REF || '' }}
      WEBSITE_REPO_URL: git@github.com:vLLM-HUST/vllm-hust-website.git
      VLLM_ASCEND_HUST_REPO_URL: git@github.com:vLLM-HUST/vllm-ascend-hust.git
      HUST_ASCEND_MANAGER_REPO_URL: git@github.com:vLLM-HUST/ascend-runtime-manager.git
      HUST_ASCEND_MANAGER_REPO: ${{ github.workspace }}/ascend-runtime-manager

    steps:
      - name: Pre-clean stale checkout state
        shell: bash
        run: |
          legacy_paths=(
            "${GITHUB_WORKSPACE}/.benchmarks"
            "${GITHUB_WORKSPACE}/.ci-runtime"
            "${GITHUB_WORKSPACE}/vllm-hust-benchmark"
            "${GITHUB_WORKSPACE}/vllm-hust-website"
            "${GITHUB_WORKSPACE}/vllm-ascend-hust"
            "${GITHUB_WORKSPACE}/ascend-runtime-manager"
          )

          shopt -s nullglob dotglob
          workspace_entries=("${GITHUB_WORKSPACE}"/*)
          shopt -u nullglob dotglob
          cleanup_paths=("${legacy_paths[@]}" "${workspace_entries[@]}")

          if [[ "${ASCEND_BENCHMARK_USE_SUDO}" == "1" ]] \
            && command -v sudo >/dev/null 2>&1 \
            && [[ -x "$DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER" ]] \
            && sudo -n "$DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER" cleanup-paths "${cleanup_paths[@]}"; then
            exit 0
          fi

          rm -rf "${cleanup_paths[@]}" || {
            echo "Failed to clear stale benchmark workspace state as the runner user." >&2
            echo "Install or refresh the benchmark root helper at $DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER, then rerun the workflow." >&2
            exit 1
          }

      - name: Configure GitHub SSH checkout
        if: ${{ env.BENCHMARK_REPO_SSH_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          key_file="$HOME/.ssh/vllm_hust_benchmark_key"
          printf '%s\n' "$BENCHMARK_REPO_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          known_hosts_tmp="$(mktemp)"
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com > "$known_hosts_tmp" 2>/dev/null
          if [[ ! -s "$known_hosts_tmp" ]]; then
            echo "Unable to scan github.com host keys." >&2
            exit 2
          fi
          cat "$known_hosts_tmp" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile $key_file
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$HOME/.ssh/config"

          ssh_output="$(ssh -o BatchMode=yes -T git@github.com 2>&1)" && ssh_status=$? || ssh_status=$?
          echo "$ssh_output"
          if [[ "$ssh_output" == *"Permission denied"* ]]; then
            echo "GitHub SSH authentication failed for the configured key." >&2
            exit 2
          fi
          if [[ "$ssh_status" -ne 0 && "$ssh_status" -ne 1 ]]; then
            echo "GitHub SSH probe failed with status $ssh_status." >&2
            exit "$ssh_status"
          fi

      - name: Checkout target repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$TARGET_REPO_URL" "$GITHUB_WORKSPACE" "$TARGET_REPO_SHA"

      - name: Checkout benchmark repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_ref=${3:-}
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir
            local checkout_ref

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-benchmark-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$target_dir" "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if [[ -n "$target_ref" ]]; then
                  checkout_ref="$target_ref"
                  if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_ref^{commit}" >/dev/null; then
                    git -C "$temp_dir" fetch --depth 1 origin "$target_ref"
                    checkout_ref=FETCH_HEAD
                  fi
                  git -C "$temp_dir" checkout --force "$checkout_ref"
                fi
                mv "$temp_dir" "$target_dir"
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$BENCHMARK_REPO_URL" "$GITHUB_WORKSPACE/vllm-hust-benchmark" "$BENCHMARK_REPO_REF"

      - name: Checkout website repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$WEBSITE_REPO_URL" "$GITHUB_WORKSPACE/vllm-hust-website"

      - name: Checkout vllm-ascend-hust repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$VLLM_ASCEND_HUST_REPO_URL" "$GITHUB_WORKSPACE/vllm-ascend-hust"

      - name: Preflight benchmark root helper
        shell: bash
        run: |
          if [[ "${ASCEND_BENCHMARK_USE_SUDO}" != "1" ]]; then
            echo "Skipping benchmark root helper preflight because ASCEND_BENCHMARK_USE_SUDO=${ASCEND_BENCHMARK_USE_SUDO}."
            exit 0
          fi

          repo_helper="$GITHUB_WORKSPACE/vllm-ascend-hust/.github/workflows/scripts/run_ascend_benchmark_root_helper.sh"
          install_script="$GITHUB_WORKSPACE/vllm-ascend-hust/scripts/install_ascend_benchmark_root_helper.sh"
          configured_helper="${ASCEND_BENCHMARK_ROOT_HELPER:-}"
          system_helper="$DEFAULT_SYSTEM_ASCEND_BENCHMARK_ROOT_HELPER"
          helper_fix="sudo RUNNER_USER=grunner bash $install_script"

          write_failure_summary() {
            local reason="$1"
            if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
              {
                echo "## Ascend Benchmark Root Helper Preflight"
                echo
                echo "Status: FAIL"
                echo
                echo "Reason: $reason"
                echo
                echo "Runner host fix: \`$helper_fix\`"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          if [[ ! -f "$repo_helper" ]]; then
            reason="Runner checkout is missing the repository helper source: $repo_helper"
            echo "$reason" >&2
            write_failure_summary "$reason"
            exit 1
          fi

          if [[ ! -f "$install_script" ]]; then
            reason="Runner checkout is missing the helper install script: $install_script"
            echo "$reason" >&2
            write_failure_summary "$reason"
            exit 1
          fi

          if [[ -n "$configured_helper" && "$configured_helper" != "$system_helper" ]]; then
            if [[ ! -x "$configured_helper" ]]; then
              reason="Configured benchmark root helper is not executable: $configured_helper"
              echo "$reason" >&2
              write_failure_summary "$reason"
              exit 1
            fi
            echo "Benchmark root helper preflight passed with configured helper: $configured_helper"
            exit 0
          fi

          if [[ ! -x "$system_helper" ]]; then
            reason="Installed benchmark root helper is missing or not executable: $system_helper"
            echo "$reason" >&2
            write_failure_summary "$reason"
            exit 1
          fi

          if ! cmp -s "$system_helper" "$repo_helper"; then
            reason="Installed benchmark root helper is stale: $system_helper does not match $repo_helper"
            echo "$reason" >&2
            write_failure_summary "$reason"
            exit 1
          fi

          echo "Benchmark root helper preflight passed: $system_helper matches $repo_helper"

      - name: Checkout ascend-runtime-manager repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$HUST_ASCEND_MANAGER_REPO_URL" "$GITHUB_WORKSPACE/ascend-runtime-manager"

      - name: Prepare Hugging Face cache directories
        run: |
          mkdir -p "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$TRANSFORMERS_CACHE"
          chmod 700 "$HF_HOME"
          echo "HF endpoint: $HF_ENDPOINT"

      - name: Resolve benchmark Python runtime
        env:
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/hust_ascend_manager_helper.sh"
          PYTHON_BIN="$(hust_resolve_python_bin)"
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          dirname "$PYTHON_BIN" >> "$GITHUB_PATH"
          "$PYTHON_BIN" --version

      - name: Acquire Ascend hardware lock
        run: bash .github/workflows/scripts/acquire_ascend_hardware_lock.sh

      - name: Runner health preflight (before install)
        env:
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
        run: |
          if [[ "${ASCEND_BENCHMARK_USE_SUDO}" == "1" ]]; then
            echo "Skipping runner-user preinstall NPU preflight because benchmark startup is configured to use the root helper."
            exit 0
          fi

          PRECHECK_DIR="${GITHUB_WORKSPACE}/.benchmarks/ci/preinstall-preflight"
          mkdir -p "$PRECHECK_DIR"

          normalize_visible_devices() {
            local raw_value="${1:-}"
            local device
            local -a devices=()

            IFS=',' read -r -a raw_devices <<< "${raw_value}"
            for device in "${raw_devices[@]}"; do
              device="${device//[[:space:]]/}"
              if [[ -n "${device}" ]]; then
                devices+=("${device}")
              fi
            done

            if [[ "${#devices[@]}" -eq 0 ]]; then
              return 1
            fi

            local normalized_devices
            normalized_devices="$(IFS=','; echo "${devices[*]}")"
            printf '%s\n' "${normalized_devices}"
          }

          log_ascend_visibility() {
            local stage="$1"
            echo "[ascend-visibility][${stage}] ASCEND_VISIBLE_DEVICES=${ASCEND_VISIBLE_DEVICES:-<unset>}"
            echo "[ascend-visibility][${stage}] ASCEND_RT_VISIBLE_DEVICES=${ASCEND_RT_VISIBLE_DEVICES:-<unset>}"
          }

          log_ascend_visibility before-sanitize
          resolved_rt_visible_devices="$(normalize_visible_devices "${ASCEND_RT_VISIBLE_DEVICES:-}" 2>/dev/null || true)"
          if [[ -z "${resolved_rt_visible_devices}" && -n "${ASCEND_RT_VISIBLE_DEVICES+x}" ]]; then
            unset ASCEND_RT_VISIBLE_DEVICES
            echo "[ascend-visibility] Unset empty ASCEND_RT_VISIBLE_DEVICES before preinstall preflight"
          fi

          source "${VLLM_ASCEND_HUST_REPO}/scripts/hust_ascend_manager_helper.sh"
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          log_ascend_visibility after-source
          {
            echo "ASCEND_VISIBLE_DEVICES=${ASCEND_VISIBLE_DEVICES:-<unset>}"
            echo "ASCEND_RT_VISIBLE_DEVICES=${ASCEND_RT_VISIBLE_DEVICES:-<unset>}"
          } > "$PRECHECK_DIR/visible-devices.txt"

          max_attempts=2
          attempt=1
          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "[preinstall-preflight] attempt ${attempt}/${max_attempts}"
            if hust_ascend_manager_run runtime check \
              --repo "$GITHUB_WORKSPACE" \
              --python "$PYTHON_BIN" \
              --require-npu \
              --json | tee "$PRECHECK_DIR/runtime-check-attempt-${attempt}.json"; then
              break
            fi
            if [[ "$attempt" -eq "$max_attempts" ]]; then
              hust_ascend_manager_run doctor --json >"$PRECHECK_DIR/doctor.json" 2>&1 || true
              npu-smi info >"$PRECHECK_DIR/npu-smi-info.txt" 2>&1 || true
              npu-smi info -m >"$PRECHECK_DIR/npu-smi-map.txt" 2>&1 || true
              echo "Runner health preflight failed before installation" >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 10
          done

      - name: Prepare Ascend runtime and install repos
        env:
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
          VLLM_HUST_BENCHMARK_REPO: ${{ github.workspace }}/vllm-hust-benchmark
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          bash "${VLLM_ASCEND_HUST_REPO}/scripts/install_local_ascend_plugin.sh" "$VLLM_ASCEND_HUST_REPO"
          "${PYTHON_BIN}" -m pip install -e . --no-build-isolation --no-deps
          "${PYTHON_BIN}" -m pip install -e "${VLLM_HUST_BENCHMARK_REPO}[publish]" jsonschema

      - name: Verify installation
        env:
          TORCH_DEVICE_BACKEND_AUTOLOAD: "0"
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          "${PYTHON_BIN}" --version
          "${PYTHON_BIN}" - <<'PY'
          import importlib.metadata as metadata
          import importlib.util
          import os
          from pathlib import Path


          def module_path(module_name: str) -> Path:
            spec = importlib.util.find_spec(module_name)
            if spec is None or spec.origin is None:
              raise SystemExit(f"{module_name} is not importable")
            return Path(spec.origin).resolve()


          def dist_version(*dist_names: str) -> str:
            for dist_name in dist_names:
              try:
                return metadata.version(dist_name)
              except metadata.PackageNotFoundError:
                continue
            return "<unknown>"


          expected_repo = Path(os.environ["VLLM_ASCEND_HUST_REPO"]).resolve()
          vllm_path = module_path("vllm")
          vllm_ascend_path = module_path("vllm_ascend")
          platform_plugins = metadata.entry_points(group="vllm.platform_plugins")
          ascend_plugin = [ep for ep in platform_plugins if ep.name == "ascend"]

          print(f"vLLM version: {dist_version('vllm-hust', 'vllm')}")
          print(f"vllm_ascend version: {dist_version('vllm-ascend-hust', 'vllm-ascend')}")
          print(f"vLLM module path: {vllm_path}")
          print(f"vllm_ascend module path: {vllm_ascend_path}")
          print(f"vllm.platform_plugins ascend entry point: {ascend_plugin[0].value if ascend_plugin else '<missing>'}")

          if expected_repo not in vllm_ascend_path.parents:
            raise SystemExit(
              "vllm_ascend is not resolved from the checked-out workspace: "
              f"{vllm_ascend_path} (expected under {expected_repo})"
            )

          if not ascend_plugin:
            raise SystemExit("ascend platform plugin entry point is not installed")
          PY

      - name: Runner health preflight (before benchmark)
        env:
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
        run: |
          if [[ "${ASCEND_BENCHMARK_USE_SUDO}" == "1" ]]; then
            echo "Skipping runner-user prebenchmark NPU preflight because benchmark startup is configured to use the root helper."
            exit 0
          fi

          PRECHECK_DIR="${GITHUB_WORKSPACE}/.benchmarks/ci/prebenchmark-preflight"
          mkdir -p "$PRECHECK_DIR"

          normalize_visible_devices() {
            local raw_value="${1:-}"
            local device
            local -a devices=()

            IFS=',' read -r -a raw_devices <<< "${raw_value}"
            for device in "${raw_devices[@]}"; do
              device="${device//[[:space:]]/}"
              if [[ -n "${device}" ]]; then
                devices+=("${device}")
              fi
            done

            if [[ "${#devices[@]}" -eq 0 ]]; then
              return 1
            fi

            local normalized_devices
            normalized_devices="$(IFS=','; echo "${devices[*]}")"
            printf '%s\n' "${normalized_devices}"
          }

          log_ascend_visibility() {
            local stage="$1"
            echo "[ascend-visibility][${stage}] ASCEND_VISIBLE_DEVICES=${ASCEND_VISIBLE_DEVICES:-<unset>}"
            echo "[ascend-visibility][${stage}] ASCEND_RT_VISIBLE_DEVICES=${ASCEND_RT_VISIBLE_DEVICES:-<unset>}"
          }

          log_ascend_visibility before-sanitize
          resolved_rt_visible_devices="$(normalize_visible_devices "${ASCEND_RT_VISIBLE_DEVICES:-}" 2>/dev/null || true)"
          if [[ -z "${resolved_rt_visible_devices}" && -n "${ASCEND_RT_VISIBLE_DEVICES+x}" ]]; then
            unset ASCEND_RT_VISIBLE_DEVICES
            echo "[ascend-visibility] Unset empty ASCEND_RT_VISIBLE_DEVICES before prebenchmark preflight"
          fi

          source "${VLLM_ASCEND_HUST_REPO}/scripts/hust_ascend_manager_helper.sh"
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          log_ascend_visibility after-source
          {
            echo "ASCEND_VISIBLE_DEVICES=${ASCEND_VISIBLE_DEVICES:-<unset>}"
            echo "ASCEND_RT_VISIBLE_DEVICES=${ASCEND_RT_VISIBLE_DEVICES:-<unset>}"
          } > "$PRECHECK_DIR/visible-devices.txt"

          hust_ascend_manager_run runtime check \
            --repo "$GITHUB_WORKSPACE" \
            --python "$PYTHON_BIN" \
            --require-plugin \
            --require-npu \
            --json | tee "$PRECHECK_DIR/runtime-check.json"

      - name: Run benchmark CI and optional formal publish
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
          VLLM_HUST_REPO: ${{ github.workspace }}
          VLLM_HUST_BENCHMARK_REPO: ${{ github.workspace }}/vllm-hust-benchmark
          VLLM_HUST_WEBSITE_REPO: ${{ github.workspace }}/vllm-hust-website
          RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: |
          source "${VLLM_ASCEND_HUST_REPO}/scripts/use_single_ascend_env.sh"
          max_attempts=${NODE_ENV_RETRY_MAX_ATTEMPTS:-3}
          retry_delay_seconds=${NODE_ENV_RETRY_DELAY_SECONDS:-30}
          attempt=1
          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "[benchmark] attempt ${attempt}/${max_attempts}"
            set +e
            bash .github/workflows/scripts/run_ascend_benchmark_ci.sh
            rc=$?
            set -e

            if [[ "$rc" -eq 0 ]]; then
              break
            fi

            if [[ "$rc" -eq 86 && "$attempt" -lt "$max_attempts" ]]; then
              echo "Detected node-level Ascend runtime failure (87/507899); retrying benchmark after ${retry_delay_seconds}s backoff."
              bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh || true
              sleep "$retry_delay_seconds"
              attempt=$((attempt + 1))
              continue
            fi

            exit "$rc"
          done

      - name: Cleanup leftover Ascend CI processes
        if: always()
        run: |
          bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh

      - name: Release Ascend hardware lock
        if: always()
        run: bash .github/workflows/scripts/release_ascend_hardware_lock.sh

      - name: Build benchmark summary artifacts
        if: always()
        run: |
          "${PYTHON_BIN}" - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = f"ci-{os.environ['GITHUB_RUN_ID']}-{os.environ['GITHUB_RUN_ATTEMPT']}-{os.environ['GITHUB_SHA']}"
          result_root = Path(os.environ['GITHUB_WORKSPACE']) / '.benchmarks' / 'ci' / run_id
          raw_result = result_root / 'raw_benchmark.json'
          leaderboard_entry = result_root / 'submissions' / run_id / 'run_leaderboard.json'
          runner_preflight_failure = result_root / 'runner_preflight_failure.txt'
          summary_path = Path(os.environ['GITHUB_STEP_SUMMARY'])
          comment_path = result_root / 'benchmark_comment.md'
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          bench_scenario = os.environ.get('BENCH_SCENARIO', 'random-online')
          publish_mode = 'formal-publish' if os.environ.get('PUBLISH_TO_HF') == '1' else 'artifact-preview'
          model_name = os.environ.get('MODEL_NAME', 'unknown')
          hf_repo = os.environ.get('HF_REPO_ID', 'unknown')
          leaderboard_url = os.environ.get('WEBSITE_LEADERBOARD_URL', '').strip()

          result_root.mkdir(parents=True, exist_ok=True)

          artifact = None
          if leaderboard_entry.is_file():
            artifact = json.loads(leaderboard_entry.read_text(encoding='utf-8'))

          display_model_name = model_name
          if isinstance(artifact, dict):
            display_model_name = artifact.get('model_name') or model_name

          lines = [
            '## Ascend Benchmark Summary',
            f'- Run ID: `{run_id}`',
            f'- Scenario: `{bench_scenario}`',
            f'- Model: `{display_model_name}`',
            f'- Publish mode: `{publish_mode}`',
            f'- Workflow run: [view run]({run_url})',
          ]
          comment_lines = [
            '<!-- ascend-benchmark-leaderboard-comment -->',
            '## Ascend Benchmark Result',
            f'- Scenario: `{bench_scenario}`',
            f'- Model: `{display_model_name}`',
            f'- Publish mode: `{publish_mode}`',
            f'- Workflow run: [view run]({run_url})',
          ]
          if runner_preflight_failure.is_file():
            failure_note = (
              '- Runner health: `unhealthy` '
              '(benchmark failed before vLLM startup because all visible torch_npu allocations failed)'
            )
            lines.append(failure_note)
            comment_lines.append(failure_note)
          if raw_result.is_file():
            payload = json.loads(raw_result.read_text(encoding='utf-8'))
            metric_lines = [
              f"- Request throughput: `{payload.get('request_throughput')}` req/s",
              f"- Output throughput: `{payload.get('output_throughput')}` tok/s",
              f"- Mean TTFT: `{payload.get('mean_ttft_ms')}` ms",
              f"- Failed requests: `{payload.get('failed')}`",
            ]
            lines.extend(metric_lines)
            comment_lines.extend(metric_lines)
          else:
            lines.append('- Raw benchmark result: `missing`')
            comment_lines.append('- Raw benchmark result: `missing`')
          if leaderboard_entry.is_file():
            lines.append(f"- Leaderboard engine version: `{artifact.get('engine_version')}`")
            comment_lines.append(f"- Leaderboard engine version: `{artifact.get('engine_version')}`")
            same_spec = artifact.get('same_spec') if isinstance(artifact, dict) else None
            if isinstance(same_spec, dict):
              spec_id = same_spec.get('spec_id') or 'unknown'
              spec_hash = str(same_spec.get('resolved_spec_hash') or '')
              spec_note = f'- Same-spec goal artifact: `{spec_id}`'
              if spec_hash:
                spec_note += f' (`{spec_hash[:8]}`)'
              lines.append(spec_note)
              comment_lines.append(spec_note)
          else:
            lines.append('- Leaderboard entry: `missing`')
            comment_lines.append('- Leaderboard entry: `missing`')

          if bench_scenario != 'random-online':
            dataset_path = os.environ.get('BENCH_DATASET_PATH') or 'unset'
            constraints_path = os.environ.get('BENCH_CONSTRAINTS_FILE') or 'unset'
            lines.append(f'- Dataset path: `{dataset_path}`')
            lines.append(f'- Constraints file: `{constraints_path}`')
            comment_lines.append(f'- Dataset path: `{dataset_path}`')
            comment_lines.append(f'- Constraints file: `{constraints_path}`')
          elif publish_mode == 'artifact-preview' and not (artifact and isinstance(artifact.get('same_spec'), dict)):
            note = '- Note: random-online runs stay as preview artifacts unless random preview publish is explicitly enabled.'
            lines.append(note)
            comment_lines.append(note)

          if publish_mode == 'hf-sync':
            hf_note = f'- HF dataset repo: `{hf_repo}`'
            lines.append(hf_note)
            comment_lines.append(hf_note)
            if leaderboard_url:
              site_note = f'- Website leaderboard: {leaderboard_url}'
              lines.append(site_note)
              comment_lines.append(site_note)

          summary_path.write_text("\n".join(lines) + "\n", encoding='utf-8')
          comment_path.write_text("\n".join(comment_lines) + "\n", encoding='utf-8')
          PY

      - name: Upload benchmark artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ascend-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/.benchmarks/ci/
          if-no-files-found: warn
          retention-days: 14

      - name: Update PR benchmark comment
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const runId = `ci-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}-${process.env.GITHUB_SHA}`;
            const commentPath = path.join(process.env.GITHUB_WORKSPACE, '.benchmarks', 'ci', runId, 'benchmark_comment.md');
            const marker = '<!-- ascend-benchmark-leaderboard-comment -->';

            if (!fs.existsSync(commentPath)) {
              core.info(`Benchmark comment file not found: ${commentPath}`);
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            const issue_number = context.payload.pull_request.number;
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated benchmark comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created benchmark PR comment');
            }