name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/vllm
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Detect Zyphra base version
        id: zyphra_version
        run: |
          VERSION=$(git ls-remote --tags https://github.com/Zyphra/vllm.git \
            | awk '{print $2}' \
            | grep 'refs/tags/v[0-9]' \
            | sed 's|refs/tags/||' \
            | sort -V | tail -1)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Detected Zyphra base version: ${VERSION}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.zyphra
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VLLM_BASE_VERSION=${{ steps.zyphra_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
