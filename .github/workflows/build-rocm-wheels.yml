name: Build RDNA3/3.5 prototype wheels

on:
  push:
    branches:
      - gfx11
  pull_request:
    branches:
      - gfx11
  workflow_dispatch:
    inputs:
      pytorch_index:
        description: 'PyTorch index URL for ROCm nightly wheels'
        default: 'https://rocm.nightlies.amd.com/v2-staging/gfx1151'
        required: false
      rocm_arch:
        description: 'ROCm architecture (e.g., gfx1151, gfx1150;gfx1151)'
        default: 'gfx1103;gfx1150;gfx1151'
        required: false

env:
  PYTORCH_INDEX_URL: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/v2-staging/gfx1151' }}
  PYTORCH_ROCM_ARCH: ${{ github.event.inputs.rocm_arch || 'gfx1103;gfx1150;gfx1151' }}
  CI_IMAGE: ghcr.io/rocm/vllm/gfx11-ci:latest

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocm/vllm/gfx11-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      actions: write
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch upstream tags for versioning
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add upstream https://github.com/vllm-project/vllm.git || true
          git fetch upstream --tags || echo "Warning: could not fetch upstream tags"
          git describe --tags --always || echo "Warning: git describe failed"

      - name: Install build dependencies
        run: |
          # 1) Install torch from the nightly ROCm index *only* (no
          #    PyPI fallback) so we always get the ROCm wheel.
          uv pip install --system \
            --upgrade-package "rocm[devel,libraries]" \
            --upgrade-package torch \
            --upgrade-package torchaudio \
            --upgrade-package torchvision \
            "rocm[devel,libraries]" \
            torch \
            torchaudio \
            torchvision \
            --index-url ${{ env.PYTORCH_INDEX_URL }}
          # rocm-sdk-devel ships a tarball that must be unpacked after every upgrade
          rocm-sdk init
          # 2) Install the remaining build deps from the requirements
          #    file with torch/torchvision/torchaudio lines and the
          #    stable ROCm index stripped out.
          grep -v -E '^(torch|torchvision|torchaudio)==' requirements/build/rocm.txt \
            | grep -v 'download.pytorch.org' \
            > requirements/build/rocm-ci.txt
          uv pip install --system -r requirements/build/rocm-ci.txt \
            --index-url ${{ env.PYTORCH_INDEX_URL }} \
            --extra-index-url https://pypi.org/simple/ \
            --index-strategy unsafe-first-match

      - name: Expose GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'true')
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      # TODO: Remove this step once the gfx11-ci image is rebuilt with sccache v0.14.0
      - name: Upgrade sccache
        run: |
          curl -L "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin --wildcards '*/sccache'
          sccache --version

      - name: Build wheel
        env:
          PYTORCH_ROCM_ARCH: ${{ env.PYTORCH_ROCM_ARCH }}
          VLLM_TARGET_DEVICE: rocm
          MAX_JOBS: 2
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_IDLE_TIMEOUT: 0
        run: |
          echo "=== Environment ==="
          echo "ROCM_PATH=$ROCM_PATH"
          echo "PYTORCH_ROCM_ARCH=$PYTORCH_ROCM_ARCH"
          hipcc --version
          sccache --show-stats || true
          echo ""
          echo "=== Building wheel ==="
          python setup.py bdist_wheel --dist-dir=dist
          echo ""
          sccache --show-stats || true
          ls -la dist/

      - name: Rename wheel for manylinux compliance
        run: |
          cd dist
          for wheel in *.whl; do
            if [[ "$wheel" == *"linux"* ]]; then
              new_name="${wheel/linux/manylinux_2_31}"
              mv "$wheel" "$new_name"
              echo "Renamed $wheel to $new_name"
            fi
          done
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: dist/*.whl
          retention-days: 90

  test-kernels-correctness:
    name: test-kernels (correctness)
    needs: build-wheel
    uses: ./.github/workflows/test-rocm-kernels.yml
    with:
      test_name: correctness
      runs_on: linux-strix-halo-gpu-rocm-oem
      ci_image: ghcr.io/rocm/vllm/gfx11-ci:latest
      pytorch_index: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/v2-staging/gfx1151' }}
      timeout: 300
      pytest_args: >-
        tests/kernels/moe/test_exllama_moe.py
        tests/kernels/moe/test_hybrid_w4a16_moe.py
        tests/kernels/quantization/test_awq_gemv_moe.py
        tests/kernels/quantization/test_hip_w4a16.py
        tests/kernels/quantization/test_hybrid_w4a16_triton.py
        tests/kernels/quantization/test_rocm_compressed_tensors_w4a16.py
        tests/kernels/quantization/test_rocm_skinny_gemms.py
        tests/kernels/quantization/test_dynamic_int8_lm_head.py
        tests/quantization/test_hip_w4a16_kernel.py

  test-kernels-performance:
    name: test-kernels (performance)
    needs: build-wheel
    uses: ./.github/workflows/test-rocm-kernels.yml
    with:
      test_name: performance
      runs_on: linux-strix-halo-gpu-rocm-noneng
      ci_image: ghcr.io/rocm/vllm/gfx11-ci:latest
      pytorch_index: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/v2-staging/gfx1151' }}
      timeout: 300
      pytest_args: >-
        tests/kernels/quantization/test_hybrid_w4a16_perf.py

  upload-wheel:
    runs-on: ubuntu-latest
    # TODO: Until we understand the reason for inconsistent
    # performance on different runners, we don't let
    # tests-kernels-performance block the upload.  Runner VRAM
    # configuration is one idea.
    needs: [build-wheel, test-kernels-correctness]
    if: github.event_name == 'push' && github.repository_owner == 'ROCm'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/workflows/scripts
          fetch-depth: 1

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: dist/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::317668459450:role/therock-aig-embd-gfx11-wheels-s3-oidc
          aws-region: us-east-1

      - name: Upload wheel to S3
        run: |
          pip install boto3
          python .github/workflows/scripts/upload_wheel_s3.py \
            --bucket aig-embd-gfx11-wheels \
            --package vllm \
            --wheel-dir dist/
