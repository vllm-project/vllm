name: pre-commit

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-run-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Check PR label and author merge count
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const { data: pr } = await github.rest.pulls.get({
            ...context.repo,
            pull_number: context.payload.pull_request.number,
          });

          const hasReadyLabel = pr.labels.some(l => l.name === 'ready');
          const hasVerifiedLabel = pr.labels.some(l => l.name === 'verified');

          const { data: mergedPRs } = await github.rest.search.issuesAndPullRequests({
            q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged author:${pr.user.login}`,
            per_page: 4,
          });
          const mergedCount = mergedPRs.total_count;

          if (hasReadyLabel || hasVerifiedLabel || mergedCount >= 4) {
            core.info(`Check passed: verified label=${hasVerifiedLabel}, ready label=${hasReadyLabel}, 4+ merged PRs=${mergedCount >= 4}`);
          } else {
            core.setFailed(`PR must have the 'verified' or 'ready' (which also triggers tests) label or the author must have at least 4 merged PRs (found ${mergedCount}).`);
          }

  pre-commit-hooks:
    name: pre-commit hooks
    needs: pre-run-check
    if: always() && (needs.pre-run-check.result == 'success' || needs.pre-run-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: ./.github/actions/setup-pre-commit
    - run: echo "::add-matcher::.github/workflows/matchers/actionlint.json"
    - run: echo "::add-matcher::.github/workflows/matchers/markdownlint.json"
    - run: echo "::add-matcher::.github/workflows/matchers/mypy.json"
    - name: Run non-mypy hooks
      env:
        SKIP: mypy-3.10,mypy-3.11,mypy-3.12,mypy-3.13
      run: pre-commit run --show-diff-on-failure --color=always --all-files --hook-stage manual

  mypy:
    name: ${{ matrix.hook }}
    needs: pre-run-check
    if: always() && (needs.pre-run-check.result == 'success' || needs.pre-run-check.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hook:
        - mypy-3.10
        - mypy-3.11
        - mypy-3.12
        - mypy-3.13
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: ./.github/actions/setup-pre-commit
    - run: echo "::add-matcher::.github/workflows/matchers/mypy.json"
    - name: Run ${{ matrix.hook }}
      run: pre-commit run ${{ matrix.hook }} --show-diff-on-failure --color=always --all-files --hook-stage manual

  pre-commit:
    name: pre-commit
    needs:
    - pre-run-check
    - pre-commit-hooks
    - mypy
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Check pre-commit result
      env:
        PRE_RUN_RESULT: ${{ needs.pre-run-check.result }}
        HOOKS_RESULT: ${{ needs.pre-commit-hooks.result }}
        MYPY_RESULT: ${{ needs.mypy.result }}
      run: |
        echo "pre-run-check: ${PRE_RUN_RESULT}"
        echo "pre-commit hooks: ${HOOKS_RESULT}"
        echo "mypy: ${MYPY_RESULT}"

        if [[ "${PRE_RUN_RESULT}" == "failure" || "${PRE_RUN_RESULT}" == "cancelled" ]]; then
          exit 1
        fi
        if [[ "${HOOKS_RESULT}" != "success" ]]; then
          exit 1
        fi
        if [[ "${MYPY_RESULT}" != "success" ]]; then
          exit 1
        fi
