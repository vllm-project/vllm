name: pre-commit

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-run-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Check PR label and author merge count
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        retries: 3
        script: |
          const { data: pr } = await github.rest.pulls.get({
            ...context.repo,
            pull_number: context.payload.pull_request.number,
          });

          const hasReadyLabel = pr.labels.some(l => l.name === 'ready');
          const hasVerifiedLabel = pr.labels.some(l => l.name === 'verified');

          const { data: mergedPRs } = await github.rest.search.issuesAndPullRequests({
            q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged author:${pr.user.login}`,
            per_page: 4,
          });
          const mergedCount = mergedPRs.total_count;

          if (hasReadyLabel || hasVerifiedLabel || mergedCount >= 4) {
            core.info(`Check passed: verified label=${hasVerifiedLabel}, ready label=${hasReadyLabel}, 4+ merged PRs=${mergedCount >= 4}`);
          } else {
            core.setFailed(`PR must have the 'verified' or 'ready' (which also triggers tests) label or the author must have at least 4 merged PRs (found ${mergedCount}).`);
          }

  pre-commit:
    needs: pre-run-check
    if: always() && (needs.pre-run-check.result == 'success' || needs.pre-run-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
    - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      with:
        python-version: "3.11"
    - name: Install actionlint
      run: |
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        curl -fsSL \
          https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
          -o /tmp/actionlint.tar.gz
        tar -xzf /tmp/actionlint.tar.gz -C /tmp
        install -m 0755 /tmp/actionlint "$HOME/.local/bin/actionlint"
    - name: Install shellcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    - run: echo "::add-matcher::.github/workflows/matchers/actionlint.json"
    - run: echo "::add-matcher::.github/workflows/matchers/markdownlint.json"
    - run: echo "::add-matcher::.github/workflows/matchers/mypy.json"
    - name: Run actionlint
      run: actionlint -color
    - name: Determine pre-commit range
      id: pre_commit_range
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "from_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "to_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
        elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
          echo "from_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          echo "to_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "full_scan=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Install pre-commit
      run: python -m pip install pre-commit
    - name: Run pre-commit
      env:
        PRE_COMMIT_HOME: ${{ runner.temp }}/.cache/pre-commit
        GOCACHE: ${{ runner.temp }}/.cache/go-build
        XDG_CACHE_HOME: ${{ runner.temp }}/.cache
        XDG_CONFIG_HOME: ${{ runner.temp }}/.config
        UV_CACHE_DIR: ${{ runner.temp }}/.cache/uv
        SKIP: actionlint
      run: |
        if [[ "${{ steps.pre_commit_range.outputs.full_scan }}" == "true" ]]; then
          pre-commit run --all-files --hook-stage manual
        else
          pre-commit run \
            --from-ref "${{ steps.pre_commit_range.outputs.from_ref }}" \
            --to-ref "${{ steps.pre_commit_range.outputs.to_ref }}" \
            --hook-stage manual
        fi
