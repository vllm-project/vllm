name: Linux Ascend Inference Regression

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux-ascend-inference-regression:
    if: >-
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          contains(github.event.pull_request.labels.*.name, 'ready') ||
          contains(github.event.pull_request.labels.*.name, 'verified')
        )
      )
    runs-on:
      - self-hosted
      - linux-aarch64-a2b3-0
      - docker
    timeout-minutes: 45
    env:
      DEFAULT_SYSTEM_ASCEND_ROOT_HELPER: /usr/local/bin/run_ascend_benchmark_root_helper.sh
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      ASCEND_E2E_USE_SUDO: ${{ vars.VLLM_HUST_ASCEND_E2E_USE_SUDO || '1' }}
      ASCEND_E2E_ROOT_HELPER: ${{ vars.VLLM_HUST_ASCEND_E2E_ROOT_HELPER || '' }}
      SOC_VERSION: ascend910b3
      TARGET_REPO_URL: git@github.com:${{ github.repository }}.git
      TARGET_REPO_SHA: ${{ github.sha }}
      VLLM_ASCEND_HUST_REPO: ${{ github.workspace }}/vllm-ascend-hust
      VLLM_ASCEND_HUST_REPO_URL: git@github.com:vLLM-HUST/vllm-ascend-hust.git
      HUST_ASCEND_MANAGER_REPO: ${{ github.workspace }}/ascend-runtime-manager
      HUST_ASCEND_MANAGER_REPO_URL: git@github.com:vLLM-HUST/ascend-runtime-manager.git
      VLLM_USE_PRECOMPILED: "0"

    steps:
      - name: Pre-clean stale checkout state
        shell: bash
        run: |
          legacy_paths=(
            "${GITHUB_WORKSPACE}/.ci-runtime"
            "${GITHUB_WORKSPACE}/vllm-ascend-hust"
            "${GITHUB_WORKSPACE}/ascend-runtime-manager"
          )

          shopt -s nullglob dotglob
          workspace_entries=("${GITHUB_WORKSPACE}"/*)
          shopt -u nullglob dotglob
          cleanup_paths=("${legacy_paths[@]}" "${workspace_entries[@]}")

          if [[ "${ASCEND_E2E_USE_SUDO}" == "1" ]] \
            && command -v sudo >/dev/null 2>&1 \
            && [[ -x "$DEFAULT_SYSTEM_ASCEND_ROOT_HELPER" ]] \
            && sudo -n "$DEFAULT_SYSTEM_ASCEND_ROOT_HELPER" cleanup-paths "${cleanup_paths[@]}"; then
            exit 0
          fi

          rm -rf "${cleanup_paths[@]}"

      - name: Checkout target repo with retry
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local target_sha=$3
            local attempts=4
            local delay_seconds=15
            local try=1
            local parent_dir
            local temp_dir

            parent_dir=$(dirname "$target_dir")
            temp_dir="${parent_dir}/.checkout-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$parent_dir"
            rm -rf "$temp_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$temp_dir"; then
                if ! git -C "$temp_dir" rev-parse --verify --quiet "$target_sha^{commit}" >/dev/null; then
                  git -C "$temp_dir" fetch --depth 1 origin "$target_sha"
                fi
                git -C "$temp_dir" checkout --force "$target_sha"
                rm -rf "$target_dir"
                mv "$temp_dir" "$target_dir"
                return 0
              fi

              echo "Clone failed ($try/$attempts): $repo_url" >&2
              rm -rf "$temp_dir"
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$TARGET_REPO_URL" "$GITHUB_WORKSPACE" "$TARGET_REPO_SHA"

      - name: Prepare Hugging Face cache directories
        run: |
          mkdir -p "$HF_HOME" "$HUGGINGFACE_HUB_CACHE" "$TRANSFORMERS_CACHE"
          chmod 700 "$HF_HOME"
          echo "HF endpoint: $HF_ENDPOINT"
          echo "HF home: $HF_HOME"
          if [[ -n "${HF_TOKEN:-}" ]]; then
            echo "HF token: configured"
          else
            echo "HF token: not configured"
          fi

      - name: Checkout vllm-ascend-hust repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$VLLM_ASCEND_HUST_REPO_URL" "$VLLM_ASCEND_HUST_REPO"

      - name: Preflight root helper
        shell: bash
        run: |
          if [[ "${ASCEND_E2E_USE_SUDO}" != "1" ]]; then
            echo "Skipping Ascend E2E root helper preflight because ASCEND_E2E_USE_SUDO=${ASCEND_E2E_USE_SUDO}."
            exit 0
          fi

          repo_helper="$GITHUB_WORKSPACE/vllm-ascend-hust/.github/workflows/scripts/run_ascend_benchmark_root_helper.sh"
          install_script="$GITHUB_WORKSPACE/vllm-ascend-hust/scripts/install_ascend_benchmark_root_helper.sh"
          configured_helper="${ASCEND_E2E_ROOT_HELPER:-}"
          system_helper="$DEFAULT_SYSTEM_ASCEND_ROOT_HELPER"
          helper_fix="sudo RUNNER_USER=grunner bash $install_script"

          if [[ ! -f "$repo_helper" ]]; then
            echo "Runner checkout is missing the repository helper source: $repo_helper" >&2
            echo "Runner host fix: $helper_fix" >&2
            exit 1
          fi

          if [[ ! -f "$install_script" ]]; then
            echo "Runner checkout is missing the helper install script: $install_script" >&2
            exit 1
          fi

          if [[ -n "$configured_helper" && "$configured_helper" != "$system_helper" ]]; then
            [[ -x "$configured_helper" ]] || {
              echo "Configured Ascend E2E root helper is not executable: $configured_helper" >&2
              exit 1
            }
            exit 0
          fi

          [[ -x "$system_helper" ]] || {
            echo "Installed Ascend E2E root helper is missing or not executable: $system_helper" >&2
            echo "Runner host fix: $helper_fix" >&2
            exit 1
          }

          cmp -s "$system_helper" "$repo_helper" || {
            echo "Installed Ascend E2E root helper is stale: $system_helper does not match $repo_helper" >&2
            echo "Runner host fix: $helper_fix" >&2
            exit 1
          }

      - name: Checkout ascend-runtime-manager repo
        run: |
          clone_with_retry() {
            local repo_url=$1
            local target_dir=$2
            local attempts=4
            local delay_seconds=15
            local try=1

            rm -rf "$target_dir"
            while [[ "$try" -le "$attempts" ]]; do
              if git clone --depth 1 "$repo_url" "$target_dir"; then
                return 0
              fi
              echo "Clone failed ($try/$attempts): $repo_url" >&2
              if [[ "$try" -lt "$attempts" ]]; then
                sleep "$delay_seconds"
              fi
              try=$((try + 1))
            done

            echo "Failed to clone $repo_url after ${attempts} attempts" >&2
            return 1
          }

          clone_with_retry "$HUST_ASCEND_MANAGER_REPO_URL" "$HUST_ASCEND_MANAGER_REPO"

      - name: Resolve Ascend Python runtime
        run: |
          source "$VLLM_ASCEND_HUST_REPO/scripts/hust_ascend_manager_helper.sh"
          PYTHON_BIN="$(hust_resolve_python_bin)"
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          dirname "$PYTHON_BIN" >> "$GITHUB_PATH"
          "$PYTHON_BIN" --version

      - name: Acquire Ascend hardware lock
        run: bash .github/workflows/scripts/acquire_ascend_hardware_lock.sh

      - name: Prepare Ascend runtime and install current checkout
        run: |
          source "$VLLM_ASCEND_HUST_REPO/scripts/use_single_ascend_env.sh"
          bash "$VLLM_ASCEND_HUST_REPO/scripts/install_local_ascend_plugin.sh" "$VLLM_ASCEND_HUST_REPO"
          VLLM_TARGET_DEVICE=empty "$PYTHON_BIN" -m pip install -e . --no-build-isolation --no-deps

      - name: Verify installation
        run: |
          source "$VLLM_ASCEND_HUST_REPO/scripts/use_single_ascend_env.sh"
          which python
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -c "import vllm; print(f'vLLM version: {vllm.__version__}')"

      - name: Run real inference regression checks
        env:
          MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
          DTYPE: bfloat16
          MAX_MODEL_LEN: "256"
          MAX_NUM_SEQS: "1"
          PROMPT: The capital of France is
          CHAT_MESSAGE: Tell me one short fact about France.
          MAX_TOKENS: "8"
          BENCH_NUM_PROMPTS: "5"
        run: |
          source "$VLLM_ASCEND_HUST_REPO/scripts/use_single_ascend_env.sh"
          bash .github/workflows/scripts/run_e2e_inference_regression.sh

      - name: Cleanup leftover Ascend CI processes
        if: always()
        run: |
          source "$VLLM_ASCEND_HUST_REPO/scripts/use_single_ascend_env.sh"
          bash .github/workflows/scripts/cleanup_ascend_ci_processes.sh

      - name: Release Ascend hardware lock
        if: always()
        run: bash .github/workflows/scripts/release_ascend_hardware_lock.sh
