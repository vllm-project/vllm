# Run the image build and eval workflow
# Can be triggered manually or via workflow_call for evaluation coverage (lm_eval, bee_eval).
name: build-and-eval

on:
  workflow_dispatch:
    inputs:
      docker_image_tag:
        required: false
        type: string
        default: ''
        description: 'Docker image tag to use for tests (defaults to current commit SHA)'
      model_path:
        required: false
        type: string
        default: 'gs://cohere-model-efficiency-ci/engines/'
        description: 'GCS prefix for model checkpoints (prefix + model_name)'
      device:
        type: choice
        description: 'Device type'
        required: true
        default: all
        options:
          - all
          - cpu
          - h100
          - mi300x
          - a100
          - b200
          - gb200
      models:
        required: false
        type: string
        default: 'command-r7b_fp8,command-a-vision_fp8,c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_w4a8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8,c5-3a30t-base_bf16'
        description: 'Models to run eval on (comma-separated). Optional tensor parallel override per entry: model:tpN (e.g. command-r7b_fp8:tp1). If omitted, uses each model recommended_tp from tp_model_map.json. When any entry uses :tpN, every entry must use the same :tpN.'
      evaluations:
        required: false
        type: choice
        default: 'bee_eval'
        description: 'Eval suites to run'
        options:
          - lm_eval
          - bee_eval
      hardware_profiles_override:
        required: false
        type: string
        default: ''
        description: 'YAML content to override hardware_profiles.yaml (optional, replaces entire file)'
      result_upload_branch:
        type: choice
        default: ci_dump
        required: false
        description: 'Branch to upload reporting results to'
        options:
          - ci_dump
          - gh-pages
  workflow_call:
    inputs:
      docker_image_tag:
        required: false
        type: string
        default: ''
        description: 'Docker image tag to use for tests (defaults to current commit SHA)'
      model_path:
        required: false
        type: string
        default: 'gs://cohere-model-efficiency-ci/engines/'
        description: 'GCS prefix for model checkpoints (prefix + model_name)'
      device:
        required: false
        type: string
        default: all
      models:
        required: false
        default: 'command-r7b_fp8,command-a-vision_fp8,c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_w4a8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8,c5-3a30t-base_bf16'
        type: string
        description: 'Models to run eval on (comma-separated). Optional :tpN suffix per entry; same rules as workflow_dispatch.'
      evaluations:
        required: false
        default: 'none'
        type: string
        description: 'Eval suites to run (none, lm_eval, bee_eval)'
      hardware_profiles_override:
        required: false
        type: string
        default: ''
        description: 'YAML content to override hardware_profiles.yaml (optional, replaces entire file)'
      result_upload_branch:
        required: false
        type: string
        default: 'ci_dump'
        description: 'Branch to upload reporting results to'
    secrets:
      HF_TOKEN:
        required: true
      SLACK_WEBHOOK:
        required: true
      CO_API_KEY_STAGING:
        required: true
      BEE_DEPLOY_KEY:
        required: true

jobs:
  # Pin the branch to a commit SHA so that a push mid-run cannot cause the
  # build and test steps to diverge on different commits.
  resolve-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - id: resolve
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: resolve-commit
    if: ${{ inputs.docker_image_tag == '' }}
    uses: ./.github/workflows/build-and-push.yaml
    secrets: inherit
    with:
        git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
        incremental_build: true
        providers: '["nvidia","amd","cpu"]'

  determine-devices:
    needs: resolve-commit
    runs-on: ubuntu-latest
    outputs:
      devices: ${{ steps.set-devices.outputs.devices }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-commit.outputs.commit_sha }}

      - id: set-devices
        run: |
          if [ "${{ inputs.device }}" == "all" ]; then
            # Read available GPUs from runner_map.json
            devices=$(jq -r 'keys | map(select(. != "_comment" and . != "cpu")) | @json' tests/cohere/configs/runner_map.json)
            echo "devices=$devices" >> "$GITHUB_OUTPUT"
          else
            echo "devices=[\"${{ inputs.device }}\"]" >> "$GITHUB_OUTPUT"
          fi

  dispatcher:
    needs: [resolve-commit, build-and-push, determine-devices]
    if: ${{ always() && !cancelled() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.determine-devices.outputs.devices) }}
    uses: ./.github/workflows/dispatcher.yaml
    secrets:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}
        BEE_DEPLOY_KEY: ${{ secrets.BEE_DEPLOY_KEY }}
    with:
        git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
        result_upload_branch: ${{ inputs.result_upload_branch }}
        features: none
        benchmarks: ${{ inputs.evaluations }}
        models: ${{ inputs.models }}
        device: ${{ matrix.device }}
        hardware_profiles_override: ${{ inputs.hardware_profiles_override }}
        docker_commit: ${{ inputs.docker_image_tag }}
        model_path: ${{ inputs.model_path }}
