name: nightly-benchmark

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 1:00 AM EST
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Branch to test (defaults to triggering branch)'
        required: false
        type: string
      result_upload_branch:
        description: 'Branch to upload results to (schedule uses gh-pages)'
        required: false
        type: string
        default: ci_dump
      run_mode:
        description: >
          Which job groups to run (schedule always runs both).
          tests = build + self-hosted dispatcher (tests + bee_eval, no bench).
          bench = build + dispatcher perf benchmarks only.
          evals = build + kinfer-backed MLS evals only (no self-hosted dispatcher tests or bench).
        required: false
        type: choice
        default: both
        options:
          - both
          - tests
          - bench
          - evals
      docker_tag:
        description: >
          Docker image tag for kinfer evals. Leave blank to use the freshly built
          image from the current run. Set to a specific tag (commit SHA, release
          tag, etc.) to skip the build and target a pre-existing image instead.
        required: false
        type: string
        default: ''

jobs:
  # Resolve the branch to a pinned commit SHA before anything else runs.
  # All downstream jobs reference this SHA so that a commit pushed mid-run
  # cannot cause builds and tests to diverge.
  resolve-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref_name }}
      - id: resolve
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Generate a single UTC timestamp shared by all kinfer eval jobs so that
  # B200 and MI300X runs from the same nightly land at the same x position
  # in the W&B trend charts.
  generate-run-timestamp:
    runs-on: ubuntu-latest
    outputs:
      run_timestamp: ${{ steps.ts.outputs.run_timestamp }}
    steps:
      - id: ts
        run: echo "run_timestamp=$(date -u +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"

  trigger-build-and-push:
    # Skip when a pre-built docker_tag is supplied — no need to rebuild.
    if: ${{ !inputs.docker_tag && (!inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' || inputs.run_mode == 'bench' || inputs.run_mode == 'evals') }}
    needs: resolve-commit
    uses: ./.github/workflows/build-and-push.yaml
    secrets: inherit
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      providers: '["nvidia","amd","cpu"]'

  trigger-dispatch-cpu:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: gh-pages
      features: cpu_check
      benchmarks: none
      device: cpu
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  # Separate dispatch for bee eval and bench runs
  trigger-dispatch-h100:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: all
      benchmarks: bee_eval
      models: 'c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_w4a8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
      device: h100
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}
      BEE_DEPLOY_KEY: ${{ secrets.BEE_DEPLOY_KEY }}

  trigger-dispatch-gb200:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: all
      benchmarks: bee_eval
      models: 'c4-25a218t_fp8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
      device: gb200
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}
      BEE_DEPLOY_KEY: ${{ secrets.BEE_DEPLOY_KEY }}

  trigger-dispatch-mi300x:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: all
      benchmarks: bee_eval
      # AMD + w4a16 is not supported yet
      # removed c4-25a218t_fp8_eagle_l5 as it almost doubled the runtime of c4-25a218t_fp8
      models: 'c4-25a218t_fp8,c5-3a30t_fp8'
      device: mi300x
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}
      BEE_DEPLOY_KEY: ${{ secrets.BEE_DEPLOY_KEY }}

  # A100 dispatch removed: runner_map only defined fast_check for a100,
  # and features: all no longer includes fast_check.

  trigger-dispatch-b200:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'tests' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: all
      benchmarks: none
      models: 'c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
      device: b200
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  # lm_eval runs — disabled until evaluate is bumped to 0.4.6 (incompatible with huggingface-hub>=1.5.0)

  # trigger-dispatch-lm-eval-h100:
  #   needs: [resolve-commit, trigger-build-and-push]
  #   uses: ./.github/workflows/dispatcher.yaml
  #   with:
  #     git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
  #     result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
  #     features: none
  #     benchmarks: lm_eval
  #     models: 'c4-25a218t_fp8,c4-25a218t_int4a16,c4-25a218t_w4a8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
  #     device: h100
  #     hardware_profiles_override: ''
  #     model_path: 'gs://cohere-model-efficiency-ci/engines/'
  #   secrets:
  #     HF_TOKEN: ${{ secrets.HF_TOKEN }}
  #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  #     CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  # trigger-dispatch-lm-eval-gb200:
  #   needs: [resolve-commit, trigger-build-and-push]
  #   uses: ./.github/workflows/dispatcher.yaml
  #   with:
  #     git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
  #     result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
  #     features: none
  #     benchmarks: lm_eval
  #     models: 'c4-25a218t_fp8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
  #     device: gb200
  #     hardware_profiles_override: ''
  #     model_path: 'gs://cohere-model-efficiency-ci/engines/'
  #   secrets:
  #     HF_TOKEN: ${{ secrets.HF_TOKEN }}
  #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  #     CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  # trigger-dispatch-lm-eval-mi300x:
  #   needs: [resolve-commit, trigger-build-and-push]
  #   uses: ./.github/workflows/dispatcher.yaml
  #   with:
  #     git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
  #     result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
  #     features: none
  #     benchmarks: lm_eval
  #     # AMD + w4a16 is not supported yet
  #     models: 'c4-25a218t_fp8,c5-3a30t_fp8'
  #     device: mi300x
  #     hardware_profiles_override: ''
  #     model_path: 'gs://cohere-model-efficiency-ci/engines/'
  #   secrets:
  #     HF_TOKEN: ${{ secrets.HF_TOKEN }}
  #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  #     CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  # Kinfer-backed base model evals (separate flow from the self-hosted dispatcher).
  # These deploy on Cohere K8s clusters via the kinfer SDK; bee logs to W&B directly.
  # MLS base FP8 evals — run on every cluster that hosts the model.
  # Both jobs use the same weights_uri and eval suite; hardware/image are patched at runtime.

  # TODO: re-enable once CUDA drivers on the B200 cluster are updated.
  # The cluster's driver version does not support the CUDA toolkit required by
  # the latest vllm-nvidia image, causing the container to fail at startup.
  # trigger-kinfer-base-eval-b200:
  #   # always() forces evaluation when trigger-build-and-push is skipped (run_mode=evals).
  #   # resolve-commit must succeed so we have a valid SHA to check out.
  #   if: always() && needs['resolve-commit'].result == 'success' && needs['generate-run-timestamp'].result == 'success' && (!inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'evals') && (needs['trigger-build-and-push'].result == 'success' || needs['trigger-build-and-push'].result == 'skipped')
  #   needs: [resolve-commit, trigger-build-and-push, generate-run-timestamp]
  #   uses: ./.github/workflows/kinfer-pipeline.yaml
  #   secrets: inherit
  #   with:
  #     git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
  #     models: 'mls-base-fp8-b200'
  #     device: b200
  #     run_timestamp: ${{ needs.generate-run-timestamp.outputs.run_timestamp }}
  #     docker_tag: ${{ inputs.docker_tag || needs.resolve-commit.outputs.commit_sha }}

  trigger-kinfer-base-eval-mi300x:
    # always() forces evaluation when trigger-build-and-push is skipped (run_mode=evals).
    # resolve-commit must succeed so we have a valid SHA to check out.
    if: always() && needs['resolve-commit'].result == 'success' && needs['generate-run-timestamp'].result == 'success' && (!inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'evals') && (needs['trigger-build-and-push'].result == 'success' || needs['trigger-build-and-push'].result == 'skipped')
    needs: [resolve-commit, trigger-build-and-push, generate-run-timestamp]
    uses: ./.github/workflows/kinfer-pipeline.yaml
    secrets: inherit
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      models: 'mls-base-fp8-mi300x'
      device: mi300x
      run_timestamp: ${{ needs.generate-run-timestamp.outputs.run_timestamp }}
      docker_tag: ${{ inputs.docker_tag || needs.resolve-commit.outputs.commit_sha }}

  trigger-kinfer-base-eval-h100-llh:
    # Likelihood-only H100 eval (split from gen/lc/code to avoid OOM).
    if: always() && needs['resolve-commit'].result == 'success' && needs['generate-run-timestamp'].result == 'success' && (!inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'evals') && (needs['trigger-build-and-push'].result == 'success' || needs['trigger-build-and-push'].result == 'skipped')
    needs: [resolve-commit, trigger-build-and-push, generate-run-timestamp]
    uses: ./.github/workflows/kinfer-pipeline.yaml
    secrets: inherit
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      models: 'mls-base-fp8-h100-llh'
      device: h100
      run_timestamp: ${{ needs.generate-run-timestamp.outputs.run_timestamp }}
      docker_tag: ${{ inputs.docker_tag || needs.resolve-commit.outputs.commit_sha }}

  trigger-kinfer-base-eval-h100-gen:
    # Gen + LC + code H100 eval (split from likelihood to avoid OOM).
    if: always() && needs['resolve-commit'].result == 'success' && needs['generate-run-timestamp'].result == 'success' && (!inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'evals') && (needs['trigger-build-and-push'].result == 'success' || needs['trigger-build-and-push'].result == 'skipped')
    needs: [resolve-commit, trigger-build-and-push, generate-run-timestamp]
    uses: ./.github/workflows/kinfer-pipeline.yaml
    secrets: inherit
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      models: 'mls-base-fp8-h100-gen'
      device: h100
      run_timestamp: ${{ needs.generate-run-timestamp.outputs.run_timestamp }}
      docker_tag: ${{ inputs.docker_tag || needs.resolve-commit.outputs.commit_sha }}

  # bench runs

  trigger-dispatch-bench-h100:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'bench' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: none
      benchmarks: perf_1000
      models: 'c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_w4a8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8,c5-8a133t_fp8'
      device: h100
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  trigger-dispatch-bench-gb200:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'bench' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: none
      benchmarks: perf_1000
      models: 'c4-25a218t_fp8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8,c5-8a133t_fp8'
      device: gb200
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  trigger-dispatch-bench-b200:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'bench' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: none
      benchmarks: perf_1000
      models: 'c4-25a218t_fp8,c4-25a218t_int4a16,c4-v2-25a218t_int4a16_gs32_gptq,c4-v2-25a218t_int4a16_gs32_awq_gptq,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8'
      device: b200
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}

  trigger-dispatch-bench-mi300x:
    if: ${{ !inputs.run_mode || inputs.run_mode == 'both' || inputs.run_mode == 'bench' }}
    needs: [resolve-commit, trigger-build-and-push]
    uses: ./.github/workflows/dispatcher.yaml
    with:
      git_ref: ${{ needs.resolve-commit.outputs.commit_sha }}
      result_upload_branch: ${{ inputs.result_upload_branch || 'gh-pages' }}
      features: none
      benchmarks: perf_1000
      models: 'c4-25a218t_fp8,c4-25a218t_fp8_eagle_l5,c5-3a30t_fp8,c5-8a133t_fp8' # AMD + w4a16 is not supported yet
      device: mi300x
      hardware_profiles_override: ''
      model_path: 'gs://cohere-model-efficiency-ci/engines/'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      CO_API_KEY_STAGING: ${{ secrets.CO_API_KEY_STAGING }}
