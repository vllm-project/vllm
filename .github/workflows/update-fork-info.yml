name: Update FORK_INFO.md carried-patches table

# Regenerates the auto-managed "carried patches" section in FORK_INFO.md
# from the current set of open intarweb→upstream PRs. Keeps the doc in
# sync with what :latest actually carries — when a PR merges upstream,
# its row disappears within a cron tick.
#
# Triggers on completion of the sync workflow (so we know intarweb-dev
# was just regenerated) + manual dispatch. Idempotent: only pushes if
# FORK_INFO.md actually changed.
#
# Codified in oss-contributing:ghcr-fork-mirror skill v1.19.0 honest-
# fact #49.

on:
  workflow_run:
    workflows: ["Sync from upstream + auto-regen intarweb-dev"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

env:
  UPSTREAM_OWNER: vllm-project
  UPSTREAM_REPO: vllm
  UPSTREAM_BRANCH: main
  DEPLOY_BRANCH: intarweb-dev

jobs:
  update-fork-info:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout default branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main

      - name: 🔧 Configure git
        run: |
          git config user.email "terafin@users.noreply.github.com"
          git config user.name "intarweb fork-info bot"

      - name: 📋 Discover open intarweb→upstream PRs
        id: prs
        env:
          GH_TOKEN: ${{ secrets.SYNC_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr list \
            --repo "${UPSTREAM_OWNER}/${UPSTREAM_REPO}" \
            --state open \
            --limit 100 \
            --json number,title,headRepositoryOwner \
            --jq '[.[] | select(.headRepositoryOwner.login == "${{ github.repository_owner }}")] | sort_by(.number) | .[] | "\(.number)\t\(.title)"' \
            > /tmp/open-prs.tsv
          echo "Open intarweb PRs:"
          cat /tmp/open-prs.tsv | sed 's/^/  /' || echo "  (none)"

      - name: 📝 Regenerate carried-patches table
        run: |
          set -euo pipefail

          # Build the auto-managed block. Tab-separated input (num\ttitle).
          # Title is wrapped in `_…_` if list is empty so the markdown
          # renders gracefully.
          {
            echo "<!-- intarweb:patches-start  auto-generated by .github/workflows/update-fork-info.yml — do not edit by hand -->"
            echo ""
            if [ -s /tmp/open-prs.tsv ]; then
              echo "| PR | Title |"
              echo "|---|---|"
              while IFS=$'\t' read -r num title; do
                [ -z "$num" ] && continue
                # Escape any pipe in the title to keep table cells valid
                safe_title="${title//|/\\|}"
                echo "| [#${num}](https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/pull/${num}) | ${safe_title} |"
              done < /tmp/open-prs.tsv
            else
              echo "_No open intarweb→upstream PRs — \`${DEPLOY_BRANCH}\` matches \`upstream/${UPSTREAM_BRANCH}\` exactly._"
            fi
            echo ""
            echo "<!-- intarweb:patches-end -->"
          } > /tmp/patches-block.md

          # Replace markers in-place if present, else append a new section
          if [ ! -f FORK_INFO.md ]; then
            cat > FORK_INFO.md << 'HEADER'
          # Fork tracking — intarweb/${UPSTREAM_REPO}

          (Auto-generated section below tracks what `${DEPLOY_BRANCH}` currently
          carries vs `upstream/${UPSTREAM_BRANCH}`. Everything outside the
          markers is hand-maintained.)

          ## Local patches we carry on `${DEPLOY_BRANCH}` (vs `upstream/${UPSTREAM_BRANCH}`)

          HEADER
            cat /tmp/patches-block.md >> FORK_INFO.md
          elif grep -q 'intarweb:patches-start' FORK_INFO.md; then
            awk -v block="/tmp/patches-block.md" '
              /<!-- intarweb:patches-start/ {
                while ((getline line < block) > 0) print line
                close(block)
                in_block = 1
                next
              }
              /<!-- intarweb:patches-end -->/ {
                in_block = 0
                next
              }
              !in_block { print }
            ' FORK_INFO.md > /tmp/fork-info-new.md
            mv /tmp/fork-info-new.md FORK_INFO.md
          else
            # No markers yet — append a new auto-managed section at the end
            {
              echo ""
              echo "## Carried patches (auto-managed)"
              echo ""
              cat /tmp/patches-block.md
            } >> FORK_INFO.md
          fi

      - name: 💾 Commit + push if changed
        run: |
          set -euo pipefail
          git add FORK_INFO.md
          # Stage first — git diff --quiet on an untracked file returns 0 ("no
          # tracked changes") and would silently skip a brand-new FORK_INFO.md.
          # --cached catches both cases.
          if git diff --cached --quiet -- FORK_INFO.md; then
            echo "✓ FORK_INFO.md unchanged — skipping push"
            exit 0
          fi
          git commit -m "docs(fork-info): auto-update carried-patches table"
          git push origin HEAD:refs/heads/main
          echo "✓ pushed updated FORK_INFO.md"
