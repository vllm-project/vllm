name: Build Flash Attn ROCm Wheels

# This workflow builds flash_attn wheels with the Triton backend for ROCm.
#
# IMPORTANT: Architecture Independence
# ------------------------------------
# When FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE is set, the flash_attn package
# uses the Triton backend instead of the Composable Kernel (CK) backend.
# This means:
#   1. No native HIP/C++ code is compiled into the wheel (SKIP_CK_BUILD=TRUE)
#   2. The Triton kernels are compiled JIT (just-in-time) at runtime
#   3. The resulting wheel is architecture-agnostic
#
# The PyTorch index is only used during build because setup.py imports torch
# to detect IS_HIP_EXTENSION. The actual GPU target (gfx1150, gfx1151, etc.)
# is determined at runtime when Triton compiles the attention kernels.
#
# This means users can install this wheel and use it on any gfx11 target
# that Triton supports, regardless of which PyTorch index was used during build.

on:
  workflow_dispatch:
    inputs:
      pytorch_index:
        description: 'PyTorch index URL (only needed for build-time torch import)'
        default: 'https://rocm.nightlies.amd.com/v2-staging/gfx1151'
        required: false
      flash_attn_repo:
        description: 'Flash Attention repository URL'
        default: 'https://github.com/ROCm/flash-attention'
        required: false
      flash_attn_ref:
        description: 'Flash Attention git ref (branch/tag/commit)'
        default: 'main'
        required: false
      local_version:
        description: 'Local version suffix for wheel (e.g., rocm.triton.gfx11)'
        default: 'rocm.triton.gfx11'
        required: false

env:
  PYTORCH_INDEX_URL: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/v2-staging/gfx1151' }}
  FLASH_ATTN_REPO: ${{ github.event.inputs.flash_attn_repo || 'https://github.com/ROCm/flash-attention' }}
  FLASH_ATTN_REF: ${{ github.event.inputs.flash_attn_ref || 'main' }}
  # Enable Triton backend - this skips CK compilation and makes the wheel arch-agnostic
  FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
  # Custom version suffix to indicate this is a ROCm Triton build
  FLASH_ATTN_LOCAL_VERSION: ${{ github.event.inputs.local_version || 'rocm.triton.gfx11' }}

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone flash-attention repository
        run: |
          git clone --depth 1 --branch ${{ env.FLASH_ATTN_REF }} ${{ env.FLASH_ATTN_REPO }} flash-attention
          cd flash-attention
          echo "Flash Attention commit: $(git rev-parse HEAD)"
          echo "Flash Attention ref: ${{ env.FLASH_ATTN_REF }}"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-flash-attn-${{ runner.os }}-py312
          restore-keys: |
            pip-flash-attn-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools ninja packaging psutil

      - name: Install PyTorch from ROCm nightly
        run: |
          # Install PyTorch with ROCm support (needed for setup.py to detect HIP)
          pip install torch --index-url ${{ env.PYTORCH_INDEX_URL }}
          
          # Show what's installed
          pip list | grep -i -E "torch" || true
          python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'HIP: {torch.version.hip}')"

      - name: Install flash_attn dependencies
        run: |
          pip install einops

      - name: Build wheel
        env:
          FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
          FLASH_ATTN_LOCAL_VERSION: ${{ env.FLASH_ATTN_LOCAL_VERSION }}
        working-directory: flash-attention
        run: |
          echo "=== Environment ==="
          echo "FLASH_ATTENTION_TRITON_AMD_ENABLE=$FLASH_ATTENTION_TRITON_AMD_ENABLE"
          echo "FLASH_ATTN_LOCAL_VERSION=$FLASH_ATTN_LOCAL_VERSION"
          echo ""
          echo "=== Building wheel ==="
          python setup.py bdist_wheel --dist-dir=dist
          ls -la dist/

      - name: Rename wheel for manylinux compliance
        working-directory: flash-attention
        run: |
          cd dist
          for wheel in *.whl; do
            if [[ "$wheel" == *"linux"* ]]; then
              new_name="${wheel/linux/manylinux_2_31}"
              mv "$wheel" "$new_name"
              echo "Renamed $wheel to $new_name"
            fi
          done
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: flash-attn-rocm-wheel
          path: flash-attention/dist/*.whl
          retention-days: 90

  publish-to-gh-pages:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-existing
        continue-on-error: true

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: flash-attn-rocm-wheel
          path: new-wheels/

      - name: Prepare gh-pages content
        run: |
          # Create wheels directory structure
          mkdir -p gh-pages/wheels
          
          # Copy existing wheels if gh-pages branch exists
          if [ -d "gh-pages-existing/wheels" ]; then
            cp -r gh-pages-existing/wheels/* gh-pages/wheels/ 2>/dev/null || true
          fi
          
          # Copy new wheels
          cp new-wheels/*.whl gh-pages/wheels/
          
          # List all wheels
          echo "=== All wheels ==="
          ls -la gh-pages/wheels/

      - name: Regenerate complete index
        run: |
          pip install packaging
          
          cat > /tmp/generate_index.py << 'PYEOF'
          import os
          import sys
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote
          
          INDEX_HTML_TEMPLATE = """<!DOCTYPE html>
          <html>
            <head>
              <meta name="pypi:repository-version" content="1.0">
              <title>ROCm Wheels</title>
              <style>
                body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
                       max-width: 800px; margin: 40px auto; padding: 0 20px; }}
                code {{ background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }}
                pre {{ background: #f4f4f4; padding: 12px; border-radius: 6px; overflow-x: auto; }}
                a {{ color: #0366d6; }}
              </style>
            </head>
            <body>
              <h1>ROCm Wheels</h1>
              <p>Pre-built wheels for AMD ROCm (gfx11 / Strix Halo / RDNA3+)</p>
              <p><em>Generated: {timestamp}</em></p>
              
              <h2>Installation</h2>
              <p><strong>Step 1:</strong> Install ROCm PyTorch first:</p>
              <pre>pip install torch --index-url https://rocm.nightlies.amd.com/v2-staging/gfx1151</pre>
              
              <p><strong>Step 2:</strong> Install packages:</p>
              <pre>pip install vllm flash-attn --extra-index-url {base_url}</pre>
              
              <h2>Available Packages</h2>
          {items}
            </body>
          </html>
          """
          
          PACKAGE_INDEX_TEMPLATE = """<!DOCTYPE html>
          <html>
            <head>
              <meta name="pypi:repository-version" content="1.0">
              <title>{package_name}</title>
            </head>
            <body>
          {items}
            </body>
          </html>
          """
          
          def parse_wheel_name(filename):
              """Extract package name from wheel filename."""
              # Format: {package}-{version}-{python}-{abi}-{platform}.whl
              base = filename.removesuffix(".whl")
              parts = base.split("-")
              # Package name is everything before the version
              # Handle packages with dashes by finding where version starts
              for i, part in enumerate(parts):
                  if part[0].isdigit():
                      return "-".join(parts[:i]).replace("_", "-")
              return parts[0].replace("_", "-")
          
          wheels_dir = Path("gh-pages/wheels")
          wheels_dir.mkdir(parents=True, exist_ok=True)
          
          # Find all wheel files
          wheel_files = list(wheels_dir.glob("*.whl"))
          
          # Group wheels by package name
          packages = {}
          for whl in wheel_files:
              pkg_name = parse_wheel_name(whl.name)
              if pkg_name not in packages:
                  packages[pkg_name] = []
              packages[pkg_name].append(whl.name)
          
          print(f"Found {len(wheel_files)} wheels in {len(packages)} packages")
          for pkg, wheels in packages.items():
              print(f"  {pkg}: {len(wheels)} wheels")
          
          # Generate package directories and indices
          for pkg_name, wheel_names in packages.items():
              pkg_dir = wheels_dir / pkg_name
              pkg_dir.mkdir(exist_ok=True)
              
              # Generate wheel links
              wheel_links = []
              for whl_name in sorted(wheel_names, reverse=True):
                  encoded = quote(whl_name, safe="")
                  wheel_links.append(f'    <a href="../{encoded}">{whl_name}</a><br/>')
              
              package_index = PACKAGE_INDEX_TEMPLATE.format(
                  package_name=pkg_name,
                  items="\n".join(wheel_links)
              )
              (pkg_dir / "index.html").write_text(package_index)
          
          # Generate top-level index
          base_url = os.environ.get("BASE_URL", "https://example.github.io/vllm/wheels")
          package_links = "\n".join(
              f'    <a href="{pkg}/">{pkg}</a><br/>' 
              for pkg in sorted(packages.keys())
          )
          
          top_index = INDEX_HTML_TEMPLATE.format(
              timestamp=datetime.now().isoformat(),
              base_url=base_url,
              items=package_links
          )
          (wheels_dir / "index.html").write_text(top_index)
          
          print(f"Generated index with {len(packages)} packages")
          PYEOF
          
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels" \
            python /tmp/generate_index.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: true
