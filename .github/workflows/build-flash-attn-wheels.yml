name: Build Flash Attn ROCm Wheels

# This workflow builds flash_attn wheels with the Triton backend for ROCm.
#
# IMPORTANT: Architecture Independence
# ------------------------------------
# When FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE is set, the flash_attn package
# uses the Triton backend instead of the Composable Kernel (CK) backend.
# This means:
#   1. No native HIP/C++ code is compiled into the wheel (SKIP_CK_BUILD=TRUE)
#   2. The Triton kernels are compiled JIT (just-in-time) at runtime
#   3. The resulting wheel is architecture-agnostic
#
# The PyTorch index is only used during build because setup.py imports torch
# to detect IS_HIP_EXTENSION. The actual GPU target (gfx1150, gfx1151, etc.)
# is determined at runtime when Triton compiles the attention kernels.
#
# This means users can install this wheel and use it on any gfx11 target
# that Triton supports, regardless of which PyTorch index was used during build.

on:
  workflow_dispatch:
    inputs:
      pytorch_index:
        description: 'PyTorch index URL (only needed for build-time torch import)'
        default: 'https://rocm.nightlies.amd.com/whl-multi-arch'
        required: false
      flash_attn_repo:
        description: 'Flash Attention repository URL'
        default: 'https://github.com/ROCm/flash-attention'
        required: false
      flash_attn_ref:
        description: 'Flash Attention git ref (branch/tag/commit)'
        default: 'main'
        required: false
      local_version:
        description: 'Local version suffix for wheel (e.g., rocm.triton.gfx11)'
        default: 'rocm.triton.gfx11'
        required: false

env:
  PYTORCH_INDEX_URL: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/whl-multi-arch' }}
  FLASH_ATTN_REPO: ${{ github.event.inputs.flash_attn_repo || 'https://github.com/ROCm/flash-attention' }}
  FLASH_ATTN_REF: ${{ github.event.inputs.flash_attn_ref || 'main' }}
  # Enable Triton backend - this skips CK compilation and makes the wheel arch-agnostic
  FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
  # Custom version suffix to indicate this is a ROCm Triton build
  FLASH_ATTN_LOCAL_VERSION: ${{ github.event.inputs.local_version || 'rocm.triton.gfx11' }}

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone flash-attention repository
        run: |
          git clone --depth 1 --branch ${{ env.FLASH_ATTN_REF }} ${{ env.FLASH_ATTN_REPO }} flash-attention
          cd flash-attention
          echo "Flash Attention commit: $(git rev-parse HEAD)"
          echo "Flash Attention ref: ${{ env.FLASH_ATTN_REF }}"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-flash-attn-${{ runner.os }}-py312
          restore-keys: |
            pip-flash-attn-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools ninja packaging psutil

      - name: Install PyTorch from ROCm nightly
        run: |
          # Install PyTorch with ROCm support (needed for setup.py to detect HIP)
          pip install torch --index-url ${{ env.PYTORCH_INDEX_URL }}
          
          # Show what's installed
          pip list | grep -i -E "torch" || true
          python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'HIP: {torch.version.hip}')"

      - name: Install flash_attn dependencies
        run: |
          pip install einops

      - name: Build wheel
        env:
          FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
          FLASH_ATTN_LOCAL_VERSION: ${{ env.FLASH_ATTN_LOCAL_VERSION }}
        working-directory: flash-attention
        run: |
          echo "=== Environment ==="
          echo "FLASH_ATTENTION_TRITON_AMD_ENABLE=$FLASH_ATTENTION_TRITON_AMD_ENABLE"
          echo "FLASH_ATTN_LOCAL_VERSION=$FLASH_ATTN_LOCAL_VERSION"
          echo ""
          echo "=== Building wheel ==="
          python setup.py bdist_wheel --dist-dir=dist
          ls -la dist/

      - name: Rename wheel for manylinux compliance
        working-directory: flash-attention
        run: |
          cd dist
          for wheel in *.whl; do
            if [[ "$wheel" == *"linux"* ]]; then
              new_name="${wheel/linux/manylinux_2_31}"
              mv "$wheel" "$new_name"
              echo "Renamed $wheel to $new_name"
            fi
          done
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: flash-attn-rocm-wheel
          path: flash-attention/dist/*.whl
          retention-days: 90

  create-release:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.create-tag.outputs.tag }}

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: flash-attn-rocm-wheel
          path: dist/

      - name: Determine release tag
        id: create-tag
        run: |
          WHEEL=$(find dist -name '*.whl' -print -quit)
          BASENAME=$(basename "$WHEEL" .whl)
          VERSION=$(echo "$BASENAME" | sed 's/^flash_attn-//; s/-cp[0-9].*//')
          TAG="wheels/flash-attn-${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/*.whl
          prerelease: true
          body: |
            ## Flash Attention ROCm Wheel (Triton backend)

            Built with `FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE` (architecture-agnostic).

            ### Installation
            ```bash
            pip install torch --extra-index-url https://rocm.nightlies.amd.com/whl-multi-arch
            pip install flash-attn --extra-index-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels
            ```

  publish-to-gh-pages:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: flash-attn-rocm-wheel
          path: new-wheels/

      - name: Generate index pointing to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels"
          RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
        run: |
          pip install packaging

          cat > /tmp/generate_index.py << 'PYEOF'
          import os, json, subprocess
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote

          REPO = os.environ["REPO"]
          BASE_URL = os.environ["BASE_URL"]
          RELEASE_TAG = os.environ.get("RELEASE_TAG", "latest")

          PACKAGE_INDEX_TEMPLATE = """<!DOCTYPE html>
          <html>
            <head><meta name="pypi:repository-version" content="1.0"><title>{package_name}</title></head>
            <body>
          {items}
            </body>
          </html>
          """

          def parse_wheel_name(filename):
              base = filename.removesuffix(".whl")
              parts = base.split("-")
              for i, part in enumerate(parts):
                  if part[0].isdigit():
                      return "-".join(parts[:i]).replace("_", "-")
              return parts[0].replace("_", "-")

          result = subprocess.run(
              ["gh", "release", "list", "--repo", REPO, "--limit", "100", "--json", "tagName"],
              capture_output=True, text=True
          )
          releases = json.loads(result.stdout) if result.returncode == 0 else []
          print(f"Found {len(releases)} releases")

          wheels = {}
          for rel in releases:
              tag = rel["tagName"]
              result = subprocess.run(
                  ["gh", "release", "view", tag, "--repo", REPO, "--json", "assets"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  continue
              assets = json.loads(result.stdout).get("assets", [])
              for asset in assets:
                  name = asset["name"]
                  url = asset["url"]
                  if name.endswith(".whl"):
                      pkg = parse_wheel_name(name)
                      wheels.setdefault(pkg, []).append((name, url))

          new_dir = Path("new-wheels")
          if new_dir.exists():
              for whl in new_dir.glob("*.whl"):
                  pkg = parse_wheel_name(whl.name)
                  release_names = {w[0] for w in wheels.get(pkg, [])}
                  if whl.name not in release_names:
                      url = f"https://github.com/{REPO}/releases/download/{quote(RELEASE_TAG, safe='')}/{quote(whl.name, safe='')}"
                      wheels.setdefault(pkg, []).append((whl.name, url))

          print(f"Total: {sum(len(v) for v in wheels.values())} wheels in {len(wheels)} packages")

          out = Path("gh-pages/wheels")
          out.mkdir(parents=True, exist_ok=True)

          for pkg_name, whl_list in wheels.items():
              pkg_dir = out / pkg_name
              pkg_dir.mkdir(exist_ok=True)
              links = []
              for whl_name, url in sorted(whl_list, key=lambda x: x[0], reverse=True):
                  links.append(f'    <a href="{url}">{whl_name}</a><br/>')
              (pkg_dir / "index.html").write_text(
                  PACKAGE_INDEX_TEMPLATE.format(package_name=pkg_name, items="\n".join(links))
              )

          top_index = f"""<!DOCTYPE html>
          <html>
            <head><meta name="pypi:repository-version" content="1.0"><title>ROCm Wheels</title></head>
            <body>
              <h1>ROCm Wheels</h1>
              <p>Pre-built wheels for AMD ROCm (gfx11 / Strix Halo / RDNA3+)</p>
              <p><em>Generated: {datetime.now().isoformat()}</em></p>
              <h2>Installation</h2>
              <pre>pip install torch --extra-index-url https://rocm.nightlies.amd.com/whl-multi-arch
          pip install vllm --extra-index-url {BASE_URL}</pre>
              <h2>Available Packages</h2>
          """
          for p in sorted(wheels):
              top_index += f'    <a href="{p}/">{p}</a><br/>\n'
          top_index += "  </body>\n</html>"
          (out / "index.html").write_text(top_index)
          print("Index generated successfully")
          PYEOF

          python /tmp/generate_index.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages/wheels
          destination_dir: wheels
          keep_files: false
