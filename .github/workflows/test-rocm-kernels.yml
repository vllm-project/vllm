name: Test ROCm kernels

on:
  workflow_call:
    inputs:
      test_name:
        description: 'Name of the kernel test group'
        required: true
        type: string
      runs_on:
        description: 'Runner label for this kernel test group'
        required: true
        type: string
      ci_image:
        description: 'Container image used for ROCm CI'
        required: true
        type: string
      pytorch_index:
        description: 'PyTorch index URL for ROCm nightly wheels'
        required: true
        type: string
      timeout:
        description: 'pytest-timeout timeout in seconds'
        required: true
        type: number
      pytest_args:
        description: 'Arguments passed to pytest'
        required: true
        type: string

jobs:
  test-kernels:
    name: test-kernels (${{ inputs.test_name }})
    runs-on: ${{ inputs.runs_on }}
    container:
      image: ${{ inputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --device /dev/kfd
        --device /dev/dri
        --group-add video
        --group-add render
        --security-opt seccomp=unconfined
    permissions:
      contents: read
      packages: read

    env:
      PYTORCH_INDEX_URL: ${{ inputs.pytorch_index }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: dist/

      - name: GPU sanity check
        run: |
          echo "=== uname -a ==="
          uname -a
          echo ""
          echo "=== /dev/kfd and /dev/dri ==="
          ls -la /dev/kfd /dev/dri || true
          echo ""
          echo "=== id ==="
          id
          echo ""
          echo "=== rocm-smi (product + VRAM/GTT) ==="
          if command -v rocm-smi >/dev/null 2>&1; then
            rocm-smi --showproductname --showid
            rocm-smi --showmeminfo vram gtt
          else
            echo "rocm-smi not found"
          fi
          echo ""
          echo "=== rocminfo (agents) ==="
          if command -v rocminfo >/dev/null 2>&1; then
            rocminfo | grep -E "Name:|Marketing Name:|Device Type:" | head -40
          else
            echo "rocminfo not found"
          fi
          echo ""
          echo "=== amd-smi (product + memory) ==="
          if command -v amd-smi >/dev/null 2>&1; then
            amd-smi list || true
            amd-smi static --asic --vram || true
          else
            echo "amd-smi not found"
          fi
          echo "=== GPU clocks, power profile, and temperature ==="
          for card in /sys/class/drm/card[0-9]/device /sys/class/drm/card[0-9][0-9]/device; do
            [ -d "$card" ] || continue
            echo "--- ${card} ---"
            for f in "$card"/hwmon/hwmon*/temp*_input; do
              [ -f "$f" ] || continue
              echo "${f#"$card"/}: $(( $(cat "$f") / 1000 )) °C"
            done
            f=power_dpm_force_performance_level
            [ -f "$card/$f" ] && echo "$f: $(cat "$card/$f")"
            for f in pp_dpm_mclk pp_dpm_sclk pp_power_profile_mode; do
              [ -f "$card/$f" ] || continue
              echo "$f:"
              head -20 "$card/$f" | sed 's/^/  /'
            done
          done

      - name: Install wheel and test dependencies
        run: |
          # Resolve torch on the ROCm nightly index, then derive matching
          # torchvision/torchaudio pins sharing the same +rocm build-date
          # suffix. Without this, the vllm wheel's `torch==2.11.0` dep is
          # satisfied by the vanilla PyPI wheel (PyTorch 2.11.0+cu130,
          # HIP: None), and tests fail to find any GPU. See the build
          # workflow for the same trick.
          echo 'torch==2.11.*' > constraints.in
          uv pip compile constraints.in \
            --index-url ${{ env.PYTORCH_INDEX_URL }} \
            --prerelease allow \
            --no-header --no-annotate --no-deps \
            -o constraints.txt
          TORCH_LOCAL=$(grep '^torch==' constraints.txt | sed 's/.*+//')
          TORCH_PATCH_SUFFIX=$(grep '^torch==' constraints.txt | sed 's/^torch==[0-9]\+\.[0-9]\+\.\([0-9]\+[^+]*\)+.*/\1/')
          echo "torchvision==0.26.${TORCH_PATCH_SUFFIX}+${TORCH_LOCAL}" >> constraints.txt
          echo "torchaudio==2.11.${TORCH_PATCH_SUFFIX}+${TORCH_LOCAL}" >> constraints.txt
          cat constraints.txt
          uv pip install --system \
            -c constraints.txt \
            dist/*.whl \
            pytest pytest-timeout numpy \
            tblib transformers huggingface_hub sentencepiece pillow \
            --index-url ${{ env.PYTORCH_INDEX_URL }} \
            --extra-index-url https://pypi.org/simple/ \
            --index-strategy unsafe-best-match \
            --prerelease allow
          # Kernel tests don't need torchvision; remove to keep the env
          # minimal and avoid any future ABI surprises.
          uv pip uninstall --system torchvision 2>/dev/null || true

      - name: Prepare test environment
        run: |
          # Remove the source vllm/ directory so Python imports from the
          # installed wheel (which has compiled C extensions) instead of
          # the checkout source tree (which has no .so files).
          mv vllm vllm_src

          # Verify torch, vllm._C, and ROCm platform detection work.
          python -c "
          import torch
          print(f'PyTorch {torch.__version__}, HIP: {torch.version.hip}')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          import vllm._C
          print('vllm._C loaded successfully')
          from vllm.platforms import current_platform
          print(f'Platform: {type(current_platform).__name__}')
          "

      - name: Test kernel ${{ inputs.test_name }}
        run: |
          python -m pytest -v --timeout=${{ inputs.timeout }} ${{ inputs.pytest_args }}
