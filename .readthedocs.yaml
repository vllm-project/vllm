# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_checkout:
      # Skip PR builds unless the PR has the "documentation" or "ready" label
      - |
        if [ "$READTHEDOCS_VERSION_TYPE" = "external" ]; then
          PR_NUMBER="$READTHEDOCS_VERSION"
          PR_URL="https://api.github.com/repos/vllm-project/vllm/pulls/${PR_NUMBER}"
          RESPONSE=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$PR_URL")
          LABELS=$(echo "$RESPONSE" | jq -r '.labels[].name' 2>/dev/null) || true
          if [ -z "$LABELS" ]; then
            echo "Could not fetch PR labels, proceeding with build."
          elif echo "$LABELS" | grep -qwE "documentation|ready"; then
            echo "Found required label, proceeding with build."
          else
            echo "PR #${PR_NUMBER} lacks 'documentation' or 'ready' label, skipping build."
            exit 183
          fi
        fi
      - git fetch origin main --unshallow --no-tags --filter=blob:none || true
    pre_create_environment:
      - pip install uv
    create_environment:
      - uv venv $READTHEDOCS_VIRTUALENV_PATH
    install:
      - uv pip install --python $READTHEDOCS_VIRTUALENV_PATH/bin/python --no-cache-dir -r requirements/docs.txt 

mkdocs:
  configuration: mkdocs.yaml
  fail_on_warning: true
