# kinfer deploy spec for the MLS base FP8 model on B200 (gke-us-central1-prod).
#
# ci.* fields are read by run_kinfer_eval.py and are not part of the kinfer VLLMSpec:
#   cluster_context — kubectl context to switch to before deploying
#   queue           — kinfer job queue (passed as --queue CLI arg)
#   priority        — kinfer job priority (passed as --priority CLI arg)
#
# cluster.image is the only field overridden at runtime (injected nightly build SHA).
ci:
  cluster_context: gke-us-central1-prod
  queue: pre-training-queue
  priority: dev-medium-eval-priority

version: 1

cluster:
  image: us-central1-docker.pkg.dev/cohere-artifacts/cohere/vllm-nvidia:placeholder
  weights_uri: 's3://us-east-01a/foundations-big-runs/sylvie_cohere_ai/medium_lightspeed/8A133T_4e-4_with_lblfix_t8_800B_decay_v4.2_hammer_cooldown_at_20T_t1/ckpt-346499/hf_export/fp8'
  total_gpus: 8
  hardware: B200

mode: standard

model:
  served_name: mls-base-fp8
  vllm_args:
    tensor-parallel-size: 2
    max-model-len: 500000
    enable-chunked-prefill: true
    max-num-batched-tokens: 65536
    max-num-seqs: 32
    override-generation-config: '{"eos_token_id": 3}'

routing:
  load_balancing_scorers:
    default:
      scorers:
        - type: round_robin

standard:
  replicas: 4
  gpu_memory_utilization: 0.90
  placement: PACK
