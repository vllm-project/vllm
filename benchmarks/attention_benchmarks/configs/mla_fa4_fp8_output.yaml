# MLA prefill FA4 fused-FP8 output microbenchmark (PR #43050).
# Compares FA4 writing e4m3 directly vs a standalone post-quant kernel, on the
# same fa4 prefill path -- the delta is the post-quant kernel the fused write
# removes. Dims are DeepSeek-Coder-V2-Lite; needs FA4 on SM100/110 (B200).
#
# Usage:
#   python benchmark.py --config configs/mla_fa4_fp8_output.yaml

description: "MLA prefill FA4 fused-FP8 output vs post-quant (PR #43050)"

model:
  name: "deepseek-v2-lite"
  num_layers: 27
  num_q_heads: 16
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

# Pure prefill (q_len == kv_len) so every token goes through forward_mha.
batch_specs:
  - "q512"
  - "q1k"
  - "q2k"
  - "q4k"
  - "q8k"
  - "2q4k"
  - "4q4k"
  - "8q4k"

# Only used to construct the MLA impl; the pure-prefill specs skip decode.
decode_backends:
  - CUTLASS_MLA

# Static per-tensor scale; enables the FP8-output comparison.
fp8_output_scale: 0.1
# Write paths to compare: false = standalone post-quant, true = FA4 fused.
fuse_quant_op: [false, true]

device: "cuda:0"
repeats: 50
warmup_iters: 10
