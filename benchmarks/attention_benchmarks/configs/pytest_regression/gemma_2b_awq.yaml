# config for google/gemma-2b-AWQ
model:
  num_layers: 18
  num_q_heads: 8
  num_kv_heads: 1 # MQA
  head_dim: 256
  block_size: 16

batch_specs:
  # Chunked-prefill chunks for input-len 8000, max-num-batched-tokens 2048
  - "q2k"
  - "q2ks4k"
  - "q2ks6k"
  - "q1856s8000"
  # Decode at 8K
  - "q1s8k"

backends:
  - TRITON_ATTN
  - ROCM_AITER_UNIFIED_ATTN

device: "cuda:0"
repeats: 20
warmup_iters: 10
profile_memory: false
