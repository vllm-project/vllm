# Config for TheBloke/Llama-2-7B-AWQ
model:
  num_layers: 32
  num_q_heads: 32
  num_kv_heads: 32
  head_dim: 128
  block_size: 16

batch_specs:
  - "q1920s2k"
  - "q8k"
  - "q1s8k"

backends:
  - TRITON_ATTN
  - ROCM_AITER_UNIFIED_ATTN

device: "cuda:0"
repeats: 20
warmup_iters: 10
profile_memory: false
