  - "8q512s8k"
  - "8q1ks8k"
  - "8q1ks16k"
  - "8q2ks8k"
  - "8q2ks16k"

  # =============================================
  # Extend - medium batches
  # =============================================
  - "16q256s4k"
  - "16q512s4k"
  - "16q512s8k"
  - "16q1ks4k"
  - "16q1ks8k"
