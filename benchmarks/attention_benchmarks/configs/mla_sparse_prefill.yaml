# MLA prefill-only benchmark configuration for sparse backends

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 128
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

# Model parameter sweep: simulate tensor parallelism by varying num_q_heads
# TP=1: 128 heads, TP=2: 64 heads, TP=4: 32 heads, TP=8: 16 heads
model_parameter_sweep:
  param_name: "num_q_heads"
  values: [128, 64, 32, 16]
  label_format: "{backend}_{value}h"

batch_specs:
  # =============================================
  # Pure prefill - single request
  # =============================================
  - "1q256"
  - "1q512"
  - "1q1k"
  - "1q2k"
  - "1q4k"
  - "1q8k"
  - "1q16k"
  - "1q32k"
  - "1q64k"
  - "1q128k"

  # =============================================
  # Pure prefill - small batches
  # =============================================
  - "2q256"
  - "2q512"
  - "2q1k"
  - "2q2k"
  - "2q4k"
  - "2q8k"
  - "2q16k"

  - "4q256"
  - "4q512"
  - "4q1k"
  - "4q2k"
  - "4q4k"
  - "4q8k"
  - "4q16k"

  - "8q256"
  - "8q512"
  - "8q1k"
  - "8q2k"
  - "8q4k"
  - "8q8k"
  - "8q16k"

  # =============================================
  # Pure prefill - medium batches
  # =============================================
  - "16q256"
  - "16q512"
  - "16q1k"
  - "16q2k"
  - "16q4k"
  - "16q8k"

  - "32q256"
  - "32q512"
  - "32q1k"
  - "32q2k"
  - "32q4k"

  # =============================================
  # Extend - single request
  # =============================================
  # Short prefill, varying KV cache
  - "1q256s1k"
  - "1q256s4k"
  - "1q256s8k"
  - "1q256s16k"
  - "1q256s64k"

  - "1q512s1k"
  - "1q512s4k"
  - "1q512s8k"
  - "1q512s16k"
  - "1q512s64k"

  # Medium prefill, varying KV cache
  - "1q1ks4k"
  - "1q1ks8k"
  - "1q1ks16k"
  - "1q1ks64k"

  - "1q2ks4k"
  - "1q2ks8k"
  - "1q2ks16k"
  - "1q2ks64k"

  # Long prefill, long KV cache
  - "1q4ks8k"
  - "1q4ks16k"
  - "1q4ks32k"

  - "1q8ks16k"
  - "1q8ks32k"
  - "1q8ks64k"

  - "1q16ks32k"
  - "1q16ks64k"

  # =============================================
  # Extend - small batches
  # =============================================
  - "2q256s4k"
  - "2q256s16k"
  - "2q512s4k"
  - "2q512s8k"
  - "2q512s16k"
  - "2q1ks8k"
  - "2q1ks16k"
  - "2q2ks8k"
  - "2q2ks16k"
  - "2q4ks16k"

  - "4q256s4k"
  - "4q256s16k"
  - "4q512s4k"
  - "4q512s8k"
  - "4q512s16k"
  - "4q1ks8k"
