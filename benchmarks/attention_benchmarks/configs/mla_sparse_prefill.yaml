  - "32q256s4k"
  - "32q512s4k"
  - "32q512s8k"
  - "32q1ks4k"
  - "32q1ks8k"

backends:
  - FLASHMLA_SPARSE
  - FLASHINFER_MLA_SPARSE
  - FLASH_ATTN_MLA_SPARSE

device: "cuda:0"
repeats: 10
warmup_iters: 3
profile_memory: true
