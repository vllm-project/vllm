# MLA prefill FP8-output microbenchmark, axis = prefill backend.
# Fixes the FP8 write path and compares prefill backends. Fused FP8 output is
# FA4-only today, so post-quant (fuse_quant_op: false) gives a runnable
# cross-backend comparison; flip to true to see which backends can write FP8
# directly (non-supporting ones show as errors in the table).
# DeepSeek-Coder-V2-Lite dims; SM100/110 (B200).
#
# Usage:
#   python benchmark.py --config configs/mla_fp8_output_backends.yaml

description: "MLA prefill FP8 output: prefill backend comparison"

model:
  name: "deepseek-v2-lite"
  num_layers: 27
  num_q_heads: 16
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

# Pure prefill (q_len == kv_len) so every token goes through forward_mha.
batch_specs:
  - "q512"
  - "q1k"
  - "q2k"
  - "q4k"
  - "q8k"
  - "2q4k"
  - "4q4k"
  - "8q4k"

# Only used to construct the MLA impl; the pure-prefill specs skip decode.
decode_backends:
  - CUTLASS_MLA

# Sweep prefill backends at a fixed write path.
prefill_backends: [fa4, flashinfer, trtllm]
fp8_output_scale: 0.1
fuse_quant_op: false

device: "cuda:0"
repeats: 50
warmup_iters: 10
