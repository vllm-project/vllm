# Sparse MLA benchmark: forward_mha vs forward_mqa comparison
#
# Usage:
#   python benchmark.py --config configs/mla_sparse_mha_vs_mqa.yaml

mode: mha_vs_mqa

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 128
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

