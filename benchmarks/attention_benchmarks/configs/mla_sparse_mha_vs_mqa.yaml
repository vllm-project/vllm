# Sparse MLA benchmark: forward_mha vs forward_mqa comparison
#
# Tests three regimes:
#   1. Pure prefill (no context): MHA does causal FA4 at 192d vs MQA at 576d
#   2. Short-context extends (seq_len <= topk=2048): MHA does causal FA4, no mask
#   3. Long-context extends (seq_len > topk): MHA uses masked FA4
#
# Usage:
#   python benchmark.py --config configs/mla_sparse_mha_vs_mqa.yaml

mode: mha_vs_mqa

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 128
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

batch_specs:
  # === Pure prefill: find crossover point ===
  # MHA loses at q128, wins at q256. Zoom in.
  - "q128"
  - "q160"
  - "q192"
  - "q224"
  - "q256"

  # === Pure prefill: characterize peak and convergence ===
  # MHA peaks ~2x at q512-q1k, converges at q8k. Where does it cross back?
  - "q512"
  - "q1k"
  - "q2k"
  - "q4k"
  - "q6k"
  - "q8k"
  - "q12k"
  - "q16k"

  # Batched pure prefill (confirms ~2x holds with batching)
  - "4q256"
  - "4q512"
  - "4q1k"
  - "4q2k"
  - "16q256"
  - "16q512"

  # === Extends: find context length where MHA becomes slower ===
  # q512 pure prefill: MHA 2x win. q512s1k: MHA 2x loss.
  # Zoom into the crossover by adding small amounts of context.
  - "q512s513"
  - "q512s528"
  - "q512s544"
  - "q512s576"
  - "q512s640"
  - "q512s768"
  - "q512s1k"

  # Same investigation for q1k
  - "q1ks1025"
  - "q1ks1056"
  - "q1ks1088"
  - "q1ks1152"
  - "q1ks1280"
  - "q1ks1536"
  - "q1ks2k"

  # === Extends: context scaling (confirms linear growth) ===
  - "q256s512"
  - "q256s1k"
  - "q256s2k"
  - "q256s4k"

backends:
  - FLASHMLA_SPARSE

device: "cuda:0"
repeats: 10
warmup_iters: 3
profile_memory: true
