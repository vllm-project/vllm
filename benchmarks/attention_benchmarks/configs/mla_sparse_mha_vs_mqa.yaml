# Sparse MLA benchmark: forward_mha vs forward_mqa comparison
#
# Usage:
#   python benchmark.py --config configs/mla_sparse_mha_vs_mqa.yaml

mode: mha_vs_mqa

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 128
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

batch_specs:
  # Pure prefill (no context) — isolates kv_b_proj + causal attn cost
  - "q64"
  - "q128"
  - "q256"
  - "q512"
  - "q1k"
  - "q2k"
  - "q4k"
  - "q8k"

  # Large batch of short extends — can kv_b_proj batch amortize?
  - "16q64s128"
  - "32q64s128"
  - "64q64s128"

  # Large q_len with small context — best case for MHA
  - "1q1ks1k"
  - "1q2ks2k"
  - "1q4ks4k"
  - "1q8ks8k"

backends:
  - FLASHMLA_SPARSE

device: "cuda:0"
repeats: 10
warmup_iters: 3
profile_memory: true
