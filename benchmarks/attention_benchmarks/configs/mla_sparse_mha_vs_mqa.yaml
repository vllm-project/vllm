# Sparse MLA benchmark: forward_mha vs forward_mqa comparison
#
# Compares the single-pass FA4 masked MHA prefill path against the
# per-token MQA path for extend workloads (prefill with cached context).
#
# Usage:
#   python benchmark.py --config configs/mla_sparse_mha_vs_mqa.yaml

mode: mha_vs_mqa

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 128
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128

batch_specs:
  # Extend: q_len new tokens with seq_len total sequence
  - "1q512s4k"
  - "1q512s8k"
  - "1q1ks4k"
  - "1q1ks8k"
  - "1q2ks8k"
  - "1q2ks16k"
  - "1q4ks16k"

  # Batched extend
  - "4q512s4k"
  - "4q1ks8k"
  - "8q512s4k"
  - "8q512s8k"

backends:
  - FLASHMLA_SPARSE

device: "cuda:0"
repeats: 10
warmup_iters: 3
profile_memory: true
