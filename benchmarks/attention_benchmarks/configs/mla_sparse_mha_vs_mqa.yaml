# Sparse MLA benchmark: forward_mha vs forward_mqa crossover plot
#
# Dense pure-prefill sweep to generate a smooth speedup curve. The 100 points
# run from q32 through q262144, approximately even on the log2 scale, and include
# routing boundaries plus extra samples around the 6k-8k crossover region.
# Dense MHA is only benchmarked through q32768 because it dominates runtime above
# that range.
#
# Usage:
#   python benchmark.py --config configs/mla_sparse_mha_vs_mqa.yaml

mode: mha_vs_mqa

model:
  name: "deepseek-v3"
  num_layers: 60
  num_q_heads: 16
  num_kv_heads: 1
  head_dim: 576
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128
  block_size: 128
  max_model_len: 262144

batch_specs:
