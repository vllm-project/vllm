# Attention-weighted eviction policy (NEW)
name: attention
description: "Attention score-based eviction for CPU offloading."
kv_connector: "OffloadingConnector"
kv_role: "kv_both"
kv_connector_extra_config:
  spec_name: "CPUOffloadingSpec"
  cpu_bytes_to_use: 16000000000
  block_size: 48
  eviction_policy: "attention"
  score_decay: 0.95
gpu_memory_utilization: 0.5
