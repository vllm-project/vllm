kind: Dashboard
metadata:
    name: query-statistics
    createdAt: 0001-01-01T00:00:00Z
    updatedAt: 0001-01-01T00:00:00Z
    version: 0
    project: ""
spec:
    display:
        name: Query Statistics_New
    variables:
        - kind: ListVariable
          spec:
            display:
                name: datasource
                hidden: false
            defaultValue: prometheus
            allowAllValue: false
            allowMultiple: false
            plugin:
                kind: StaticListVariable
                spec:
                    values:
                        - grafana
                        - migration
                        - not
                        - supported
            name: DS_PROMETHEUS
        - kind: ListVariable
          spec:
            display:
                name: Deployment_ID
                hidden: false
            defaultValue:
                - $__all
            allowAllValue: true
            allowMultiple: true
            sort: alphabetical-asc
            plugin:
                kind: StaticListVariable
                spec:
                    values:
                        - grafana
                        - migration
                        - not
                        - supported
            name: Deployment_id
        - kind: ListVariable
          spec:
            display:
                name: Rush Hours Only
                hidden: true
            defaultValue: All hours
            allowAllValue: false
            allowMultiple: false
            plugin:
                kind: SomeVariable
                spec:
                    values:
                        - 'false : All hours'
                        - ' true : Rush hours'
            name: rush_hours
        - kind: ListVariable
          spec:
            display:
                name: Rush Hours Type
                hidden: true
            defaultValue: All
            allowAllValue: false
            allowMultiple: false
            plugin:
                kind: SomeVariable
                spec:
                    values:
                        - '^All__.*$ : All'
                        - ' ^Static__.*$ : Static'
                        - ' ^Dynamic__.*$ : Dynamic'
            name: rush_hours_type
        - kind: ListVariable
          spec:
            display:
                hidden: true
            defaultValue: []
            allowAllValue: false
            allowMultiple: false
            plugin:
                kind: StaticListVariable
                spec:
                    values:
                        - grafana
                        - migration
                        - not
                        - supported
            name: query0
    panels:
        "1":
            kind: Panel
            spec:
                display:
                    name: Successful Requests Over Time
                plugin:
                    kind: FooChart
                    spec:
                        iwas: timeseries
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "2":
            kind: Panel
            spec:
                display:
                    name: Requests Avg Rate
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "3":
            kind: Panel
            spec:
                display:
                    name: p50 Latency
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "4":
            kind: Panel
            spec:
                display:
                    name: p90 Latency
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "5":
            kind: Panel
            spec:
                display:
                    name: p99 Latency
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "6_0":
            kind: Panel
            spec:
                display:
                    name: Input Token Size Distribution
                plugin:
                    kind: Markdown
                    spec:
                        text: '**Migration from Grafana not supported !**'
        "6_1":
            kind: Panel
            spec:
                display:
                    name: Input Token Size p90
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "6_2":
            kind: Panel
            spec:
                display:
                    name: Input Token Size p50
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "6_3":
            kind: Panel
            spec:
                display:
                    name: Input Token Size Avg
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "6_4":
            kind: Panel
            spec:
                display:
                    name: Input Token Size p99
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "8":
            kind: Panel
            spec:
                display:
                    name: Input Tokens Over Time
                plugin:
                    kind: FooChart
                    spec:
                        iwas: timeseries
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "9":
            kind: Panel
            spec:
                display:
                    name: Input Tokens/Sec Avg
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "10_0":
            kind: Panel
            spec:
                display:
                    name: Output Tokens Over Time
                plugin:
                    kind: FooChart
                    spec:
                        iwas: timeseries
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
        "10_1":
            kind: Panel
            spec:
                display:
                    name: Output Tokens/Sec Avg
                plugin:
                    kind: BarChart
                    spec:
                        nested:
                            iwas: stat
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: migration_from_grafana_not_supported
    layouts:
        - kind: Grid
          spec:
            items:
                - x: 0
                  "y": 1
                  width: 10
                  height: 6
                  content:
                    $ref: '#/spec/panels/1'
                - x: 10
                  "y": 1
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/2'
                - x: 17
                  "y": 1
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/3'
                - x: 10
                  "y": 4
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/4'
                - x: 17
                  "y": 4
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/5'
                - x: 0
                  "y": 15
                  width: 10
                  height: 6
                  content:
                    $ref: '#/spec/panels/8'
                - x: 10
                  "y": 15
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/9'
        - kind: Grid
          spec:
            display:
                title: Size Distribution
                collapse:
                    open: true
            items:
                - x: 0
                  "y": 8
                  width: 10
                  height: 6
                  content:
                    $ref: '#/spec/panels/6_0'
                - x: 10
                  "y": 8
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/6_1'
                - x: 17
                  "y": 8
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/6_2'
                - x: 10
                  "y": 11
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/6_3'
                - x: 17
                  "y": 11
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/6_4'
        - kind: Grid
          spec:
            display:
                title: Output Token Over Time
                collapse:
                    open: true
            items:
                - x: 0
                  "y": 22
                  width: 10
                  height: 6
                  content:
                    $ref: '#/spec/panels/10_0'
                - x: 10
                  "y": 22
                  width: 7
                  height: 3
                  content:
                    $ref: '#/spec/panels/10_1'
    duration: 1h

